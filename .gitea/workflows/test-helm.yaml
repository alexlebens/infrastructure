name: test-helm

on:
  pull_request:
    branches:
      - main
    paths:
      - "clusters/cl01tl/helm/**"

  push:
    branches:
      - main
    paths:
      - "clusters/cl01tl/helm/**"

env:
  CLUSTER: cl01tl
  BASE_BRANCH: "origin/${{ github.base_ref }}"
  HELM_VERSION: "v4.2.2"
  KUBECONFORM_VERSION: "v0.8.0"
  ARGOCD_VERSION: "v3.4.4"
  KUBECTL_VERSION: "v1.36.2"
  YQ_VERSION: "v4.53.3"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      chart-dir: ${{ steps.check-dir-changes.outputs.chart-dir }}
      changes-detected: ${{ steps.check-dir-changes.outputs.changes-detected }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check Branch Exists
        id: check-branch-exists
        if: github.event_name == 'pull_request'
        uses: GuillaumeFalourd/branch-exists@650358876c774d6ccbd581b5553eb636dab79a97 # v1.2
        with:
          branch: ${{ github.base_ref }}

      - name: Report Branch Exists
        id: branch-exists
        if:
          github.event_name == 'push' || steps.check-branch-exists.outputs.exists == 'true' && github.event_name ==
          'pull_request'
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo ">> Action is from a push event, will continue with linting"

          else
            echo ">> Branch ${{ github.base_ref }} exists, will continue with linting"

          fi

          echo ""
          echo "----"
          echo "exists=true" >> $GITHUB_OUTPUT

      - name: Check Directories for Changes
        id: check-dir-changes
        if: steps.branch-exists.outputs.exists == 'true'
        run: |
          echo ">> Target branch for diff is: ${BASE_BRANCH}"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DIFF_TARGET="${BASE_BRANCH}"
            echo ""
            echo ">> Checking for changes in a pull request ..."

          else
            DIFF_TARGET="${{ github.event.before }}..HEAD"
            echo ""
            echo ">> Checking for changes from a push ..."

          fi

          RAW_CHARTS=$(git diff --name-only "${DIFF_TARGET}" | grep -E "^clusters/${CLUSTER}/helm/" | awk -F '/' '{print $4}' | sort -u || true)
          VALID_CHARTS=""

          for C in $RAW_CHARTS; do
            if [ -n "$C" ] && [ -f "clusters/${CLUSTER}/helm/${C}/Chart.yaml" ]; then
              VALID_CHARTS="${VALID_CHARTS} ${C}"

            fi
          done

          VALID_CHARTS=$(echo $VALID_CHARTS | xargs)

          if [ -n "${VALID_CHARTS}" ]; then
            echo ""
            echo ">> Charts to test:"
            echo "${VALID_CHARTS}"

            echo ""
            echo "----"
            echo "changes-detected=true" >> $GITHUB_OUTPUT
            echo "chart-dir=${VALID_CHARTS}" >> $GITHUB_OUTPUT

          else
            echo ""
            echo ">> Did not find any valid helm charts to test"

            echo ""
            echo "----"
            echo "changes-detected=false" >> $GITHUB_OUTPUT

          fi

  test-chart:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.changes-detected == 'true'
    env:
      CHANGED_CHARTS: ${{ needs.detect-changes.outputs.chart-dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set Up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: ${{ env.HELM_VERSION }}
          cache: true

      - name: Add Repositories
        run: |
          echo ">> Adding repositories for chart dependencies ..."
          echo ""

          for DIR in ${CHANGED_CHARTS}; do
            helm dependency list --max-col-width 120 clusters/${CLUSTER}/helm/${DIR} 2> /dev/null \
              | tail -n +2 \
              | awk 'NF > 0 { print $1, $3 }' \
              | while read -r REPO_NAME REPO_URL; do
                if [[ "${REPO_URL}" == oci://* ]]; then
                  echo ">> Ignoring OCI repo: ${REPO_URL}"

                elif [[ -n "${REPO_NAME}" && -n "${REPO_URL}" ]]; then
                  helm repo add "${REPO_NAME}" "${REPO_URL}"

                fi

              done || true
          done

          if helm repo list > /dev/null 2>&1; then
            echo ""
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo ""
          echo "----"

      - name: Lint Helm Charts
        run: |
          echo "FAILED_STAGE=Lint Helm Chart" >> $GITHUB_ENV
          for CHART in ${CHANGED_CHARTS}; do
            echo "FAILED_CHART=${CHART}" >> $GITHUB_ENV

            echo ">> Building helm dependency for ${CHART} ..."
            helm dependency build "clusters/${CLUSTER}/helm/${CHART}" --skip-refresh

            echo ""
            echo ">> Linting helm chart ${CHART} ..."
            helm lint "clusters/${CLUSTER}/helm/${CHART}" --namespace "default"

          done

          echo ""
          echo "----"

      - name: Set Up Kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@89b837d75b40a7bd2ddafde837473c212db8b313 # v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Get Cluster API Versions
        id: get-api-versions
        run: |
          echo ">> Fetching cluster API versions using kubectl ..."
          CLUSTER_CRDS=$(kubectl api-versions | tr '\n' ',')

          if [ -n "$CLUSTER_CRDS" ]; then
            API_VERSIONS="${CLUSTER_CRDS},gateway.networking.k8s.io/v1/HTTPRoute,monitoring.coreos.com/v1/ServiceMonitor"

          else
            API_VERSIONS="gateway.networking.k8s.io/v1/HTTPRoute,monitoring.coreos.com/v1/ServiceMonitor"

          fi

          API_VERSIONS=$(echo "$API_VERSIONS" | awk -F, '{for(i=1;i<=NF;i++) print $i}' | sort | uniq | paste -sd, -)

          echo ""
          echo "----"
          echo "api-versions=${API_VERSIONS}" >> "$GITHUB_OUTPUT"

      - name: Cache yq
        id: cache-yq
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.local/bin/yq
          key: ${{ runner.os }}-yq-${{ env.YQ_VERSION }}

      - name: Download yq
        if: steps.cache-yq.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          echo ">> Downloading yq ${{ env.YQ_VERSION }} ..."
          wget -qO ~/.local/bin/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          chmod +x ~/.local/bin/yq

          echo ""
          echo "----"

      - name: Verify yq Installation
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          yq -V

          echo ""
          echo "----"

      - name: Render Templates
        env:
          API_VERSIONS: ${{ steps.get-api-versions.outputs.api-versions }}
        run: |
          echo "FAILED_STAGE=Render Templates" >> $GITHUB_ENV
          for CHART in ${CHANGED_CHARTS}; do
            echo "FAILED_CHART=${CHART}" >> $GITHUB_ENV

            mkdir -p rendered-raw rendered-split/${CHART}

            CHART_PATH="clusters/${CLUSTER}/helm/${CHART}"
            NAMESPACE="${CHART}"

            case "${CHART}" in
              "stack")
                NAMESPACE="argocd"
                ;;
              "cilium" | "coredns" | "metrics-server")
                NAMESPACE="kube-system"
                ;;

            esac

            echo ">> Rendering into '${NAMESPACE}' namespace ..."
            helm template "${CHART}" "${CHART_PATH}" --include-crds --namespace "${NAMESPACE}" --api-versions "${API_VERSIONS}" > "rendered-raw/${CHART}.yaml"

            SPLIT_FOLDER="rendered-split/${CHART}/"
            cat "rendered-raw/${CHART}.yaml" | yq '... comments=""' | yq 'select(. != null)' | yq -s '"'"${SPLIT_FOLDER}"'" + .kind + "-" + .metadata.name + ".yaml"'

            for file in "$SPLIT_FOLDER"/*; do
              yq -i '... comments=""' $file

            done

            echo ">> Split templates created successfully for ${CHART}"

          done

          echo ""
          echo "----"

      - name: Cache Kubeconform
        id: cache-kubeconform
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.local/bin/kubeconform
          key: ${{ runner.os }}-kubeconform-${{ env.KUBECONFORM_VERSION }}

      - name: Download Kubeconform
        if: steps.cache-kubeconform.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          echo ">> Downloading Kubeconform ${{ env.KUBECONFORM_VERSION }} ..."
          wget -q https://github.com/yannh/kubeconform/releases/download/${{ env.KUBECONFORM_VERSION }}/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          mv kubeconform ~/.local/bin/
          chmod +x ~/.local/bin/kubeconform

          echo ""
          echo "----"

      - name: Verify Kubeconform Installation
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          kubeconform -v

          echo ""
          echo "----"

      - name: Kubeconform Rendered Templates
        run: |
          echo "FAILED_STAGE=Kubeconform Validation" >> $GITHUB_ENV
          SCHEMA_LOCATIONS="-schema-location default -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"

          for CHART in ${CHANGED_CHARTS}; do
            echo "FAILED_CHART=${CHART}" >> $GITHUB_ENV
            echo ">> Kubeconform for: ${CHART}"
            set -o pipefail
            cat "rendered-raw/${CHART}.yaml" | kubeconform ${SCHEMA_LOCATIONS} -ignore-missing-schemas -strict -summary

          done

          echo ""
          echo "----"

      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.local/bin/argocd
          key: ${{ runner.os }}-argocd-${{ env.ARGOCD_VERSION }}

      - name: Download ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          echo ">> Downloading ArgoCD CLI, version: ${{ env.ARGOCD_VERSION }} ..."
          curl -sSL -o ~/.local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_VERSION }}/argocd-linux-amd64
          chmod +x ~/.local/bin/argocd

          echo ""
          echo "----"

      - name: Verify ArgoCD CLI Installation
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client

          echo ""
          echo "----"

      - name: Run ArgoCD App Diff
        if: github.event_name == 'pull_request'
        env:
          ARGOCD_SERVER_INTERNAL: argocd-server.argocd.svc.cluster.local:80
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          echo "FAILED_STAGE=ArgoCD App Diff" >> $GITHUB_ENV
          # Temporarily hide .git and .gitignore so argocd packages everything
          mv .git .git.bak
          if [ -f .gitignore ]; then mv .gitignore .gitignore.bak; fi

          for CHART in ${CHANGED_CHARTS}; do
            echo "FAILED_CHART=${CHART}" >> $GITHUB_ENV
            ARGOCD_APP_NAME="${CHART}"
            case "${CHART}" in
              "stack")
                ARGOCD_APP_NAME="stack-cl01tl"
                ;;
            esac

            echo ">> Running argocd app diff for ${ARGOCD_APP_NAME} (chart: ${CHART}) ..."

            if ! argocd app diff "${ARGOCD_APP_NAME}" \
              --server "${ARGOCD_SERVER_INTERNAL}" \
              --plaintext \
              --auth-token "${ARGOCD_AUTH_TOKEN}" \
              --server-side-generate \
              --local "$PWD" > diff_output.txt 2> error_output.txt; then

              if [ -s "diff_output.txt" ]; then
                 echo ">> Argo diff found for ${CHART}"

                 DIFF_CONTENT=$(cat diff_output.txt)
                 COMMENT_BODY="### ArgoCD Diff Results
                 #### App: ${CHART}
                 \`\`\`diff
                 ${DIFF_CONTENT}
                 \`\`\`"

                 curl -s -X 'POST' \
                   "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
                   -H "Authorization: token ${GITEA_TOKEN}" \
                   -H "Content-Type: application/json" \
                   -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')" > /dev/null

              else
                 echo ">> ArgoCD encountered an error validating ${CHART}!"
                 cat error_output.txt

                 # Restore git before exiting
                 mv .git.bak .git
                 if [ -f .gitignore.bak ]; then mv .gitignore.bak .gitignore; fi
                 exit 1

              fi

            else
              echo ">> No Argo diff or errors found for ${CHART}"

            fi
          done

          # Restore .git and .gitignore
          mv .git.bak .git
          if [ -f .gitignore.bak ]; then mv .gitignore.bak .gitignore; fi

          echo ""
          echo "----"

      - name: ntfy Failed
        uses: niniyas/ntfy-action@96acac57fdc91d4c4f50b78486c1ed6f03f9f61c # master
        if: failure()
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Test Chart Failure - ${{ env.FAILED_CHART }}"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Testing failed for chart: ${{ env.FAILED_CHART }} at stage: ${{ env.FAILED_STAGE }}"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions:
            '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true
