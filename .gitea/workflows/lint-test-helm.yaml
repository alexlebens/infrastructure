name: lint-test-helm

on:
  pull_request:
    branches:
      - main
    paths:
      - "clusters/cl01tl/helm/**"

  push:
    branches:
      - main
    paths:
      - "clusters/cl01tl/helm/**"

env:
  CLUSTER: cl01tl
  BASE_BRANCH: "origin/${{ github.base_ref }}"
  HELM_VERSION: "v4.2.2"
  KUBECONFORM_VERSION: "v0.8.0"
  ARGOCD_VERSION: "v3.4.4"
  KUBECTL_VERSION: "v1.36.2"
  YQ_VERSION: "v4.53.3"

jobs:
  lint-helm:
    runs-on: ubuntu-latest
    outputs:
      chart-dir: ${{ steps.check-dir-changes.outputs.chart-dir }}
      chart-dir-csv: ${{ steps.check-dir-changes.outputs.chart-dir-csv }}
      changes-detected: ${{ steps.check-dir-changes.outputs.changes-detected }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check Branch Exists
        id: check-branch-exists
        if: github.event_name == 'pull_request'
        uses: GuillaumeFalourd/branch-exists@650358876c774d6ccbd581b5553eb636dab79a97 # v1.2
        with:
          branch: ${{ github.base_ref }}

      - name: Report Branch Exists
        id: branch-exists
        if:
          github.event_name == 'push' || steps.check-branch-exists.outputs.exists == 'true' && github.event_name ==
          'pull_request'
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo ">> Action is from a push event, will continue with linting"

          else
            echo ">> Branch ${{ github.base_ref }} exists, will continue with linting"

          fi

          echo ""
          echo "----"

          echo "exists=true" >> $GITHUB_OUTPUT

      - name: Set Up Helm
        if: steps.branch-exists.outputs.exists == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: ${{ env.HELM_VERSION }}
          cache: true

      - name: Cache Helm Dependencies
        if: steps.branch-exists.outputs.exists == 'true'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/.cache/helm
            ~/.config/helm
          key:
            helm-cache-${{ runner.os }}-${{ hashFiles('infrastructure/clusters/cl01tl/helm/**/Chart.yaml',
            'infrastructure/clusters/cl01tl/helm/**/Chart.lock') }}
          restore-keys: |
            helm-cache-${{ runner.os }}-

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@89b837d75b40a7bd2ddafde837473c212db8b313 # v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Check Directories for Changes
        id: check-dir-changes
        if: steps.branch-exists.outputs.exists == 'true'
        run: |
          echo ">> Target branch for diff is: ${BASE_BRANCH}"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DIFF_TARGET="${BASE_BRANCH}"
            echo ""
            echo ">> Checking for changes in a pull request ..."

          else
            DIFF_TARGET="${{ github.event.before }}..HEAD"
            echo ""
            echo ">> Checking for changes from a push ..."

          fi

          CHANGED_CHARTS=$(git diff --name-only "${DIFF_TARGET}" | grep -E "^clusters/${CLUSTER}/helm/" | awk -F '/' '{print $4}' | sort -u || true)

          if [ -n "${CHANGED_CHARTS}" ]; then
            echo ""
            echo ">> Chart to Lint:"
            echo ""
            echo "${CHANGED_CHARTS}"

            CHANGED_CHARTS_CSV=$(echo "${CHANGED_CHARTS}" | paste -sd ',' -)

            echo ""
            echo "----"

            echo "changes-detected=true" >> $GITHUB_OUTPUT
            echo "chart-dir-csv=${CHANGED_CHARTS_CSV}" >> $GITHUB_OUTPUT
            echo "chart-dir<<EOF" >> $GITHUB_OUTPUT
            echo "${CHANGED_CHARTS}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

          else
            echo ""
            echo ">> Did not find any helm charts files to lint"

            echo ""
            echo "----"

            echo "changes-detected=false" >> $GITHUB_OUTPUT

          fi

      - name: Add Repositories
        if: steps.check-dir-changes.outputs.changes-detected == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.check-dir-changes.outputs.chart-dir }}
        run: |
          echo ">> Adding repositories for chart dependencies ..."
          echo ""

          for DIR in ${CHANGED_CHARTS}; do
            helm dependency list --max-col-width 120 clusters/${CLUSTER}/helm/${DIR} 2> /dev/null \
              | tail -n +2 \
              | awk 'NF > 0 { print $1, $3 }' \
              | while read -r REPO_NAME REPO_URL; do
                if [[ "${REPO_URL}" == oci://* ]]; then
                  echo ">> Ignoring OCI repo: ${REPO_URL}"

                elif [[ -n "${REPO_NAME}" && -n "${REPO_URL}" ]]; then
                  helm repo add "${REPO_NAME}" "${REPO_URL}"

                fi

              done || true
          done

          if helm repo list > /dev/null 2>&1; then
            echo ""
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo ""
          echo "----"

      - name: Lint Helm Chart
        id: lint
        if: steps.check-dir-changes.outputs.changes-detected == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.check-dir-changes.outputs.chart-dir }}
        run: |
          EXIT_CODE=0
          FAILED_CHARTS=""

          echo ">> Running linting on changed charts ..."

          lint_chart() {
            local DIR="$1"
            local CHART_PATH="clusters/${CLUSTER}/helm/${DIR}"
            local CHART_NAME=$(basename "${CHART_PATH}")

            if [ -f "${CHART_PATH}/Chart.yaml" ]; then
              echo ""
              echo ">> Building helm dependency for ${CHART_NAME} ..."
              helm dependency build "${CHART_PATH}" --skip-refresh

              echo ""
              echo ">> Linting helm chart ${CHART_NAME} ..."

              if ! helm lint "${CHART_PATH}" --namespace "default"; then
                echo "${DIR}" > ".failed_chart_${CHART_NAME}"
                return 1
              fi

            else
              echo ""
              echo ">> Directory ${CHART_PATH} does not contain a Chart.yaml. Skipping ..."

            fi
          }

          export -f lint_chart
          export CLUSTER

          for DIR in ${CHANGED_CHARTS}; do
            echo "${DIR}"
          done | xargs -P 4 -I {} bash -c 'OUT=$(lint_chart "$@" 2>&1); printf "%s\n" "$OUT"' _ {}

          if ls .failed_chart_* 1> /dev/null 2>&1; then
            EXIT_CODE=1
            FAILED_CHARTS=$(cat .failed_chart_* | paste -sd ',' - | sed 's/,/, /g')
            rm -f .failed_chart_*
          fi

          echo ""
          echo "----"

          echo "failed-charts=${FAILED_CHARTS}" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      - name: ntfy Failed
        uses: niniyas/ntfy-action@96acac57fdc91d4c4f50b78486c1ed6f03f9f61c # master
        if: failure()
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Helm Test Failure"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details:
            "Helm linting for cluster '${{ env.CLUSTER }}' failed on charts: ${{ steps.lint.outputs.failed-charts }}"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions:
            '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

  render-templates:
    needs: lint-helm
    runs-on: ubuntu-latest
    if: |
      needs.lint-helm.result == 'success' &&
      needs.lint-helm.outputs.changes-detected == 'true' &&
      github.event_name == 'pull_request'
    outputs:
      api-versions: ${{ steps.get-api-versions.outputs.api-versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set Up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: ${{ env.HELM_VERSION }}
          cache: true

      - name: Cache Helm Dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/.cache/helm
            ~/.config/helm
          key:
            helm-cache-${{ runner.os }}-${{ hashFiles('infrastructure/clusters/cl01tl/helm/**/Chart.yaml',
            'infrastructure/clusters/cl01tl/helm/**/Chart.lock') }}
          restore-keys: |
            helm-cache-${{ runner.os }}-

      - name: Cache yq
        id: cache-yq
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /usr/local/bin/yq
          key: ${{ runner.os }}-yq-${{ env.YQ_VERSION }}
          restore-keys: |
            ${{ runner.os }}-yq-

      - name: Install yq
        if: steps.cache-yq.outputs.cache-hit != 'true'
        run: |
          echo ">> Installing yq ${{ env.YQ_VERSION }} ..."
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          echo ""
          echo ">> Verifying installation ..."
          yq --version

          echo ""
          echo "----"

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@89b837d75b40a7bd2ddafde837473c212db8b313 # v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Set Up Kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Get Cluster API Versions
        id: get-api-versions
        run: |
          echo ">> Fetching cluster API versions using kubectl ..."
          CLUSTER_CRDS=$(kubectl api-versions | tr '\n' ',')

          if [ -n "$CLUSTER_CRDS" ]; then
            API_VERSIONS="${CLUSTER_CRDS},gateway.networking.k8s.io/v1/HTTPRoute,monitoring.coreos.com/v1/ServiceMonitor"

          else
            API_VERSIONS="gateway.networking.k8s.io/v1/HTTPRoute,monitoring.coreos.com/v1/ServiceMonitor"

          fi

          API_VERSIONS=$(echo "$API_VERSIONS" | awk -F, '{for(i=1;i<=NF;i++) print $i}' | sort | uniq | paste -sd, -)

          echo ""
          echo "----"

          echo "api-versions=${API_VERSIONS}" >> "$GITHUB_OUTPUT"

      - name: Add Repositories
        env:
          CHANGED_CHARTS: ${{ needs.lint-helm.outputs.chart-dir }}
        run: |
          echo ">> Adding repositories for chart dependencies ..."
          echo ""

          for DIR in ${CHANGED_CHARTS}; do
            helm dependency list --max-col-width 120 clusters/${CLUSTER}/helm/${DIR} 2> /dev/null \
              | tail -n +2 \
              | awk 'NF > 0 { print $1, $3 }' \
              | while read -r REPO_NAME REPO_URL; do
                if [[ "${REPO_URL}" == oci://* ]]; then
                  echo ">> Ignoring OCI repo: ${REPO_URL}"

                elif [[ -n "${REPO_NAME}" && -n "${REPO_URL}" ]]; then
                  helm repo add "${REPO_NAME}" "${REPO_URL}"

                fi

              done || true
          done

          if helm repo list > /dev/null 2>&1; then
            echo ""
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo ""
          echo "----"

      - name: Render Templates
        id: render
        env:
          API_VERSIONS: ${{ steps.get-api-versions.outputs.api-versions }}
          CHANGED_CHARTS: ${{ needs.lint-helm.outputs.chart-dir }}
        run: |
          mkdir -p rendered-raw rendered-split

          for APP_NAME in ${CHANGED_CHARTS}; do
            echo ">> Render templates for ${APP_NAME} ..."
            CHART_PATH="clusters/${CLUSTER}/helm/${APP_NAME}"

            helm dependency build "${CHART_PATH}" --skip-refresh

            NAMESPACE="${APP_NAME}"
            case "${APP_NAME}" in
              "stack")
                NAMESPACE="argocd"
                echo ">> Special Rendering into 'argocd' namespace ..."
                ;;
              "cilium" | "coredns" | "metrics-server")
                NAMESPACE="kube-system"
                echo ">> Special Rendering for ${APP_NAME} into 'kube-system' namespace ..."
                ;;
              *)
                echo ">> Standard Rendering ..."

            esac

            helm template "${APP_NAME}" "${CHART_PATH}" --include-crds --namespace "${NAMESPACE}" --api-versions "${API_VERSIONS}" > "rendered-raw/${APP_NAME}.yaml"

            echo ">> Rendered raw template: rendered-raw/${APP_NAME}.yaml"

            SPLIT_FOLDER="rendered-split/${APP_NAME}/"
            mkdir -p "${SPLIT_FOLDER}"

            cat "rendered-raw/${APP_NAME}.yaml" | yq '... comments=""' | yq 'select(. != null)' | yq -s '"'"${SPLIT_FOLDER}"'" + .kind + "-" + .metadata.name + ".yaml"'

            for file in "$SPLIT_FOLDER"/*; do
              yq -i '... comments=""' $file

            done

            echo ">> Split templates in: ${SPLIT_FOLDER}"
            ls "${SPLIT_FOLDER}"

            echo ""

          done

          echo ""
          echo "----"

      - name: Upload Raw Templates
        uses: christopherhx/gitea-upload-artifact@81f940d004763f986ba3582c007fd842dd5cb0d7 # v4
        with:
          name: rendered-raw
          path: rendered-raw/
          retention-days: 1

      - name: Upload Split Templates
        uses: christopherhx/gitea-upload-artifact@81f940d004763f986ba3582c007fd842dd5cb0d7 # v4
        with:
          name: rendered-split
          path: rendered-split/
          retention-days: 1

  validate-kubeconform:
    needs: [lint-helm, render-templates]
    runs-on: ubuntu-latest
    if: |
      needs.render-templates.result == 'success'
    steps:
      - name: Cache Kubeconform
        id: cache-kubeconform
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /usr/local/bin/kubeconform
          key: ${{ runner.os }}-kubeconform-${{ env.KUBECONFORM_VERSION }}
          restore-keys: |
            ${{ runner.os }}-kubeconform-

      - name: Install Kubeconform
        if: steps.cache-kubeconform.outputs.cache-hit != 'true'
        run: |
          echo ">> Downloading Kubeconform ${{ env.KUBECONFORM_VERSION }} ..."
          wget -q https://github.com/yannh/kubeconform/releases/download/${{ env.KUBECONFORM_VERSION }}/kubeconform-linux-amd64.tar.gz

          echo ""
          echo ">> Extracting Kubeconform ..."
          tar xf kubeconform-linux-amd64.tar.gz

          echo ""
          echo ">> Installing Kubeconform ..."
          sudo mv kubeconform /usr/local/bin/

          echo ""
          echo "----"

      - name: Verify Kubeconform Installation
        run: |
          echo ""
          echo ">> Verifying installation ..."
          kubeconform -v

          echo ""
          echo "----"

      - name: Download Raw Templates
        uses: christopherhx/gitea-download-artifact@75635f32b4c1c41c4b3d64e8f85210112ed4c9c7 # v4
        with:
          name: rendered-raw
          path: rendered-raw/

      - name: Validate Rendered Templates
        id: validate
        env:
          CHANGED_CHARTS: ${{ needs.lint-helm.outputs.chart-dir }}
        run: |
          SCHEMA_LOCATIONS="-schema-location default -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"

          EXIT_CODE=0
          FAILED_CHARTS=""

          validate_chart() {
            local DIR="$1"
            echo ""
            echo ">> Validating: ${DIR}"

            set -o pipefail
            if ! cat "rendered-raw/${DIR}.yaml" | \
              kubeconform \
                ${SCHEMA_LOCATIONS} \
                -ignore-missing-schemas \
                -strict \
                -summary; then

              echo "${DIR}" > ".failed_chart_${DIR}"
              return 1

            fi
          }

          export -f validate_chart
          export SCHEMA_LOCATIONS

          for DIR in ${CHANGED_CHARTS}; do
            echo "${DIR}"

          done | xargs -P 4 -I {} bash -c 'OUT=$(validate_chart "$@" 2>&1); printf "%s\n" "$OUT"' _ {}

          if ls .failed_chart_* 1> /dev/null 2>&1; then
            EXIT_CODE=1
            FAILED_CHARTS=$(cat .failed_chart_* | paste -sd ',' - | sed 's/,/, /g')
            rm -f .failed_chart_*

          fi

          echo ""
          echo "----"

          echo "failed-charts=${FAILED_CHARTS}" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      - name: ntfy Failed
        uses: niniyas/ntfy-action@96acac57fdc91d4c4f50b78486c1ed6f03f9f61c # master
        if: failure()
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Kubeconform Test Failure"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details:
            "Kubeconform for cluster '${{ env.CLUSTER }}' failed on charts: ${{ steps.validate.outputs.failed-charts }}"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions:
            '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

  argo-diff:
    needs: [lint-helm, render-templates]
    runs-on: ubuntu-latest
    if: |
      needs.render-templates.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /usr/local/bin/argocd
          key: ${{ runner.os }}-argocd-${{ env.ARGOCD_VERSION }}
          restore-keys: |
            ${{ runner.os }}-argocd-

      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          echo ">> Downloading ArgoCD CLI, version: ${{ env.ARGOCD_VERSION }} ..."
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_VERSION }}/argocd-linux-amd64

          echo ""
          echo ">> Installing ArgoCD CLI ..."
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd

          echo ""
          echo "----"

      - name: Verify ArgoCD Installation
        run: |
          echo ""
          echo ">> Verifying installation ..."
          argocd version --client

          echo ""
          echo "----"

      - name: Download Split Templates
        uses: christopherhx/gitea-download-artifact@75635f32b4c1c41c4b3d64e8f85210112ed4c9c7 # v4
        with:
          name: rendered-split
          path: clusters/${{ env.CLUSTER }}/manifests/

      - name: Run App Diff
        id: diff
        env:
          ARGOCD_SERVER_INTERNAL: argocd-server.argocd.svc.cluster.local:80
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          CHANGED_CHARTS: ${{ needs.lint-helm.outputs.chart-dir }}
        run: |
          FAILED_CHARTS=""
          DIFF_FOUND="false"
          EXIT_CODE=0

          # ArgoCD CLI respects .git and ignores untracked files when building the local tarball
          # Stage the manifests so they are included in the upload
          git add "clusters/${CLUSTER}/manifests/"

          for APP_NAME in ${CHANGED_CHARTS}; do
            ARGOCD_APP_NAME="${APP_NAME}"
            case "${APP_NAME}" in
              "stack")
                ARGOCD_APP_NAME="stack-cl01tl"
                ;;

            esac

            echo ">> Running argocd app diff for ${ARGOCD_APP_NAME} (chart: ${APP_NAME}) ..."
            if ! argocd app diff "${ARGOCD_APP_NAME}" \
              --server "${ARGOCD_SERVER_INTERNAL}" \
              --plaintext \
              --auth-token "${ARGOCD_AUTH_TOKEN}" \
              --server-side-generate \
              --local "clusters/${CLUSTER}/manifests/${APP_NAME}" \
              --local-repo-root "." > "diff_output_${APP_NAME}.txt" 2> "error_output_${APP_NAME}.txt"; then

              if [ -s "diff_output_${APP_NAME}.txt" ]; then
                 DIFF_FOUND="true"
                 rm -f "error_output_${APP_NAME}.txt"
                 echo ">> Argo diff found for ${APP_NAME}"
                 cat "diff_output_${APP_NAME}.txt"
                 echo ""

              else
                 echo ">> ArgoCD encountered an error validating ${APP_NAME}!"
                 EXIT_CODE=1
                 FAILED_CHARTS="${FAILED_CHARTS} ${APP_NAME}"
                 cat "error_output_${APP_NAME}.txt"
                 echo ""

              fi

            else
              echo ">> No Argo diff or errors found for ${APP_NAME}"
              rm -f "diff_output_${APP_NAME}.txt" "error_output_${APP_NAME}.txt"

            fi
          done

          echo ""
          echo "----"
          echo "diff-detected=${DIFF_FOUND}" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -ne 0 ]; then
             echo "error-detected=true" >> "$GITHUB_OUTPUT"

          else
             echo "error-detected=false" >> "$GITHUB_OUTPUT"

          fi

          echo "failed-charts=${FAILED_CHARTS}" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      - name: Post Diff
        if: |
          always() &&
          (steps.diff.outputs.diff-detected == 'true' || steps.diff.outputs.error-detected == 'true') &&
          github.event.pull_request.number != null
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          COMMENT_BODY="### ArgoCD Diff Results
          "

          for f in diff_output_*.txt; do
            [ -f "$f" ] || continue
            APP_NAME=$(echo $f | sed 's/diff_output_//;s/.txt//')
            DIFF_CONTENT=$(cat "$f")

            COMMENT_BODY="${COMMENT_BODY}
          #### App: ${APP_NAME}
          "

            if [ -z "$DIFF_CONTENT" ]; then
              COMMENT_BODY="${COMMENT_BODY} No changes detected."

            else
              COMMENT_BODY="${COMMENT_BODY}
          \`\`\`diff
          ${DIFF_CONTENT}
          \`\`\`"

            fi
          done

          for f in error_output_*.txt; do
            [ -f "$f" ] || continue
            APP_NAME=$(echo $f | sed 's/error_output_//;s/.txt//')
            ERROR_CONTENT=$(cat "$f")

            COMMENT_BODY="${COMMENT_BODY}
          #### Error: ${APP_NAME}
          \`\`\`text
          ${ERROR_CONTENT}
          \`\`\`"

          done

          curl -X 'POST' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')"

          echo ""
          echo "----"

      - name: ntfy Failed
        uses: niniyas/ntfy-action@96acac57fdc91d4c4f50b78486c1ed6f03f9f61c # master
        if: failure()
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "ArgoCD Diff Failure"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details:
            "ArgoCD diff for cluster '${{ env.CLUSTER }}' failed on charts: ${{ steps.diff.outputs.failed-charts }}"
