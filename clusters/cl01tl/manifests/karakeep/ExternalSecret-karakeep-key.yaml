apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep-key
  namespace: karakeep
  labels:
    app.kubernetes.io/name: karakeep-key
    app.kubernetes.io/instance: karakeep
    app.kubernetes.io/part-of: karakeep
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: key
      remoteRef:
        key: /cl01tl/karakeep/key
        property: key
