apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep-assets-bcb0bc04dac3e3fd-rclone-destination-config
  namespace: karakeep
  labels:
    helm.sh/chart: rclone-karakeep-assets-external-0.11.1
    app.kubernetes.io/instance: karakeep
    app.kubernetes.io/part-of: karakeep
    app.kubernetes.io/version: "0.11.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: karakeep-assets-bcb0bc04dac3e3fd-rclone-destination-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /backblaze/home-infra/karakeep-assets
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /backblaze/home-infra/karakeep-assets
        property: ACCESS_SECRET_KEY
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /backblaze/home-infra/karakeep-assets
        property: ACCESS_REGION
    - secretKey: DEST_ENDPOINT
      remoteRef:
        key: /backblaze/config
        property: ENDPOINT
