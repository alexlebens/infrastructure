apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karakeep-karakeep-assets-rclone
  labels:
    app.kubernetes.io/instance: karakeep
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: karakeep-assets-rclone
    app.kubernetes.io/version: v1.74.1
    helm.sh/chart: rclone-karakeep-assets-remote-0.11.0
  namespace: karakeep
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - karakeep
  selector:
    matchLabels:
      app.kubernetes.io/instance: karakeep
      app.kubernetes.io/name: karakeep-assets-rclone
  endpoints:
    - interval: 10s
      path: /metrics
      port: metrics-sync
      scrapeTimeout: 5s
    - interval: 10s
      path: /metrics
      port: metrics-prune
      scrapeTimeout: 5s
