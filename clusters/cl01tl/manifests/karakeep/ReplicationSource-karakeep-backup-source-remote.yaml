apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: karakeep-backup-source-remote
  namespace: karakeep
  labels:
    helm.sh/chart: volsync-target-data-2.0.0
    app.kubernetes.io/instance: karakeep
    app.kubernetes.io/part-of: karakeep
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: karakeep-backup
spec:
  sourcePVC: karakeep
  trigger:
    schedule: 5 10 * * 2
  restic:
    pruneIntervalDays: 7
    repository: karakeep-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
