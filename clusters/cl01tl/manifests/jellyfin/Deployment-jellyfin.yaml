apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: jellyfin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin
    helm.sh/chart: jellyfin-4.6.2
  namespace: jellyfin
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: jellyfin
      app.kubernetes.io/instance: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: jellyfin
        app.kubernetes.io/name: jellyfin
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - plex
              topologyKey: kubernetes.io/hostname
      containers:
        - args:
            - --jellyfin.address=http://127.0.0.1:8096
            - --jellyfin.token=$(TOKEN)
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: token
                  name: jellyfin-exporter-secret
          image: rebelcore/jellyfin-exporter:v1.5.0@sha256:37e6d389654180ad9e1661210a48fee71a6dc355a160670235a00329da0dbf80
          name: exporter
        - env:
            - name: TZ
              value: America/Chicago
            - name: JELLYFIN_hostwebclient
              value: "true"
            - name: JELLYFIN_PublishedServerUrl
              value: https://jellyfin.alexlebens.net/
          image: ghcr.io/jellyfin/jellyfin:10.11.8@sha256:93227545077893cc9516f28b3adb733b67bc4691f41b6167428a2a0e3220b81c
          name: main
          resources:
            limits:
              gpu.intel.com/i915: 1
            requests:
              cpu: 1
              gpu.intel.com/i915: 1
              memory: 1Gi
          volumeMounts:
            - mountPath: /cache
              name: cache
            - mountPath: /config
              name: config
            - mountPath: /mnt/store
              name: media
            - mountPath: /mnt/youtube
              name: youtube
              readOnly: true
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-nfs-storage
        - name: youtube
          persistentVolumeClaim:
            claimName: jellyfin-youtube-nfs-storage
