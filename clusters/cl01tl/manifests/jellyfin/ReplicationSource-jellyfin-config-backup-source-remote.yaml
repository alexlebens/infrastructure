apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: jellyfin-config-backup-source-remote
  namespace: jellyfin
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: jellyfin
    app.kubernetes.io/part-of: jellyfin
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin-config-backup
spec:
  sourcePVC: jellyfin-config
  trigger:
    schedule: 40 10 * * 1
  restic:
    pruneIntervalDays: 7
    repository: jellyfin-config-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 10Gi
