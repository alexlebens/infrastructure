apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: shelfmark-backup-source-remote
  namespace: shelfmark
  labels:
    helm.sh/chart: volsync-target-config-1.1.1
    app.kubernetes.io/instance: shelfmark
    app.kubernetes.io/part-of: shelfmark
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: shelfmark-backup
spec:
  sourcePVC: shelfmark
  trigger:
    schedule: 20 12 * * *
  restic:
    pruneIntervalDays: 7
    repository: shelfmark-backup-secret-remote
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    moverSecurityContext:
      runAsGroup: 1000
      runAsUser: 1000
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
