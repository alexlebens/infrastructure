apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: shelfmark-backup-source-external
  namespace: shelfmark
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: shelfmark
    app.kubernetes.io/part-of: shelfmark
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: shelfmark-backup
spec:
  sourcePVC: shelfmark
  trigger:
    schedule: 25 9 * * 5
  restic:
    pruneIntervalDays: 35
    repository: shelfmark-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      runAsGroup: 1000
      runAsUser: 1000
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
