apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: seerr-seerr-chart-config-backup-source-external
  namespace: seerr
  labels:
    helm.sh/chart: volsync-target-config-2.1.0
    app.kubernetes.io/instance: seerr
    app.kubernetes.io/part-of: seerr
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: seerr-seerr-chart-config-backup
spec:
  sourcePVC: seerr-seerr-chart-config
  trigger:
    schedule: 20 9 * * 5
  restic:
    pruneIntervalDays: 35
    repository: seerr-seerr-chart-config-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
