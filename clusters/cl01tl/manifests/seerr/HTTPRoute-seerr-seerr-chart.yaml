      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - seerr.alexlebens.net
  rules:
    - backendRefs:
        - name: seerr-seerr-chart
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
