apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: descheduler
  namespace: grafana-operator
  labels:
    app.kubernetes.io/name: descheduler
    app.kubernetes.io/instance: descheduler
    app.kubernetes.io/part-of: descheduler
spec:
  instanceSelector:
    matchLabels:
      app: grafana-main
  folderUID: grafana-folder-service
  resyncPeriod: 6h
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "barWidthFactor": 0.6,
                "drawStyle": "points",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineStyle": {
                  "fill": "solid"
                },
                "lineWidth": 2,
                "pointSize": 10,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green"
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 21,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": ["last"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "pluginVersion": "11.4.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "sum(descheduler_pods_evicted{namespace=~\"$namespace\",strategy=~\"$strategy\"}) by (namespace,strategy,result)",
              "instant": false,
              "legendFormat": "{{namespace}} - {{strategy}} - {{result}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Descheduled pods",
          "type": "timeseries"
        }
      ],
      "preload": true,
      "refresh": "",
      "schemaVersion": 42,
      "tags": ["service", "containers"],
      "templating": {
        "list": [
          {
            "includeAll": false,
            "label": "Datasource",
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 0,
            "regex": "",
            "type": "datasource"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(descheduler_pods_evicted,namespace)",
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(descheduler_pods_evicted,namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "type": "query"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(descheduler_pods_evicted{namespace=~\"$namespace\"},strategy)",
            "includeAll": true,
            "multi": true,
            "name": "strategy",
            "options": [],
            "query": {
              "query": "label_values(descheduler_pods_evicted{namespace=~\"$namespace\"},strategy)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "type": "query"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(descheduler_pods_evicted{namespace=~\"$namespace\",strategy=~\"$strategy\"},result)",
            "includeAll": true,
            "multi": true,
            "name": "result",
            "options": [],
            "query": {
              "query": "label_values(descheduler_pods_evicted{namespace=~\"$namespace\",strategy=~\"$strategy\"},result)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-90d",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Descheduler",
      "weekStart": "",
      "uid": "8259cfbd0dd87a6560bec369fef605c6",
      "id": 171
    }
