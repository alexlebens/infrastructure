apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-assets-rclone-destination-config
  namespace: kaneo
  labels:
    helm.sh/chart: rclone-kaneo-assets-remote-0.12.5
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/part-of: kaneo
    app.kubernetes.io/version: "0.12.5"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kaneo-assets-rclone-destination-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/kaneo-assets
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /garage/home-infra/kaneo-assets
        property: ACCESS_SECRET_KEY
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/kaneo-assets
        property: ACCESS_REGION
    - secretKey: DEST_ENDPOINT
      remoteRef:
        key: /garage/config
        property: ENDPOINT_REMOTE
