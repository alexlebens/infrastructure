apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kaneo-postgresql-18-cluster
  namespace: kaneo
  labels:
    app.kubernetes.io/name: kaneo-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.15.2
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/part-of: kaneo
    app.kubernetes.io/version: "7.15.2"
    app.kubernetes.io/managed-by: Helm
spec:
  instances: 3
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie"
  imagePullPolicy: IfNotPresent
  postgresUID: 26
  postgresGID: 26
  storage:
    size: 10Gi
    storageClass: local-path
  walStorage:
    size: 2Gi
    storageClass: local-path
  resources:
    limits:
      hugepages-2Mi: 256Mi
    requests:
      cpu: 50m
      memory: 512Mi
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised
  logLevel: info
  enableSuperuserAccess: false
  enablePDB: true
  postgresql:
    parameters:
      hot_standby_feedback: "on"
      max_slot_wal_keep_size: 2000MB
      shared_buffers: 512MB
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: false
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: "kaneo-postgresql-18-backup-garage-local"
        serverName: "kaneo-postgresql-18-backup-1"
  bootstrap:
    initdb:
      database: app
      owner: app
