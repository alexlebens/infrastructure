apiVersion: batch/v1
kind: CronJob
metadata:
  name: kaneo-kaneo-assets-external-rclone
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kaneo-assets-external-rclone
    app.kubernetes.io/version: v1.74.3
    helm.sh/chart: rclone-kaneo-assets-external-0.12.5
  namespace: kaneo
spec:
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 30
  timeZone: America/Chicago
  schedule: "0 6 * * 3"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      parallelism: 1
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/controller: main
            app.kubernetes.io/instance: kaneo
            app.kubernetes.io/name: kaneo-assets-external-rclone
        spec:
          enableServiceLinks: false
          serviceAccountName: kaneo-kaneo-assets-external-rclone
          automountServiceAccountToken: false
          hostIPC: false
          hostNetwork: false
          hostPID: false
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          containers:
            - args:
                - |
                  set -o pipefail
                  rclone sync \
                    "src:kaneo-assets" \
                    "dest:kaneo-assets-47edc3f232f2797f" \
                    --s3-no-check-bucket \
                    --rc --rc-addr=0.0.0.0:5572 --rc-enable-metrics --rc-no-auth \
                    --verbose 2>&1 | tee /tmp/rclone-sync.log

                  res=$?
                  STATS=$(grep "Transferred:" /tmp/rclone-sync.log | tail -n 2)
                  DATA_TRANS=$(echo "$STATS" | head -n 1 | sed 's/.*Transferred:[ \t]*//')

                  if [ -z "$DATA_TRANS" ]; then
                    DATA_TRANS="Unknown"

                  fi

                  TARGET_URL=""
                  if [ -n "${NTFY_URL:-}" ]; then
                    TARGET_URL="$NTFY_URL"
                  fi

                  if [ $res -eq 0 ]; then
                    if [ -n "${NTFY_TOKEN:-}" ]; then
                      wget -qO- --header "Authorization: Bearer $NTFY_TOKEN" --header "Title: Rclone Sync Success - kaneo-assets" --header "Priority: default" --post-data "Job for bucket kaneo-assets transferred: $DATA_TRANS" "$TARGET_URL"
                    else
                      wget -qO- --header "Title: Rclone Sync Success - kaneo-assets" --header "Priority: default" --post-data "Job for bucket kaneo-assets transferred: $DATA_TRANS" "$TARGET_URL"
                    fi
                  else
                    if [ -n "${NTFY_TOKEN:-}" ]; then
                      wget -qO- --header "Authorization: Bearer $NTFY_TOKEN" --header "Title: Rclone Sync Failed - kaneo-assets" --header "Priority: urgent" --post-data "Job for kaneo-assets failed, but transferred: $DATA_TRANS" "$TARGET_URL"
                    else
                      wget -qO- --header "Title: Rclone Sync Failed - kaneo-assets" --header "Priority: urgent" --post-data "Job for kaneo-assets failed, but transferred: $DATA_TRANS" "$TARGET_URL"
                    fi
                  fi
                  exit $res
              command:
                - /bin/sh
                - -c
              env:
                - name: RCLONE_S3_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_SRC_TYPE
                  value: s3
                - name: RCLONE_CONFIG_SRC_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_SRC_ENV_AUTH
                  value: "false"
                - name: RCLONE_CONFIG_SRC_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_KEY_ID
                      name: kaneo-assets-rclone-source-config
                - name: RCLONE_CONFIG_SRC_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_SECRET_KEY
                      name: kaneo-assets-rclone-source-config
                - name: RCLONE_CONFIG_SRC_REGION
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_REGION
                      name: kaneo-assets-rclone-source-config
                - name: RCLONE_CONFIG_SRC_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      key: SRC_ENDPOINT
                      name: kaneo-assets-rclone-source-config
                - name: RCLONE_CONFIG_SRC_FORCE_PATH_STYLE
                  value: "true"
                - name: RCLONE_CONFIG_DEST_TYPE
                  value: s3
                - name: RCLONE_CONFIG_DEST_PROVIDER
                  value: Other
                - name: RCLONE_CONFIG_DEST_ENV_AUTH
                  value: "false"
                - name: RCLONE_CONFIG_DEST_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_KEY_ID
                      name: kaneo-assets-47edc3f232f2797f-rclone-destination-config
                - name: RCLONE_CONFIG_DEST_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_SECRET_KEY
                      name: kaneo-assets-47edc3f232f2797f-rclone-destination-config
                - name: RCLONE_CONFIG_DEST_REGION
                  valueFrom:
                    secretKeyRef:
                      key: ACCESS_REGION
                      name: kaneo-assets-47edc3f232f2797f-rclone-destination-config
                - name: RCLONE_CONFIG_DEST_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      key: DEST_ENDPOINT
                      name: kaneo-assets-47edc3f232f2797f-rclone-destination-config
                - name: RCLONE_CONFIG_DEST_FORCE_PATH_STYLE
                  value: "true"
                - name: NTFY_URL
                  valueFrom:
                    secretKeyRef:
                      key: ntfy-url
                      name: kaneo-assets-external-rclone-ntfy
                - name: NTFY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      key: ntfy-token
                      name: kaneo-assets-external-rclone-ntfy
                      optional: true
              image: rclone/rclone:1.74.3@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
              imagePullPolicy: IfNotPresent
              name: sync
