apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-oidc-authentik
  namespace: kaneo
  labels:
    app.kubernetes.io/name: kaneo-oidc-authentik
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/part-of: kaneo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: CUSTOM_OAUTH_CLIENT_ID
      remoteRef:
        key: /cl01tl/authentik/oidc/kaneo
        property: client
    - secretKey: CUSTOM_OAUTH_CLIENT_SECRET
      remoteRef:
        key: /cl01tl/authentik/oidc/kaneo
        property: secret
