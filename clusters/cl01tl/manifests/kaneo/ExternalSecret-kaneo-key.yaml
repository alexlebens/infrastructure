apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kaneo-key
  namespace: kaneo
  labels:
    app.kubernetes.io/name: kaneo-key
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/part-of: kaneo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: auth-secret
      remoteRef:
        key: /cl01tl/kaneo/key
        property: auth-secret
