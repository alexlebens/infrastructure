apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kaneo
  labels:
    app.kubernetes.io/instance: kaneo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kaneo
    helm.sh/chart: kaneo-5.0.1
  namespace: kaneo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: "traefik"
  hostnames:
    - "kaneo.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kaneo
          namespace: kaneo
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
