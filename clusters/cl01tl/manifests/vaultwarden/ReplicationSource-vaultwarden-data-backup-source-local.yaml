apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: vaultwarden-data-backup-source-local
  namespace: vaultwarden
  labels:
    helm.sh/chart: volsync-target-data-2.0.0
    app.kubernetes.io/instance: vaultwarden
    app.kubernetes.io/part-of: vaultwarden
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vaultwarden-data-backup-source-local
spec:
  sourcePVC: vaultwarden-data
  trigger:
    schedule: 10 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: vaultwarden-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
