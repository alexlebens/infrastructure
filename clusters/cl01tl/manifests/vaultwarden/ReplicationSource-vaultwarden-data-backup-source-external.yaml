apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: vaultwarden-data-backup-source-external
  namespace: vaultwarden
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: vaultwarden
    app.kubernetes.io/part-of: vaultwarden
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vaultwarden-data-backup
spec:
  sourcePVC: vaultwarden-data
  trigger:
    schedule: 10 9 * * 6
  restic:
    pruneIntervalDays: 35
    repository: vaultwarden-data-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
