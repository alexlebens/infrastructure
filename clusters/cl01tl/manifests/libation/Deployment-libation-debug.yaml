apiVersion: apps/v1
kind: Deployment
metadata:
  name: libation-debug
  labels:
    app.kubernetes.io/controller: debug
    app.kubernetes.io/instance: libation
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: libation
    helm.sh/chart: libation-5.0.1
  namespace: libation
spec:
  revisionHistoryLimit: 3
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: debug
      app.kubernetes.io/name: libation
      app.kubernetes.io/instance: libation
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: debug
        app.kubernetes.io/instance: libation
        app.kubernetes.io/name: libation
    spec:
      enableServiceLinks: false
      serviceAccountName: libation
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - command:
            - sleep
            - infinity
          image: ubuntu:resolute-20260421@sha256:f3d28607ddd78734bb7f71f117f3c6706c666b8b76cbff7c9ff6e5718d46ff64
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - mountPath: /data
              name: audiobooks
            - mountPath: /config
              name: config
      volumes:
        - name: audiobooks
          persistentVolumeClaim:
            claimName: libation-nfs-storage
        - name: config
          persistentVolumeClaim:
            claimName: libation
