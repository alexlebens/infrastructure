apiVersion: apps/v1
kind: Deployment
metadata:
  name: eraser-metrics
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: eraser
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: eraser-metrics
    helm.sh/chart: eraser-metrics-5.0.1
  namespace: eraser
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: eraser-metrics
      app.kubernetes.io/instance: eraser
  template:
    metadata:
      annotations:
        checksum/configMaps: 99c74a4734ce3f4e4e91c516068ad606c1095d48c5049b2f51f1231db31e0122
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: eraser
        app.kubernetes.io/name: eraser-metrics
    spec:
      enableServiceLinks: false
      serviceAccountName: eraser-metrics
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - command:
            - /otelcol
            - --config=/conf/otel-collector-config.yaml
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.154.0@sha256:ea527f0f9a220c7b595863a658c262f31d08c07e034a16b502bfb2206aa987ff
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
          volumeMounts:
            - mountPath: /conf/otel-collector-config.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: otel-collector-config.yaml
      volumes:
        - configMap:
            name: eraser-config
          name: config
