apiVersion: v1
kind: ConfigMap
metadata:
  name: eraser-manager-config
  namespace: "eraser"
data:
  controller_manager_config.yaml: |
    apiVersion: eraser.sh/v1alpha3
    components:
      collector:
        enabled: true
        image:
          repo: ghcr.io/eraser-dev/collector
          tag: v1.4.1@sha256:827588ff826c3558bf2c50b1fc94f20122b054dfcf3480c3ffe6f0bae25c3dad
        limit: {}
        request:
          cpu: 1m
          memory: 20Mi
      remover:
        image:
          repo: ghcr.io/eraser-dev/remover
          tag: v1.4.1@sha256:e57592157d717588f69c011cd0b6ab783a19a53b447a5350b27e7e66aae67525
        limit: {}
        request:
          cpu: 1m
          memory: 20Mi
      scanner:
        config: ""
        enabled: false
        image:
          tag: v1.4.1
        limit: {}
        request: {}
    health: {}
    kind: EraserConfig
    leaderElection: {}
    manager:
      additionalPodLabels: {}
      imageJob:
        cleanup:
          delayOnFailure: 24h
          delayOnSuccess: 0s
        successRatio: 1
      logLevel: info
      nodeFilter:
        selectors:
        - eraser.sh/cleanup.filter
        - kubernetes.io/os=windows
        type: exclude
      otlpEndpoint: ""
      priorityClassName: ""
      profile: {}
      pullSecrets: []
      runtime:
        address: unix:///run/containerd/containerd.sock
        name: containerd
      scheduling:
        beginImmediately: true
        repeatInterval: 24h
    metrics: {}
    webhook: {}
