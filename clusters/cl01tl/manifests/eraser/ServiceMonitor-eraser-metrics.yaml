apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eraser-metrics
  labels:
    app.kubernetes.io/instance: eraser
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: eraser-metrics
    helm.sh/chart: eraser-metrics-4.6.2
  namespace: eraser
spec:
  jobLabel: eraser-metrics
  namespaceSelector:
    matchNames:
      - eraser
  selector:
    matchLabels:
      app.kubernetes.io/instance: eraser-metrics
      app.kubernetes.io/name: eraser-metrics
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 15s
