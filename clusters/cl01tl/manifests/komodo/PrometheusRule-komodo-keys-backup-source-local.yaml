apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: komodo-keys-backup-source-local
  namespace: komodo
  labels:
    helm.sh/chart: volsync-target-keys-1.1.0
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/part-of: komodo
    app.kubernetes.io/version: "1.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo-keys-backup-source-local
spec:
  groups:
    - name: volsync.alerts
      rules:
        - alert: VolSyncBackupPodFailed
          expr: |
            kube_pod_container_status_last_terminated_exit_code > 0
            * on(pod, namespace) group_left(owner_name)
            label_replace(
              kube_pod_owner{owner_kind="Job"},
              "owner_name", "$1", "owner_name", "(.*)"
            )
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "VolSync Backup Pod failed in {{ $labels.namespace }}"
            description: |
              A pod for the VolSync backup of PVC 'komodo-keys' failed with exit code {{ $value }}.
              Job: {{ $labels.owner_name }}
              Namespace: {{ $labels.namespace }}
