apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: komodo-postgresql-17-fdb-recovery-secret
  namespace: komodo
  labels:
    helm.sh/chart: postgresql-17-fdb-cluster-7.12.1
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/part-of: komodo
    app.kubernetes.io/version: "7.12.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo-postgresql-17-fdb-recovery-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_SECRET_KEY
