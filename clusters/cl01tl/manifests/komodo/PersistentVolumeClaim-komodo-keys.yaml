kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: komodo-keys
  labels:
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo
    helm.sh/chart: komodo-4.6.2
  namespace: komodo
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "1Gi"
  storageClassName: "ceph-block"
