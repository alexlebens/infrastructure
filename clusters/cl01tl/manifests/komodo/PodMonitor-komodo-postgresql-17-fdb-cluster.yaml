apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: komodo-postgresql-17-fdb-cluster
  namespace: komodo
  labels:
    app.kubernetes.io/name: komodo-postgresql-17-fdb-cluster
    helm.sh/chart: postgresql-17-fdb-cluster-7.15.0
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/part-of: komodo
    app.kubernetes.io/version: "7.15.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: komodo-postgresql-17-fdb-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
