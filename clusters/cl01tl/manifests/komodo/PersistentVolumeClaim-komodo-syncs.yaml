kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: komodo-syncs
  labels:
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo
    helm.sh/chart: komodo-5.0.1
  namespace: komodo
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "5Gi"
  storageClassName: "ceph-block"
