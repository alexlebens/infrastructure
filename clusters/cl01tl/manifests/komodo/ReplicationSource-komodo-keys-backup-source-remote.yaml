apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: komodo-keys-backup-source-remote
  namespace: komodo
  labels:
    helm.sh/chart: volsync-target-keys-0.8.0
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/part-of: komodo
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo-keys-backup
spec:
  sourcePVC: komodo-keys
  trigger:
    schedule: 54 12 * * *
  restic:
    pruneIntervalDays: 7
    repository: komodo-keys-backup-secret-remote
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
