apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: komodo-keys-backup-source-remote
  namespace: komodo
  labels:
    helm.sh/chart: volsync-target-keys-2.0.0
    app.kubernetes.io/instance: komodo
    app.kubernetes.io/part-of: komodo
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: komodo-keys-backup
spec:
  sourcePVC: komodo-keys
  trigger:
    schedule: 10 10 * * 2
  restic:
    pruneIntervalDays: 7
    repository: komodo-keys-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
