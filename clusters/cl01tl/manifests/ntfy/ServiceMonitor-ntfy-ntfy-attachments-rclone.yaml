apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ntfy-ntfy-attachments-rclone
  labels:
    app.kubernetes.io/instance: ntfy
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ntfy-attachments-rclone
    app.kubernetes.io/version: v1.74.3
    helm.sh/chart: rclone-ntfy-attachments-remote-0.11.7
  namespace: ntfy
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - ntfy
  selector:
    matchLabels:
      app.kubernetes.io/instance: ntfy
      app.kubernetes.io/name: ntfy-attachments-rclone
  endpoints:
    - interval: 10s
      path: /metrics
      port: rc-sync
      scrapeTimeout: 5s
    - interval: 10s
      path: /metrics
      port: rc-prune
      scrapeTimeout: 5s
