apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpackerr
  labels:
    app.kubernetes.io/instance: unpackerr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: unpackerr
    helm.sh/chart: unpackerr-4.6.2
  namespace: unpackerr
spec:
  jobLabel: unpackerr
  namespaceSelector:
    matchNames:
      - unpackerr
  selector:
    matchLabels:
      app.kubernetes.io/instance: unpackerr
      app.kubernetes.io/name: unpackerr
  endpoints:
    - interval: 1m
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
