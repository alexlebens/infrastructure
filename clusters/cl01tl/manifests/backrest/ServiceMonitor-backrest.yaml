apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backrest
  labels:
    app.kubernetes.io/instance: backrest
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: backrest
    helm.sh/chart: backrest-5.0.1
  namespace: backrest
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - backrest
  selector:
    matchLabels:
      app.kubernetes.io/instance: backrest
      app.kubernetes.io/name: backrest
  endpoints:
    - interval: 300s
      path: /metrics
      port: http
      scheme: http
      scrapeTimeout: 15s
