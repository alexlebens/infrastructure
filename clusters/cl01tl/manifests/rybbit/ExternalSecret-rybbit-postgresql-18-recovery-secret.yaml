apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rybbit-postgresql-18-recovery-secret
  namespace: rybbit
  labels:
    helm.sh/chart: postgres-18-cluster-7.12.1
    app.kubernetes.io/instance: rybbit
    app.kubernetes.io/part-of: rybbit
    app.kubernetes.io/version: "7.12.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rybbit-postgresql-18-recovery-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_SECRET_KEY
