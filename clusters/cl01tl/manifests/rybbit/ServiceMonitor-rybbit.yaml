apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rybbit
  labels:
    app.kubernetes.io/instance: rybbit
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rybbit
    helm.sh/chart: rybbit-5.0.0
  namespace: rybbit
spec:
  jobLabel: rybbit
  namespaceSelector:
    matchNames:
      - rybbit
  selector:
    matchLabels:
      app.kubernetes.io/instance: rybbit-clickhouse
      app.kubernetes.io/name: rybbit-clickhouse
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 10s
