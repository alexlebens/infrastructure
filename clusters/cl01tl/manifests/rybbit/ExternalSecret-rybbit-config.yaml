apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rybbit-config
  namespace: rybbit
  labels:
    app.kubernetes.io/name: rybbit-config
    app.kubernetes.io/instance: rybbit
    app.kubernetes.io/part-of: rybbit
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: better-auth-secret
      remoteRef:
        key: /cl01tl/rybbit/config
        property: better-auth-secret
    - secretKey: mapbox-token
      remoteRef:
        key: /cl01tl/rybbit/config
        property: mapbox-token
