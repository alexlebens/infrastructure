apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rybbit-cloudflared-secret
  namespace: rybbit
  labels:
    helm.sh/chart: cloudflared-3.2.2
    app.kubernetes.io/instance: rybbit
    app.kubernetes.io/part-of: rybbit
    app.kubernetes.io/version: "3.2.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rybbit-cloudflared-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: cf-tunnel-token
      remoteRef:
        key: /cloudflare/tunnels/rybbit
        property: token
