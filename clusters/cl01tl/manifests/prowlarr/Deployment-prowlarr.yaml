apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: prowlarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: prowlarr
    helm.sh/chart: prowlarr-5.0.1
  namespace: prowlarr
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: prowlarr
      app.kubernetes.io/instance: prowlarr
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: prowlarr
        app.kubernetes.io/name: prowlarr
    spec:
      enableServiceLinks: false
      serviceAccountName: prowlarr
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 568
        runAsUser: 568
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
          image: ghcr.io/linuxserver/prowlarr:2.4.0.5397-ls149@sha256:a46d0ce0a8236bc4e065fe7c91a55d026c9d849620c5845250519b977d8857f3
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
          volumeMounts:
            - mountPath: /config
              name: config
        - args:
            - prowlarr
          env:
            - name: URL
              value: http://localhost:9696
            - name: PORT
              value: "9792"
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  key: key
                  name: prowlarr-key-secret
            - name: ENABLE_ADDITIONAL_METRICS
              value: "false"
            - name: ENABLE_UNKNOWN_QUEUE_ITEMS
              value: "false"
            - name: PROWLARR__BACKFILL
              value: "true"
          image: ghcr.io/onedr0p/exportarr:v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
          name: metrics
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
