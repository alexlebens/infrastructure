apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prowlarr
  labels:
    app.kubernetes.io/instance: prowlarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: prowlarr
    helm.sh/chart: prowlarr-4.6.2
  namespace: prowlarr
spec:
  jobLabel: prowlarr
  namespaceSelector:
    matchNames:
      - prowlarr
  selector:
    matchLabels:
      app.kubernetes.io/instance: prowlarr
      app.kubernetes.io/name: prowlarr
  endpoints:
    - interval: 1m
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
