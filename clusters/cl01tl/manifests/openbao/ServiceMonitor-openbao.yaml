apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openbao
  namespace: openbao
  labels:
    helm.sh/chart: openbao-0.27.1
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/managed-by: Helm
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: openbao
      openbao-active: "true"
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      path: /v1/sys/metrics
      params:
        format:
          - prometheus
      tlsConfig:
        insecureSkipVerify: true
  namespaceSelector:
    matchNames:
      - openbao
