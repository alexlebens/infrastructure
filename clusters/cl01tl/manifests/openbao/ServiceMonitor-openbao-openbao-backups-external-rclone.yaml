apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openbao-openbao-backups-external-rclone
  labels:
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openbao-backups-external-rclone
    app.kubernetes.io/version: v1.74.3
    helm.sh/chart: rclone-openbao-backups-external-0.12.5
  namespace: openbao
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - openbao
  selector:
    matchLabels:
      app.kubernetes.io/instance: openbao
      app.kubernetes.io/name: openbao-backups-external-rclone
  endpoints:
    - interval: 10s
      path: /metrics
      port: rc-sync
      relabelings:
        - action: drop
          regex: Succeeded|Failed
          sourceLabels:
            - __meta_kubernetes_pod_phase
      scrapeTimeout: 5s
