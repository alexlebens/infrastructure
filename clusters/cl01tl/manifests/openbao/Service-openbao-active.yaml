apiVersion: v1
kind: Service
metadata:
  name: openbao-active
  namespace: openbao
  labels:
    helm.sh/chart: openbao-0.27.2
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/managed-by: Helm
    openbao-active: "true"
spec:
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8200
      targetPort: 8200
      appProtocol: HTTP
    - name: https-internal
      port: 8201
      targetPort: 8201
  selector:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: openbao
    component: server
    openbao-active: "true"
