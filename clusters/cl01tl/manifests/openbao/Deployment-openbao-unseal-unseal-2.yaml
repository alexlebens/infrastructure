apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-unseal-unseal-2
  labels:
    app.kubernetes.io/controller: unseal-2
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openbao
    helm.sh/chart: unseal-4.6.2
  namespace: openbao
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: unseal-2
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: unseal-2
        app.kubernetes.io/instance: openbao
        app.kubernetes.io/name: openbao
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - envFrom:
            - secretRef:
                name: openbao-unseal-config-2
            - secretRef:
                name: openbao-ntfy-unseal-config
          image: ghcr.io/lrstanley/vault-unseal:1.0.0@sha256:9b936fadc8dea2a473972806bffc218a4dd2fbc3b373566138a60e058cc544aa
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
