apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-unseal-unseal-1
  labels:
    app.kubernetes.io/controller: unseal-1
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openbao
    helm.sh/chart: unseal-4.6.2
  namespace: openbao
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: unseal-1
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: unseal-1
        app.kubernetes.io/instance: openbao
        app.kubernetes.io/name: openbao
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - envFrom:
            - secretRef:
                name: openbao-unseal-config-1
          image: ghcr.io/lrstanley/vault-unseal:1.0.0@sha256:24ca9bceccdb0a22ae57574346dee4bec107c9b849f836811972b8f7f1baa4ef
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
