apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundcube-key
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube-key
    app.kubernetes.io/instance: roundcube
    app.kubernetes.io/part-of: roundcube
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: DES_KEY
      remoteRef:
        key: /cl01tl/roundcube/key
        property: des-key
