apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-qui-config-data-backup-secret-external
  namespace: qbittorrent
  labels:
    helm.sh/chart: volsync-target-qui-config-1.1.1
    app.kubernetes.io/instance: qbittorrent
    app.kubernetes.io/part-of: qbittorrent
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: qbittorrent-qui-config-data-backup-secret-external
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "s3:{{ .ENDPOINT }}/{{ .BUCKET }}/cl01tl/qbittorrent/qbittorrent-qui-config-data"
  data:
    - secretKey: ENDPOINT
      remoteRef:
        key: /digital-ocean/config
        property: ENDPOINT
    - secretKey: BUCKET
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: BUCKET
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: RESTIC_PASSWORD
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_REGION
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_SECRET_ACCESS_KEY
