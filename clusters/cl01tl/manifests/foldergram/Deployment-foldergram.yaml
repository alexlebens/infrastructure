apiVersion: apps/v1
kind: Deployment
metadata:
  name: foldergram
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram
    helm.sh/chart: foldergram-5.0.1
  namespace: foldergram
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: foldergram
      app.kubernetes.io/instance: foldergram
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: foldergram
        app.kubernetes.io/name: foldergram
    spec:
      enableServiceLinks: false
      serviceAccountName: foldergram
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: IMAGE_DETAIL_SOURCE
              value: original
            - name: DERIVATIVE_MODE
              value: lazy
            - name: DATA_ROOT
              value: ./data
            - name: GALLERY_ROOT
              value: /gallery
            - name: CSRF_TRUSTED_ORIGINS
              value: https://foldergram.alexlebens.net, https://art.alexlebens.dev
          image: ghcr.io/foldergram/foldergram:1.2.2@sha256:f72dfe39d9042555fd1b509a06f6c93c8b9a8be02541c80135a9a8f25fe362d4
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 200Mi
          volumeMounts:
            - mountPath: /app/data
              name: data
            - mountPath: /app/data/db
              name: db
            - mountPath: /gallery/Minneapolis Institute of Art
              name: pictures-mia
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: foldergram-data
        - name: db
          persistentVolumeClaim:
            claimName: foldergram-db
        - name: pictures-mia
          persistentVolumeClaim:
            claimName: foldergram-pictures-collection-mia-nfs-storage
