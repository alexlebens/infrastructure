apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: foldergram-data-backup-source-remote
  namespace: foldergram
  labels:
    helm.sh/chart: volsync-target-data-0.8.0
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/part-of: foldergram
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram-data-backup
spec:
  sourcePVC: foldergram-data
  trigger:
    schedule: 46 12 * * *
  restic:
    pruneIntervalDays: 7
    repository: foldergram-data-backup-secret-remote
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
