apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: foldergram-db-backup-source-external
  namespace: foldergram
  labels:
    helm.sh/chart: volsync-target-db-2.1.0
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/part-of: foldergram
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram-db-backup
spec:
  sourcePVC: foldergram-db
  trigger:
    schedule: 0 9 * * 1
  restic:
    pruneIntervalDays: 35
    repository: foldergram-db-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
