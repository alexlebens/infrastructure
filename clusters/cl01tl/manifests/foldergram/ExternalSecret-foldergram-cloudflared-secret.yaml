apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: foldergram-cloudflared-secret
  namespace: foldergram
  labels:
    helm.sh/chart: cloudflared-2.5.0
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/part-of: foldergram
    app.kubernetes.io/version: "2.5.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram-cloudflared-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: cf-tunnel-token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cloudflare/tunnels/foldergram
        metadataPolicy: None
        property: token
