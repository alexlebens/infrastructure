kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: foldergram-data
  labels:
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram
    helm.sh/chart: foldergram-4.6.2
  namespace: foldergram
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "40Gi"
  storageClassName: "ceph-block"
