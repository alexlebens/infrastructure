apiVersion: v1
kind: PersistentVolume
metadata:
  name: foldergram-pictures-collections-nfs-storage
  namespace: foldergram
  labels:
    app.kubernetes.io/name: foldergram-pictures-collections-nfs-storage
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/part-of: foldergram
spec:
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-client
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: '/volume2/Storage/Pictures/Collections/Minneapolis Institute of Art'
    server: synologybond.alexlebens.net
  mountOptions:
    - vers=4
    - minorversion=1
    - noac
