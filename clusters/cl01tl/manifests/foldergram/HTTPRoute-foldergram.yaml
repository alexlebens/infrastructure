apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: foldergram
  labels:
    app.kubernetes.io/instance: foldergram
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: foldergram
    helm.sh/chart: foldergram-4.6.2
  namespace: foldergram
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - "foldergram.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: foldergram
          namespace: foldergram
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
