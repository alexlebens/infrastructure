apiVersion: apps/v1
kind: Deployment
metadata:
  name: languagetool
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: languagetool
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: languagetool
    helm.sh/chart: languagetool-4.6.2
  namespace: languagetool
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: languagetool
      app.kubernetes.io/instance: languagetool
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: languagetool
        app.kubernetes.io/name: languagetool
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: langtool_languageModel
              value: /ngrams
            - name: Java_Xms
              value: 512m
            - name: Java_Xmx
              value: 1g
          image: erikvl87/languagetool:6.7@sha256:454acc9b3d232bdf37a0eddb1c8d0e93513ce41b914a8a374e3c44a884122364
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 800Mi
          volumeMounts:
            - mountPath: /ngrams
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: languagetool-data
