apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: languagetool-data-backup-source-remote
  namespace: languagetool
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: languagetool
    app.kubernetes.io/part-of: languagetool
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: languagetool-data-backup
spec:
  sourcePVC: languagetool-data
  trigger:
    schedule: 15 10 * * 2
  restic:
    pruneIntervalDays: 7
    repository: languagetool-data-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
