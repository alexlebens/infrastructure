apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: languagetool-data-backup-source-local
  namespace: languagetool
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: languagetool
    app.kubernetes.io/part-of: languagetool
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: languagetool-data-backup-source-local
spec:
  sourcePVC: languagetool-data
  trigger:
    schedule: 15 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: languagetool-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
