apiVersion: gateway.networking.k8s.io/v1alpha2
kind: HTTPRoute
metadata:
  name: radarr
  labels:
    app.kubernetes.io/instance: radarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: radarr
    helm.sh/chart: radarr-4.6.2
  namespace: radarr
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - "radarr.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: ak-outpost-traefik-proxy-auth
          namespace: authentik
          port: 9000
          weight: 100
      matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
    - backendRefs:
        - group: ""
          kind: Service
          name: radarr
          namespace: radarr
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - extensionRef:
            group: traefik.io
            kind: Middleware
            name: oidc-forward-auth
          type: ExtensionRef
