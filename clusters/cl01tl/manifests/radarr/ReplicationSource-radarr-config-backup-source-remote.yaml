apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: radarr-config-backup-source-remote
  namespace: radarr
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: radarr
    app.kubernetes.io/part-of: radarr
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: radarr-config-backup
spec:
  sourcePVC: radarr-config
  trigger:
    schedule: 30 10 * * 4
  restic:
    pruneIntervalDays: 7
    repository: radarr-config-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 1000
      runAsUser: 1000
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
