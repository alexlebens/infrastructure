apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bazarr-key
  namespace: bazarr
  labels:
    app.kubernetes.io/name: bazarr-key
    app.kubernetes.io/instance: bazarr
    app.kubernetes.io/part-of: bazarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: key
      remoteRef:
        key: /cl01tl/bazarr/key
        property: key
