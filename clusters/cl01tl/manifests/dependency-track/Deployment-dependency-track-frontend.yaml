apiVersion: apps/v1
kind: Deployment
metadata:
  name: dependency-track-frontend
  namespace: dependency-track
  labels:
    helm.sh/chart: dependency-track-0.44.0
    app.kubernetes.io/part-of: dependency-track
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: dependency-track
    app.kubernetes.io/name: dependency-track-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: 4.14.1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: dependency-track
      app.kubernetes.io/name: dependency-track-frontend
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: dependency-track
        app.kubernetes.io/name: dependency-track-frontend
        app.kubernetes.io/component: frontend
    spec:
      enableServiceLinks: true
      initContainers:
      serviceAccountName: dependency-track
      securityContext:
        fsGroup: 1000
      containers:
        - name: dependency-track-frontend
          image: docker.io/dependencytrack/frontend:4.14.1@sha256:8217737050b26ea69a6ddd6fe2cb419531a0bae0b903a87a04077a2415fc9f35
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits: {}
            requests:
              cpu: 10m
              memory: 60Mi
          env:
            - name: API_BASE_URL
              value: "dependency-track.alexlebens.net"
            - name: OIDC_ISSUER
              value: https://authentik.alexlebens.net/application/o/dependency-track/
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: client
                  name: dependency-track-oidc-secret
            - name: OIDC_LOGIN_BUTTON_TEXT
              value: Authentik
          ports:
            - name: web
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              scheme: HTTP
              port: web
              path: /
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              scheme: HTTP
              port: web
              path: /
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
