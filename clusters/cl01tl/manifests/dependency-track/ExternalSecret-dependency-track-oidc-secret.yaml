apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dependency-track-oidc-secret
  namespace: dependency-track
  labels:
    app.kubernetes.io/name: dependency-track-oidc-secret
    app.kubernetes.io/instance: dependency-track
    app.kubernetes.io/part-of: dependency-track
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: client
      remoteRef:
        key: /authentik/oidc/dependency-track
        property: client
    - secretKey: secret
      remoteRef:
        key: /authentik/oidc/dependency-track
        property: secret
