apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome-feishin
  labels:
    app.kubernetes.io/controller: feishin
    app.kubernetes.io/instance: navidrome
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: navidrome
    helm.sh/chart: navidrome-5.0.1
  namespace: navidrome
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: feishin
      app.kubernetes.io/name: navidrome
      app.kubernetes.io/instance: navidrome
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: feishin
        app.kubernetes.io/instance: navidrome
        app.kubernetes.io/name: navidrome
    spec:
      enableServiceLinks: false
      serviceAccountName: navidrome
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: SERVER_NAME
              value: talos
            - name: SERVER_LOCK
              value: "true"
            - name: SERVER_TYPE
              value: navidrome
            - name: SERVER_URL
              value: https://navidrome.alexlebens.net
          image: ghcr.io/jeffvli/feishin:1.12.0@sha256:383fa33695d532d95344157f4fff412f5c449e837fb8b2ae9231ba49cad03e34
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
