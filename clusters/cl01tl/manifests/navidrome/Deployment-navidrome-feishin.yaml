apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome-feishin
  labels:
    app.kubernetes.io/controller: feishin
    app.kubernetes.io/instance: navidrome
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: navidrome
    helm.sh/chart: navidrome-4.6.2
  namespace: navidrome
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: feishin
      app.kubernetes.io/name: navidrome
      app.kubernetes.io/instance: navidrome
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: feishin
        app.kubernetes.io/instance: navidrome
        app.kubernetes.io/name: navidrome
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: SERVER_NAME
              value: talos
            - name: SERVER_LOCK
              value: "true"
            - name: SERVER_TYPE
              value: navidrome
            - name: SERVER_URL
              value: https://navidrome.alexlebens.net
          image: ghcr.io/jeffvli/feishin:1.9.0@sha256:5e6959afd27dabadd8f68fed8b0485d851593c61ca558194295bf8950262cc07
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
