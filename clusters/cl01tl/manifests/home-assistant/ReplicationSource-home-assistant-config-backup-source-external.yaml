apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: home-assistant-config-backup-source-external
  namespace: home-assistant
  labels:
    helm.sh/chart: volsync-target-config-2.1.0
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/part-of: home-assistant
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: home-assistant-config-backup
spec:
  sourcePVC: home-assistant-config
  trigger:
    schedule: 25 9 * * 1
  restic:
    pruneIntervalDays: 35
    repository: home-assistant-config-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
