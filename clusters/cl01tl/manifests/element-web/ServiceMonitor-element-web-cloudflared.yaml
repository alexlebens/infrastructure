apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: element-web-cloudflared
  labels:
    app.kubernetes.io/instance: element-web
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/version: 2026.5.0
    helm.sh/chart: cloudflared-3.3.1
  namespace: element-web
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - element-web
  selector:
    matchLabels:
      app.kubernetes.io/instance: element-web
      app.kubernetes.io/name: cloudflared
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 10s
