apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: it06cm-config
  namespace: frigate
  labels:
    app.kubernetes.io/name: it06cm-config
    app.kubernetes.io/instance: frigate
    app.kubernetes.io/part-of: frigate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: user
      remoteRef:
        key: /cl01tl/it06cm/auth
        property: user
    - secretKey: password
      remoteRef:
        key: /cl01tl/it06cm/auth
        property: password
