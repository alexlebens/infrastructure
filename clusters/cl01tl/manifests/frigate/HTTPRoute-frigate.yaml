apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate
  labels:
    app.kubernetes.io/instance: frigate
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: frigate
    helm.sh/chart: frigate-5.0.1
  namespace: frigate
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: "traefik"
  hostnames:
    - "frigate.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frigate-main
          namespace: frigate
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
