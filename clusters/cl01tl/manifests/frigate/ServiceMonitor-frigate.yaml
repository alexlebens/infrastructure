apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frigate
  labels:
    app.kubernetes.io/instance: frigate
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: frigate
    helm.sh/chart: frigate-5.0.1
  namespace: frigate
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - frigate
  selector:
    matchLabels:
      app.kubernetes.io/instance: frigate
      app.kubernetes.io/name: frigate
  endpoints:
    - interval: 1m
      path: /api/metrics
      port: http
      scheme: http
      scrapeTimeout: 10s
