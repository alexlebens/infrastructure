kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: frigate-media
  labels:
    app.kubernetes.io/instance: frigate
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: frigate
    helm.sh/chart: frigate-5.0.1
  namespace: frigate
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "500Gi"
  storageClassName: "synology-iscsi-delete"
