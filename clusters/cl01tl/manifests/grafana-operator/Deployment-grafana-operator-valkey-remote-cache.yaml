apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-operator-valkey-remote-cache
  labels:
    helm.sh/chart: valkey-0.9.3
    app.kubernetes.io/name: valkey-remote-cache
    app.kubernetes.io/instance: grafana-operator
    app.kubernetes.io/version: "9.0.3"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey-remote-cache
      app.kubernetes.io/instance: grafana-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-remote-cache
        app.kubernetes.io/instance: grafana-operator
      annotations:
        checksum/initconfig: d790dfe3185267fe6c217c9572cfa9fb
    spec:
      automountServiceAccountToken: false
      serviceAccountName: grafana-operator-valkey-remote-cache
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      initContainers:
        - name: grafana-operator-valkey-remote-cache-init
          image: docker.io/valkey/valkey:9.0.3
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          command: ["/scripts/init.sh"]
          volumeMounts:
            - name: valkey-data
              mountPath: /data
            - name: scripts
              mountPath: /scripts
      containers:
        - name: grafana-operator-valkey-remote-cache
          image: docker.io/valkey/valkey:9.0.3
          imagePullPolicy: IfNotPresent
          command: ["valkey-server"]
          args: ["/data/conf/valkey.conf"]
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: VALKEY_LOGLEVEL
              value: "notice"
          ports:
            - name: tcp
              containerPort: 6379
              protocol: TCP
          startupProbe:
            exec:
              command: ["sh", "-c", "valkey-cli ping"]
          livenessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli ping"]
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
          volumeMounts:
            - name: valkey-data
              mountPath: /data
        - name: metrics
          image: ghcr.io/oliver006/redis_exporter:v1.81.0
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: metrics
              containerPort: 9121
          startupProbe:
            tcpSocket:
              port: metrics
          livenessProbe:
            tcpSocket:
              port: metrics
          readinessProbe:
            httpGet:
              path: /
              port: metrics
          resources:
            requests:
              cpu: 10m
              memory: 64M
          env:
            - name: REDIS_ALIAS
              value: grafana-operator-valkey-remote-cache
      volumes:
        - name: scripts
          configMap:
            name: grafana-operator-valkey-remote-cache-init-scripts
            defaultMode: 0555
        - name: valkey-data
          persistentVolumeClaim:
            claimName: grafana-operator-valkey-remote-cache
