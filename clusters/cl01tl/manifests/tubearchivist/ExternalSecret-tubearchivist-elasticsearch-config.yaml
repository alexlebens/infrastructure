apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tubearchivist-elasticsearch-config
  namespace: tubearchivist
  labels:
    app.kubernetes.io/name: tubearchivist-elasticsearch-config
    app.kubernetes.io/instance: tubearchivist
    app.kubernetes.io/part-of: tubearchivist
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: username
      remoteRef:
        key: /cl01tl/tubearchivist/elasticsearch
        property: username
    - secretKey: password
      remoteRef:
        key: /cl01tl/tubearchivist/elasticsearch
        property: password
    - secretKey: roles
      remoteRef:
        key: /cl01tl/tubearchivist/elasticsearch
        property: roles
