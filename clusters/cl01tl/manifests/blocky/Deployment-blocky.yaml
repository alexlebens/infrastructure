apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: blocky
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blocky
    helm.sh/chart: blocky-5.0.1
  namespace: blocky
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: blocky
      app.kubernetes.io/instance: blocky
  template:
    metadata:
      annotations:
        checksum/configMaps: 8aadfb0f8e3c44c960e3daba036be7e8b635c50df168eef754e6cdd0745e118c
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: blocky
        app.kubernetes.io/name: blocky
    spec:
      enableServiceLinks: false
      serviceAccountName: blocky
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
          image: ghcr.io/0xerr0r/blocky:v0.30.0@sha256:d9f15eddffedded40797406349012cbd5966ef99c286b13321e7a76efddb9bdc
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
          volumeMounts:
            - mountPath: /app/config.yml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: config.yml
      volumes:
        - configMap:
            name: blocky
          name: config
