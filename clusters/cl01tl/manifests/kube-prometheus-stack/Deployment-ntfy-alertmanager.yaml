apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-alertmanager
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kube-prometheus-stack
    helm.sh/chart: ntfy-alertmanager-4.6.2
  namespace: kube-prometheus-stack
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: kube-prometheus-stack
      app.kubernetes.io/instance: kube-prometheus-stack
  template:
    metadata:
      annotations:
        checksum/secrets: 3c0d4bd47e7d4f71ba55611ddc7b74c5f3ec1cedcc474b15ac0a00daab9b791a
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: kube-prometheus-stack
        app.kubernetes.io/name: kube-prometheus-stack
    spec:
      enableServiceLinks: false
      serviceAccountName: ntfy-alertmanager
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: xenrox/ntfy-alertmanager:1.0.0@sha256:81788c7905774b7b0b2ed6833b2bc4826a90a42e4b738706edcedd5f489e7a73
          name: main
          volumeMounts:
            - mountPath: /etc/ntfy-alertmanager/config
              mountPropagation: None
              name: config
              readOnly: true
              subPath: config
      volumes:
        - csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ntfy-alertmanager-config
          name: config
