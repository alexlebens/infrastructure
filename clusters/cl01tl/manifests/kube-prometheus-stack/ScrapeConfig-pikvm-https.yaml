apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: pikvm-https
  namespace: kube-prometheus-stack
  labels:
    app.kubernetes.io/name: pikvm-https
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  staticConfigs:
    - labels:
        job: pikvm
      targets:
        - dv02kv.alexlebens.net
  metricsPath: /api/export/prometheus/metrics
  scheme: HTTPS
  basicAuth:
    username:
      name: pikvm-credentials
      key: username
    password:
      name: pikvm-credentials
      key: password
