apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pikvm-credentials
  namespace: kube-prometheus-stack
  labels:
    app.kubernetes.io/name: pikvm-credentials
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: username
      remoteRef:
        key: /dv02kv/pikvm/config
        property: username
    - secretKey: password
      remoteRef:
        key: /dv02kv/pikvm/config
        property: password
