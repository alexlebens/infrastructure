apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: dawarich-watched-backup-source-remote
  namespace: dawarich
  labels:
    helm.sh/chart: volsync-target-watched-0.8.0
    app.kubernetes.io/instance: dawarich
    app.kubernetes.io/part-of: dawarich
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dawarich-watched-backup
spec:
  sourcePVC: dawarich-watched
  trigger:
    schedule: 8 9 * * *
  restic:
    pruneIntervalDays: 7
    repository: dawarich-watched-backup-secret-remote
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
