apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: dawarich-public-backup-source-external
  namespace: dawarich
  labels:
    helm.sh/chart: volsync-target-public-2.0.0
    app.kubernetes.io/instance: dawarich
    app.kubernetes.io/part-of: dawarich
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dawarich-public-backup
spec:
  sourcePVC: dawarich-public
  trigger:
    schedule: 35 9 * * 0
  restic:
    pruneIntervalDays: 35
    repository: dawarich-public-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
