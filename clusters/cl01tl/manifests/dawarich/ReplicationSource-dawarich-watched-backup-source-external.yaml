apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: dawarich-watched-backup-source-external
  namespace: dawarich
  labels:
    helm.sh/chart: volsync-target-watched-2.1.0
    app.kubernetes.io/instance: dawarich
    app.kubernetes.io/part-of: dawarich
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dawarich-watched-backup
spec:
  sourcePVC: dawarich-watched
  trigger:
    schedule: 40 9 * * 0
  restic:
    pruneIntervalDays: 35
    repository: dawarich-watched-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
