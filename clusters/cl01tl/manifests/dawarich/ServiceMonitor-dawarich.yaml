apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dawarich
  labels:
    app.kubernetes.io/instance: dawarich
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dawarich
    helm.sh/chart: dawarich-5.0.0
  namespace: dawarich
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - dawarich
  selector:
    matchLabels:
      app.kubernetes.io/instance: dawarich
      app.kubernetes.io/name: dawarich
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 15s
