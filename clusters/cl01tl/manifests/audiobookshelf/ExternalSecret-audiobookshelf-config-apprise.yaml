apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audiobookshelf-config-apprise
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf-config-apprise
    app.kubernetes.io/instance: audiobookshelf
    app.kubernetes.io/part-of: audiobookshelf
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        ntfy-url: "{{ .endpoint }}/audiobookshelf"
  data:
    - secretKey: endpoint
      remoteRef:
        key: /cl01tl/ntfy/users/cl01tl
        property: internal-endpoint-credential
