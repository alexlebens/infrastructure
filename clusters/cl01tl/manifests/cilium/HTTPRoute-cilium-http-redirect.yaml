apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cilium-http-redirect
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-http-redirect
    app.kubernetes.io/instance: cilium
    app.kubernetes.io/part-of: cilium
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: kube-system
      sectionName: http
  hostnames:
    - "*.alexlebens.net"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
