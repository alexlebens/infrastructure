apiVersion: v1
kind: Service
metadata:
  name: kyoo-postgres-headless
  namespace: "kyoo"
  labels:
    helm.sh/chart: postgres-0.12.4
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: kyoo
    app.kubernetes.io/version: "18.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: kyoo
