apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: "kyoo-postgresql-18-recovery"
  namespace: kyoo
  labels:
    helm.sh/chart: postgres-18-cluster-7.11.2
    app.kubernetes.io/instance: kyoo
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "7.11.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: "kyoo-postgresql-18-recovery"
spec:
  configuration:
    destinationPath: s3://postgres-backups/cl01tl/kyoo/kyoo-postgresql-18-cluster
    endpointURL: http://garage-main.garage:3900
    wal:
      compression: snappy
      maxParallel: 1
    data:
      compression: snappy
      jobs: 1
    s3Credentials:
      accessKeyId:
        name: kyoo-postgresql-18-recovery-secret
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: kyoo-postgresql-18-recovery-secret
        key: ACCESS_SECRET_KEY
      region:
        name: kyoo-postgresql-18-recovery-secret
        key: ACCESS_REGION
