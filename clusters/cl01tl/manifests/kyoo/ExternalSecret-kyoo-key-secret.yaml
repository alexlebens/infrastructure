apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kyoo-key-secret
  namespace: kyoo
  labels:
    app.kubernetes.io/name: kyoo-key-secret
    app.kubernetes.io/instance: kyoo
    app.kubernetes.io/part-of: kyoo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: rsa-private
      remoteRef:
        key: /cl01tl/kyoo/key
        property: rsa-private
    - secretKey: scanner-apikey
      remoteRef:
        key: /cl01tl/kyoo/key
        property: scanner
    - secretKey: tmdb-apikey
      remoteRef:
        key: /tmdb/alexlebens
        property: api-key
    - secretKey: tvdb-apikey
      remoteRef:
        key: /tvdb/alexlebens
        property: api-key
