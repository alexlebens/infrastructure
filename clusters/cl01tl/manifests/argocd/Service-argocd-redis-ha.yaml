apiVersion: v1
kind: Service
metadata:
  name: argocd-redis-ha
  namespace: "argocd"
  labels:
    app: redis-ha
    heritage: "Helm"
    release: "argocd"
    chart: redis-ha-4.34.11
    exporter: enabled
  annotations:
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-server
      port: 6379
      protocol: TCP
      targetPort: redis
    - name: tcp-sentinel
      port: 26379
      protocol: TCP
      targetPort: sentinel
    - name: http-exporter-port
      port: 9121
      protocol: TCP
      targetPort: exporter-port
  selector:
    release: argocd
    app: redis-ha
