apiVersion: v1
kind: Pod
metadata:
  name: argocd-redis-ha-service-test
  namespace: "argocd"
  labels:
    app: redis-ha
    heritage: "Helm"
    release: "argocd"
    chart: redis-ha-4.34.11
  annotations:
    "helm.sh/hook": test-success
spec:
  nodeSelector: {}
  tolerations: []
  containers:
    - name: "argocd-service-test"
      image: redis:8.6.3-alpine@sha256:69f2c586c8a7e9cce4ae1ee9bbaf60bc4bb5f4bb3880e4ed022b1fd758a7cab9
      command:
        - sh
        - -c
        - redis-cli -h argocd-redis-ha-haproxy -p 6379 info server
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
