apiVersion: v1
kind: Pod
metadata:
  name: argocd-redis-ha-service-test
  namespace: "argocd"
  labels:
    app: redis-ha
    heritage: "Helm"
    release: "argocd"
    chart: redis-ha-4.34.11
  annotations:
    "helm.sh/hook": test-success
spec:
  nodeSelector: {}
  tolerations: []
  containers:
    - name: "argocd-service-test"
      image: redis:8.8.0-alpine@sha256:cc4528bddf546d352dcb171aa39bf1650c23b85a463784e9e9dea16ece1d18e8
      command:
        - sh
        - -c
        - redis-cli -h argocd-redis-ha-haproxy -p 6379 info server
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
