apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-redis-ha-haproxy
  namespace: "argocd"
  labels:
    app: redis-ha
    heritage: "Helm"
    release: "argocd"
    chart: redis-ha-4.34.11
spec:
  endpoints:
    - targetPort: 9101
  jobLabel: argocd-redis-ha-haproxy
  namespaceSelector:
    matchNames:
      - "argocd"
  selector:
    matchLabels:
      app: redis-ha
      release: argocd
      component: haproxy
