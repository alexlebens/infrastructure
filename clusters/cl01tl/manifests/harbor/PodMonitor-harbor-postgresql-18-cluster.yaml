apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: harbor-postgresql-18-cluster
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.13.3
    app.kubernetes.io/instance: harbor
    app.kubernetes.io/part-of: harbor
    app.kubernetes.io/version: "7.13.3"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: harbor-postgresql-18-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
