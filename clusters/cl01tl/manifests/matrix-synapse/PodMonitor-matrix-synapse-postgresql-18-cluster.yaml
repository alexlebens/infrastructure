apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: matrix-synapse-postgresql-18-cluster
  namespace: matrix-synapse
  labels:
    app.kubernetes.io/name: matrix-synapse-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.14.0
    app.kubernetes.io/instance: matrix-synapse
    app.kubernetes.io/part-of: matrix-synapse
    app.kubernetes.io/version: "7.14.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: matrix-synapse-postgresql-18-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
