apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-synapse-wellknown-lighttpd
  labels:
    helm.sh/chart: matrix-synapse-3.12.30
    app.kubernetes.io/name: matrix-synapse
    app.kubernetes.io/instance: matrix-synapse
    app.kubernetes.io/version: "1.155.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: well-known
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix-synapse
      app.kubernetes.io/instance: matrix-synapse
      app.kubernetes.io/component: well-known
  template:
    metadata:
      annotations:
        checksum/config: 9dcbb471819cf3a92296739e4cd2aa2608898a32de2a3ccd07c13b1fad5819e3
      labels:
        app.kubernetes.io/name: matrix-synapse
        app.kubernetes.io/instance: matrix-synapse
        app.kubernetes.io/component: well-known
    spec:
      securityContext: {}
      containers:
        - name: lighttpd
          image: "ghcr.io/rtsp/docker-lighttpd:1.4.76@sha256:b4b58d217a35dbd6cade82927677de404a46fb3d2b1d5fcb42042b6a6f17b2fb"
          imagePullPolicy: Always
          securityContext: {}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            httpGet:
              path: /server-status
              port: http
          volumeMounts:
            - mountPath: /etc/lighttpd/lighttpd.conf
              name: files
              subPath: lighttpd.conf
            - mountPath: /var/www/localhost/htdocs/client.json
              name: files
              subPath: client.json
            - mountPath: /var/www/localhost/htdocs/server.json
              name: files
              subPath: server.json
            - mountPath: /run
              name: run
          resources: {}
      volumes:
        - name: files
          configMap:
            name: matrix-synapse-wellknown-lighttpd
        - name: run
          emptyDir: {}
