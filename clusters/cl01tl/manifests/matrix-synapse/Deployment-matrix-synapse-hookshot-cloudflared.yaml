apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-synapse-hookshot-cloudflared
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: matrix-synapse
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hookshot-cloudflared
    app.kubernetes.io/version: 2026.5.1
    helm.sh/chart: cloudflared-hookshot-3.3.2
  namespace: matrix-synapse
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: hookshot-cloudflared
      app.kubernetes.io/instance: matrix-synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: matrix-synapse
        app.kubernetes.io/name: hookshot-cloudflared
    spec:
      enableServiceLinks: false
      serviceAccountName: matrix-synapse-hookshot-cloudflared
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - args:
            - tunnel
            - --protocol
            - auto
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:20241
            - run
            - --token
            - $(CF_MANAGED_TUNNEL_TOKEN)
          env:
            - name: CF_MANAGED_TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  key: cf-tunnel-token
                  name: matrix-synapse-hookshot-cloudflared-secret
          image: cloudflare/cloudflared:2026.5.1@sha256:a5b5e6fd9a372f054b9a843c219bfbcdceb54691605312a8b1ee72978bdf1aa1
          imagePullPolicy: IfNotPresent
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
