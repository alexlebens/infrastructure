apiVersion: v1
kind: Service
metadata:
  name: rclone-web-assets-remote-rclone
  labels:
    app.kubernetes.io/instance: rclone
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: web-assets-remote-rclone
    app.kubernetes.io/service: rclone-web-assets-remote-rclone
    app.kubernetes.io/version: v1.74.1
    helm.sh/chart: rclone-web-assets-remote-0.11.2
  namespace: rclone
spec:
  type: ClusterIP
  ports:
    - port: 5575
      targetPort: 5575
      protocol: TCP
      name: metrics-prune
    - port: 5573
      targetPort: 5573
      protocol: TCP
      name: metrics-sync
    - port: 5574
      targetPort: 5574
      protocol: TCP
      name: rc-prune
    - port: 5572
      targetPort: 5572
      protocol: TCP
      name: rc-sync
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: rclone
    app.kubernetes.io/name: web-assets-remote-rclone
