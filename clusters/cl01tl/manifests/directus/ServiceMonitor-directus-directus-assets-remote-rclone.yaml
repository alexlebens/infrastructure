apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: directus-directus-assets-remote-rclone
  labels:
    app.kubernetes.io/instance: directus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: directus-assets-remote-rclone
    app.kubernetes.io/version: v1.74.0
    helm.sh/chart: rclone-directus-assets-remote-0.9.0
  namespace: directus
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - directus
  selector:
    matchLabels:
      app.kubernetes.io/instance: directus-assets-remote-rclone
      app.kubernetes.io/name: directus-assets-remote-rclone
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 10s
