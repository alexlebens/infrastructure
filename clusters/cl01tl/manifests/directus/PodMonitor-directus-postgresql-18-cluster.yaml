apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: directus-postgresql-18-cluster
  namespace: directus
  labels:
    app.kubernetes.io/name: directus-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.14.0
    app.kubernetes.io/instance: directus
    app.kubernetes.io/part-of: directus
    app.kubernetes.io/version: "7.14.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: directus-postgresql-18-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
