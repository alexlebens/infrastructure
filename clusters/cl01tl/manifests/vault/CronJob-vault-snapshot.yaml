apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-snapshot
  labels:
    app.kubernetes.io/controller: snapshot
    app.kubernetes.io/instance: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: vault
    helm.sh/chart: snapshot-4.6.2
  namespace: vault
spec:
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 30
  timeZone: America/Chicago
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      parallelism: 1
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/controller: snapshot
            app.kubernetes.io/instance: vault
            app.kubernetes.io/name: vault
        spec:
          enableServiceLinks: false
          serviceAccountName: vault
          automountServiceAccountToken: true
          hostIPC: false
          hostNetwork: false
          hostPID: false
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          initContainers:
            - args:
                - -ec
                - /scripts/snapshot.sh
              command:
                - /bin/ash
              env:
                - name: VAULT_ADDR
                  value: http://vault-active.vault.svc.cluster.local:8200
              envFrom:
                - secretRef:
                    name: vault-snapshot-agent-role
              image: hashicorp/vault:2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
              name: snapshot
              volumeMounts:
                - mountPath: /opt/backup
                  name: backup
                - mountPath: /scripts/snapshot.sh
                  name: snapshot-script
                  subPath: snapshot.sh
          containers:
            - args:
                - -ec
                - /scripts/backup.sh
              command:
                - /bin/sh
              env:
                - name: BUCKET
                  valueFrom:
                    secretKeyRef:
                      key: BUCKET
                      name: vault-backup-external-config
                - name: TARGET
                  value: External
              envFrom:
                - secretRef:
                    name: vault-ntfy-config
              image: d3fk/s3cmd:latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
              name: s3-backup-external
              volumeMounts:
                - mountPath: /opt/backup
                  name: backup
                - mountPath: /root/.s3cfg
                  mountPropagation: None
                  name: backup-external-config
                  readOnly: true
                  subPath: .s3cfg
                - mountPath: /scripts/backup.sh
                  name: backup-script
                  subPath: backup.sh
            - args:
                - -ec
                - /scripts/backup.sh
              command:
                - /bin/sh
              env:
                - name: BUCKET
                  valueFrom:
                    secretKeyRef:
                      key: BUCKET
                      name: vault-backup-local-config
                - name: TARGET
                  value: Local
              envFrom:
                - secretRef:
                    name: vault-ntfy-config
              image: d3fk/s3cmd:latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
              name: s3-backup-local
              volumeMounts:
                - mountPath: /opt/backup
                  name: backup
                - mountPath: /root/.s3cfg
                  mountPropagation: None
                  name: backup-local-config
                  readOnly: true
                  subPath: .s3cfg
                - mountPath: /scripts/backup.sh
                  name: backup-script
                  subPath: backup.sh
            - args:
                - -ec
                - /scripts/backup.sh
              command:
                - /bin/sh
              env:
                - name: BUCKET
                  valueFrom:
                    secretKeyRef:
                      key: BUCKET
                      name: vault-backup-remote-config
                - name: TARGET
                  value: Remote
              envFrom:
                - secretRef:
                    name: vault-ntfy-config
              image: d3fk/s3cmd:latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
              name: s3-backup-remote
              volumeMounts:
                - mountPath: /opt/backup
                  name: backup
                - mountPath: /root/.s3cfg
                  mountPropagation: None
                  name: backup-remote-config
                  readOnly: true
                  subPath: .s3cfg
                - mountPath: /scripts/backup.sh
                  name: backup-script
                  subPath: backup.sh
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: vault-storage-backup
            - csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: vault-backup-external-config
              name: backup-external-config
            - csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: vault-backup-local-config
              name: backup-local-config
            - csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: vault-backup-remote-config
              name: backup-remote-config
            - configMap:
                defaultMode: 493
                name: vault-backup-script
              name: backup-script
            - configMap:
                defaultMode: 493
                name: vault-snapshot-script
              name: snapshot-script
