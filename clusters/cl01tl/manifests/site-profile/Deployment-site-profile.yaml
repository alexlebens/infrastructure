apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-profile
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: site-profile
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-profile
    helm.sh/chart: site-profile-5.0.1
  namespace: site-profile
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: site-profile
      app.kubernetes.io/instance: site-profile
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: site-profile
        app.kubernetes.io/name: site-profile
    spec:
      enableServiceLinks: false
      serviceAccountName: site-profile
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/site-profile:3.21.0@sha256:dae8734a45bb9fbd9a6190b6b5284563403bfd10962023d448685afc003b209c
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 60Mi
