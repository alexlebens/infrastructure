apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-profile
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: site-profile
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-profile
    helm.sh/chart: site-profile-5.0.1
  namespace: site-profile
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: site-profile
      app.kubernetes.io/instance: site-profile
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: site-profile
        app.kubernetes.io/name: site-profile
    spec:
      enableServiceLinks: false
      serviceAccountName: site-profile
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/site-profile:3.22.1@sha256:9841aaa806cf7822abd01b5bfceac53e9fe9bab57a7bee7aece05d8da8f95660
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 60Mi
