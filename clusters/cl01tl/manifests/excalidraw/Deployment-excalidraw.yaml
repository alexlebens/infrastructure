apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: excalidraw
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: excalidraw
    helm.sh/chart: excalidraw-4.6.2
  namespace: excalidraw
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: excalidraw
      app.kubernetes.io/instance: excalidraw
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: excalidraw
        app.kubernetes.io/name: excalidraw
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: America/Chicago
          image: excalidraw/excalidraw:latest@sha256:b6cd04431d88f2756a7c3095cf7970884e8fd6b2800c9445b5a60a5c715bbf0c
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
