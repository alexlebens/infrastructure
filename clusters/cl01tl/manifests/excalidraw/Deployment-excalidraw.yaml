apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: excalidraw
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: excalidraw
    helm.sh/chart: excalidraw-5.0.0
  namespace: excalidraw
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: excalidraw
      app.kubernetes.io/instance: excalidraw
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: excalidraw
        app.kubernetes.io/name: excalidraw
    spec:
      enableServiceLinks: false
      serviceAccountName: excalidraw
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: America/Chicago
          image: excalidraw/excalidraw:latest@sha256:f7ee194addd607bf831d2af0f0a34463dd4225e426cf35199ef0b12a803398e9
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
