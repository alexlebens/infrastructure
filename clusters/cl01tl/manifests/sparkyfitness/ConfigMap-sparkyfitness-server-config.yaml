apiVersion: v1
kind: ConfigMap
metadata:
  name: sparkyfitness-server-config
  labels:
    app.kubernetes.io/name: sparkyfitness
    app.kubernetes.io/instance: sparkyfitness
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: sparkyfitness-0.16.5-7
    app.kubernetes.io/component: server
data:
  NODE_ENV: "production"
  TZ: "America/Chicago"
  SPARKY_FITNESS_LOG_LEVEL: "info"
  SPARKY_FITNESS_DB_HOST: "sparkyfitness-postgresql-18-cluster-rw"
  SPARKY_FITNESS_DB_PORT: "5432"
  SPARKY_FITNESS_DB_NAME: "app"
  SPARKY_FITNESS_FRONTEND_URL: "https://sparkyfitness.alexlebens.net"
  SPARKY_FITNESS_DISABLE_SIGNUP: "false"
  ALLOW_PRIVATE_NETWORK_CORS: "true"
  SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS: "https://sparkyfitness.alexlebens.net"
  SPARKY_FITNESS_FORCE_EMAIL_LOGIN: "true"
  SPARKY_FITNESS_DISABLE_EMAIL_LOGIN: "false"
  SPARKY_FITNESS_OIDC_AUTH_ENABLED: "true"
  SPARKY_FITNESS_OIDC_PROVIDER_SLUG: "sparky-fitness"
  SPARKY_FITNESS_OIDC_PROVIDER_NAME: "Authentik"
  SPARKY_FITNESS_OIDC_ISSUER_URL: "https://authentik.alexlebens.net/application/o/sparky-fitness"
  SPARKY_FITNESS_OIDC_SCOPE: "openid email profile"
  SPARKY_FITNESS_OIDC_AUTO_REGISTER: "true"
  SPARKY_FITNESS_OIDC_AUTO_REDIRECT: "false"
  SPARKY_FITNESS_OIDC_LOGO_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/authentik.webp"
