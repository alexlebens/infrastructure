apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparkyfitness-server
  labels:
    app.kubernetes.io/name: sparkyfitness
    app.kubernetes.io/instance: sparkyfitness
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: sparkyfitness-0.16.5-7
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sparkyfitness
      app.kubernetes.io/instance: sparkyfitness
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: 7ee011b27eb2afafec798a38873ddb6cceeba9fcf9beba1b4b104fe5bc8baf71
      labels:
        app.kubernetes.io/name: sparkyfitness
        app.kubernetes.io/instance: sparkyfitness
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: sparkyfitness-server
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/codewithcj/sparkyfitness-server:v0.16.5.7@sha256:7cdb8cb3ae7f90c7590dac3b92cea3a8e24d51b28eb836a1f6d5201cd45bc080
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3010
              protocol: TCP
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
          envFrom:
            - configMapRef:
                name: sparkyfitness-server-config
          env:
            - name: SPARKY_FITNESS_API_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-key-secret
                  key: api_encryption_key
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-key-secret
                  key: better_auth_secret
            - name: SPARKY_FITNESS_APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-postgresql-18-cluster-app
                  key: username
            - name: SPARKY_FITNESS_APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-postgresql-18-cluster-app
                  key: password
            - name: SPARKY_FITNESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-postgresql-18-cluster-superuser
                  key: username
            - name: SPARKY_FITNESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-postgresql-18-cluster-superuser
                  key: password
            - name: SPARKY_FITNESS_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-oidc-secret
                  key: client_id
            - name: SPARKY_FITNESS_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-oidc-secret
                  key: client_secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsUser: 1000
          resources:
            limits: {}
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: backup
              mountPath: /app/SparkyFitnessServer/backup
            - name: uploads
              mountPath: /app/SparkyFitnessServer/uploads
            - name: temp-uploads
              mountPath: /app/SparkyFitnessServer/temp_uploads
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: sparkyfitness-server-backup
        - name: uploads
          persistentVolumeClaim:
            claimName: sparkyfitness-server-uploads
        - name: temp-uploads
          emptyDir: {}
        - name: tmp
          emptyDir: {}
