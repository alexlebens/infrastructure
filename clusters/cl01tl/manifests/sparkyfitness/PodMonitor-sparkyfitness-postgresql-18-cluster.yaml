apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sparkyfitness-postgresql-18-cluster
  namespace: sparkyfitness
  labels:
    app.kubernetes.io/name: sparkyfitness-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.15.2
    app.kubernetes.io/instance: sparkyfitness
    app.kubernetes.io/part-of: sparkyfitness
    app.kubernetes.io/version: "7.15.2"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: sparkyfitness-postgresql-18-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
