apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparkyfitness-key-secret
  namespace: sparkyfitness
  labels:
    app.kubernetes.io/name: sparkyfitness-key-secret
    app.kubernetes.io/instance: sparkyfitness
    app.kubernetes.io/part-of: sparkyfitness
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: api_encryption_key
      remoteRef:
        key: /cl01tl/sparkyfitness/key
        property: api-encryption-key
    - secretKey: better_auth_secret
      remoteRef:
        key: /cl01tl/sparkyfitness/key
        property: better-auth-secret
