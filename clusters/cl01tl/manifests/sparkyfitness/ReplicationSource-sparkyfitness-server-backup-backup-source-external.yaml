apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: sparkyfitness-server-backup-backup-source-external
  namespace: sparkyfitness
  labels:
    helm.sh/chart: volsync-target-backup-0.8.0
    app.kubernetes.io/instance: sparkyfitness
    app.kubernetes.io/part-of: sparkyfitness
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: sparkyfitness-server-backup-backup
spec:
  sourcePVC: sparkyfitness-server-backup
  trigger:
    schedule: 26 13 * * *
  restic:
    pruneIntervalDays: 7
    repository: sparkyfitness-server-backup-backup-secret-external
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
