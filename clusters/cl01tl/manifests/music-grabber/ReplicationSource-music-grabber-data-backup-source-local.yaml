apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: music-grabber-data-backup-source-local
  namespace: music-grabber
  labels:
    helm.sh/chart: volsync-target-data-2.0.0
    app.kubernetes.io/instance: music-grabber
    app.kubernetes.io/part-of: music-grabber
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: music-grabber-data-backup-source-local
spec:
  sourcePVC: music-grabber-data
  trigger:
    schedule: 5 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: music-grabber-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
