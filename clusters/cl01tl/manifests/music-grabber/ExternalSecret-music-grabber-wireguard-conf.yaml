apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: music-grabber-wireguard-conf
  namespace: music-grabber
  labels:
    app.kubernetes.io/name: music-grabber-wireguard-conf
    app.kubernetes.io/instance: music-grabber
    app.kubernetes.io/part-of: music-grabber
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: private-key
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: private-key
    - secretKey: preshared-key
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: preshared-key
    - secretKey: addresses
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: addresses
    - secretKey: input-ports
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: input-ports
