apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anubis-private-key
  namespace: gitea
  labels:
    app.kubernetes.io/name: anubis-private-key
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/part-of: gitea
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ED25519_PRIVATE_KEY_HEX
      remoteRef:
        key: /cl01tl/gitea/anubis
        property: ED25519_PRIVATE_KEY_HEX
