apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-database-connection
  namespace: gitea
  labels:
    app.kubernetes.io/name: gitea-database-connection
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/part-of: gitea
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: GITEA__DATABASE__CONNSTR
      remoteRef:
        key: /cl01tl/gitea/config
        property: GITEA__DATABASE__CONNSTR
