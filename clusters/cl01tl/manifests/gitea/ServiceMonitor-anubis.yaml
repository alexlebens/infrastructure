apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: anubis
  labels:
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: anubis
    helm.sh/chart: anubis-5.0.1
  namespace: gitea
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - gitea
  selector:
    matchLabels:
      app.kubernetes.io/instance: anubis
      app.kubernetes.io/name: anubis
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 15s
