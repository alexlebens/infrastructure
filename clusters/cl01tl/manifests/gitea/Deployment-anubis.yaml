apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: anubis
    helm.sh/chart: anubis-5.0.1
  namespace: gitea
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: anubis
      app.kubernetes.io/instance: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: gitea
        app.kubernetes.io/name: anubis
    spec:
      enableServiceLinks: false
      serviceAccountName: anubis
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: BIND
              value: :8080
            - name: DIFFICULTY
              value: "4"
            - name: ED25519_PRIVATE_KEY_HEX
              valueFrom:
                secretKeyRef:
                  key: ED25519_PRIVATE_KEY_HEX
                  name: anubis-private-key
            - name: METRICS_BIND
              value: :9090
            - name: SERVE_ROBOTS_TXT
              value: "true"
            - name: TARGET
              value: http://gitea-http.gitea:3000
            - name: OG_PASSTHROUGH
              value: "true"
            - name: OG_EXPIRY_TIME
              value: 24h
          image: ghcr.io/techarohq/anubis:v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
          name: main
          resources:
            requests:
              cpu: 20m
              memory: 40Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
