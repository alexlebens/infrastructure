apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: homepage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: homepage
    helm.sh/chart: homepage-5.0.1
  annotations:
    reloader.stakater.com/auto: "true"
  namespace: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: homepage
  template:
    metadata:
      annotations:
        checksum/configMaps: 8d7c3b1650d1470529305f9fe44c8db7f01281759b4ec6eb273e6f9f92900ae5
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: homepage
        app.kubernetes.io/name: homepage
    spec:
      enableServiceLinks: false
      serviceAccountName: homepage
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.alexlebens.net
          envFrom:
            - secretRef:
                name: homepage-secrets
          image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
          name: main
          resources:
            requests:
              cpu: 50m
              memory: 150Mi
          volumeMounts:
            - mountPath: /app/config/custom.css
              mountPropagation: None
              name: config
              readOnly: true
              subPath: custom.css
            - mountPath: /app/config/docker.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: kubernetes.yaml
            - mountPath: /app/config/settings.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: widgets.yaml
            - mountPath: /app/config/services.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: services.yaml
            - mountPath: /app/config/bookmarks.yaml
              mountPropagation: None
              name: config
              readOnly: true
              subPath: bookmarks.yaml
      volumes:
        - configMap:
            name: homepage
          name: config
