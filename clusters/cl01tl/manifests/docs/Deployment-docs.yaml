apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: docs
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: docs
    helm.sh/chart: docs-5.0.1
  namespace: docs
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: docs
      app.kubernetes.io/instance: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: docs
        app.kubernetes.io/name: docs
    spec:
      enableServiceLinks: false
      serviceAccountName: docs
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/docs:1.15.0@sha256:e8868e5fcd3d941c166aa7790a2cd5676a0e50e3796f9c52fb70d83327a5f3db
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
