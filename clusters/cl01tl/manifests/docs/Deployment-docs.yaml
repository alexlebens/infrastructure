apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: docs
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: docs
    helm.sh/chart: docs-5.0.1
  namespace: docs
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: docs
      app.kubernetes.io/instance: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: docs
        app.kubernetes.io/name: docs
    spec:
      enableServiceLinks: false
      serviceAccountName: docs
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/docs:1.11.0@sha256:7cec5a500f73ce29e4adbf02a5e999610139a5807d03f7a60ba6a9026e64f5aa
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
