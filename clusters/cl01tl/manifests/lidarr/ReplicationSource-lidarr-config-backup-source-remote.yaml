apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: lidarr-config-backup-source-remote
  namespace: lidarr
  labels:
    helm.sh/chart: volsync-target-config-2.1.0
    app.kubernetes.io/instance: lidarr
    app.kubernetes.io/part-of: lidarr
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: lidarr-config-backup
spec:
  sourcePVC: lidarr-config
  trigger:
    schedule: 25 10 * * 2
  restic:
    pruneIntervalDays: 7
    repository: lidarr-config-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 1000
      runAsUser: 1000
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
