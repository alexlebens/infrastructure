apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: tdarr-server-backup-source-external
  namespace: tdarr
  labels:
    helm.sh/chart: volsync-target-server-2.0.0
    app.kubernetes.io/instance: tdarr
    app.kubernetes.io/part-of: tdarr
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tdarr-server-backup
spec:
  sourcePVC: tdarr-server
  trigger:
    schedule: 5 9 * * 6
  restic:
    pruneIntervalDays: 35
    repository: tdarr-server-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
