apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: tdarr-config-backup-source-local
  namespace: tdarr
  labels:
    helm.sh/chart: volsync-target-config-2.1.0
    app.kubernetes.io/instance: tdarr
    app.kubernetes.io/part-of: tdarr
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tdarr-config-backup-source-local
spec:
  sourcePVC: tdarr-config
  trigger:
    schedule: 0 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: tdarr-config-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
