apiVersion: apps/v1
kind: Deployment
metadata:
  name: medialyze
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: medialyze
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: medialyze
    helm.sh/chart: medialyze-5.0.1
  namespace: medialyze
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: medialyze
      app.kubernetes.io/instance: medialyze
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: medialyze
        app.kubernetes.io/name: medialyze
    spec:
      enableServiceLinks: false
      serviceAccountName: medialyze
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: HOST_PORT
              value: "8080"
            - name: SCAN_RUNTIME_WORKER_COUNT
              value: "2"
            - name: TZ
              value: America/Chicago
            - name: MEDIA_HOST_DIR
              value: /media
          image: ghcr.io/frederikemmer/medialyze:0.16.0@sha256:5235fb5d6c735083f976cd8af677c4b44eb2570e6c7f34c1027a306a57d896e5
          name: main
          resources:
            requests:
              cpu: 5m
              memory: 100Mi
          volumeMounts:
            - mountPath: /config
              name: data
            - mountPath: /media
              name: media
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: medialyze-data
        - name: media
          persistentVolumeClaim:
            claimName: medialyze-nfs-storage
