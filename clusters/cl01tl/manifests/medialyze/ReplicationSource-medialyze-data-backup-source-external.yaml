apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: medialyze-data-backup-source-external
  namespace: medialyze
  labels:
    helm.sh/chart: volsync-target-data-1.1.0
    app.kubernetes.io/instance: medialyze
    app.kubernetes.io/part-of: medialyze
    app.kubernetes.io/version: "1.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: medialyze-data-backup
spec:
  sourcePVC: medialyze-data
  trigger:
    schedule: 36 14 * * *
  restic:
    pruneIntervalDays: 7
    repository: medialyze-data-backup-secret-external
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
