apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medialyze-nfs-storage
  namespace: medialyze
  labels:
    app.kubernetes.io/name: medialyze-nfs-storage
    app.kubernetes.io/instance: medialyze
    app.kubernetes.io/part-of: medialyze
spec:
  volumeName: medialyze-nfs-storage
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
