apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jellyfin-testing
  labels:
    helm.sh/chart: jellyfin-testing-3.2.0
    app.kubernetes.io/name: jellyfin-testing
    app.kubernetes.io/instance: jellyfin-testing
    app.kubernetes.io/version: "10.11.8"
    app.kubernetes.io/managed-by: Helm
spec:
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 30s
      honorLabels: true
      path: /metrics
      scheme: http
  jobLabel: "jellyfin-testing"
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin-testing
      app.kubernetes.io/instance: jellyfin-testing
