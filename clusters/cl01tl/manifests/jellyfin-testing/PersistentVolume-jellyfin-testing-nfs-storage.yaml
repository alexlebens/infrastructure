apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-testing-nfs-storage
  namespace: jellyfin-testing
  labels:
    app.kubernetes.io/name: jellyfin-testing-nfs-storage
    app.kubernetes.io/instance: jellyfin-testing
    app.kubernetes.io/part-of: jellyfin-testing
spec:
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-client
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /volume2/Storage
    server: synologybond.alexlebens.net
  mountOptions:
    - vers=4
    - minorversion=1
    - noac
