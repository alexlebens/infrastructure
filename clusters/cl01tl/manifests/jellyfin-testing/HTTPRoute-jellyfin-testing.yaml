apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-testing
  labels:
    app.kubernetes.io/instance: jellyfin-testing
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin-testing
    helm.sh/chart: jellyfin-testing-5.0.1
  namespace: jellyfin-testing
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: "traefik"
  hostnames:
    - "jellyfin-testing.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: jellyfin-testing
          namespace: jellyfin-testing
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
