apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backups-external-rclone-ntfy
  namespace: cloudnative-pg
  labels:
    helm.sh/chart: rclone-postgres-backups-external-0.12.2
    app.kubernetes.io/instance: cloudnative-pg
    app.kubernetes.io/part-of: cloudnative-pg
    app.kubernetes.io/version: "0.12.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: postgres-backups-external-rclone-ntfy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        ntfy-url: "{{ .url }}/{{ .topic }}"
  data:
    - secretKey: url
      remoteRef:
        key: /cl01tl/ntfy/users/cl01tl
        property: internal-endpoint-credential
    - secretKey: topic
      remoteRef:
        key: /cl01tl/ntfy/topics
        property: rclone
