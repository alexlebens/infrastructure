apiVersion: apps/v1
kind: Deployment
metadata:
  name: whodb
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: whodb
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: whodb
    helm.sh/chart: whodb-5.0.1
  namespace: whodb
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: whodb
      app.kubernetes.io/instance: whodb
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: whodb
        app.kubernetes.io/name: whodb
    spec:
      enableServiceLinks: false
      serviceAccountName: whodb
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: WHODB_OLLAMA_HOST
              value: ollama-server-2.ollama
            - name: WHODB_OLLAMA_PORT
              value: "11434"
          image: clidey/whodb:0.110.0@sha256:079af2fcbd4f30cc92fb96dd6dde779e0fb446cbe37e326ee4e731eca50622fe
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
