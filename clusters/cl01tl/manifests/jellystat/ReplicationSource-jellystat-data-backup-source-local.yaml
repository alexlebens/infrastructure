apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: jellystat-data-backup-source-local
  namespace: jellystat
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: jellystat
    app.kubernetes.io/part-of: jellystat
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellystat-data-backup-source-local
spec:
  sourcePVC: jellystat-data
  trigger:
    schedule: 0 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: jellystat-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
