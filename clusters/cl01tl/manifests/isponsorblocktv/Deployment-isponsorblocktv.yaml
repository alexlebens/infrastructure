apiVersion: apps/v1
kind: Deployment
metadata:
  name: isponsorblocktv
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: isponsorblocktv
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: isponsorblocktv
    helm.sh/chart: isponsorblocktv-5.0.1
  namespace: isponsorblocktv
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: isponsorblocktv
      app.kubernetes.io/instance: isponsorblocktv
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: isponsorblocktv
        app.kubernetes.io/name: isponsorblocktv
    spec:
      enableServiceLinks: false
      serviceAccountName: isponsorblocktv
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: ghcr.io/dmunozv04/isponsorblocktv:v2.9.0@sha256:5b8cfa805cb60b99a9e83a2df62d41c63865a315f7ee7cfed1a78052d93650b6
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
          volumeMounts:
            - mountPath: /app/data/config.json
              mountPropagation: None
              name: config
              readOnly: true
              subPath: config.json
      volumes:
        - csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: isponsorblocktv-config
          name: config
