apiVersion: apps/v1
kind: Deployment
metadata:
  name: isponsorblocktv
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: isponsorblocktv
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: isponsorblocktv
    helm.sh/chart: isponsorblocktv-5.0.0
  namespace: isponsorblocktv
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: isponsorblocktv
      app.kubernetes.io/instance: isponsorblocktv
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: isponsorblocktv
        app.kubernetes.io/name: isponsorblocktv
    spec:
      enableServiceLinks: false
      serviceAccountName: isponsorblocktv
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: ghcr.io/dmunozv04/isponsorblocktv:v2.8.1@sha256:ac35b5d861f437cd5c71d0ccea7c3ed7ea0938ae08cbb6e256de06a236b106f5
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
          volumeMounts:
            - mountPath: /app/data/config.json
              mountPropagation: None
              name: config
              readOnly: true
              subPath: config.json
      volumes:
        - csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: isponsorblocktv-config
          name: config
