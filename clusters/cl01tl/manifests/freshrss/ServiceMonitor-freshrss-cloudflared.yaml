apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: freshrss-cloudflared
  labels:
    app.kubernetes.io/instance: freshrss
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/version: 2026.5.0
    helm.sh/chart: cloudflared-3.3.0
  namespace: freshrss
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - freshrss
  selector:
    matchLabels:
      app.kubernetes.io/instance: freshrss
      app.kubernetes.io/name: cloudflared
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 10s
