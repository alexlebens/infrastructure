apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-documentation
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: site-documentation
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-documentation
    helm.sh/chart: site-documentation-5.0.1
  namespace: site-documentation
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: site-documentation
      app.kubernetes.io/instance: site-documentation
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: site-documentation
        app.kubernetes.io/name: site-documentation
    spec:
      enableServiceLinks: false
      serviceAccountName: site-documentation
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/site-documentation:0.38.0@sha256:69e24358ff20c6cd5d536b4c006fd45b7eed9a1ae98421d2fb4a9dad5895b575
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
