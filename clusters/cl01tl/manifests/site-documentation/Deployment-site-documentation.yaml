apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-documentation
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: site-documentation
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-documentation
    helm.sh/chart: site-documentation-5.0.0
  namespace: site-documentation
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: site-documentation
      app.kubernetes.io/instance: site-documentation
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: site-documentation
        app.kubernetes.io/name: site-documentation
    spec:
      enableServiceLinks: false
      serviceAccountName: site-documentation
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/site-documentation:0.31.0@sha256:9e819b8b2d18437080fed5bbe9a2b42e0abdd457dcdd0e894ff98a728e056062
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
