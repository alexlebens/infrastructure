apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-documentation
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: site-documentation
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-documentation
    helm.sh/chart: site-documentation-5.0.0
  namespace: site-documentation
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: site-documentation
      app.kubernetes.io/instance: site-documentation
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: site-documentation
        app.kubernetes.io/name: site-documentation
    spec:
      enableServiceLinks: false
      serviceAccountName: site-documentation
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/site-documentation:0.30.0@sha256:cbeb1fa7e311b30e46676ba65961fbc7a7679c8b4971afc275cd1d9466663f65
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
