apiVersion: batch/v1
kind: Job
metadata:
  name: postiz-temporal-schema-1-0-0-rc-3-1
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: temporal
    helm.sh/chart: temporal-1.0.0-rc.3
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/version: "1.30.2"
    app.kubernetes.io/part-of: temporal
spec:
  backoffLimit: 100
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: postiz-temporal-schema-1-0-0-rc-3-1
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/name: temporal
        helm.sh/chart: temporal-1.0.0-rc.3
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: postiz
        app.kubernetes.io/version: "1.30.2"
        app.kubernetes.io/part-of: temporal
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      initContainers:
        - name: create-default-store
          image: "temporalio/admin-tools:1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
          imagePullPolicy: IfNotPresent
          command: ['temporal-sql-tool', 'create-database']
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postiz-postgresql-18-cluster-rw.postiz
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: app
            - name: SQL_USER
              value: "postgres"
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postiz-postgresql-18-cluster-superuser
                  key: password
            - name: SQL_TLS
              value: "false"
        - name: manage-schema-default-store
          image: "temporalio/admin-tools:1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c']
          args:
            - temporal-sql-tool setup-schema -v 0.0 && temporal-sql-tool update-schema --schema-dir /etc/temporal/schema/postgresql/v12/temporal/versioned
          env:
            - name: SQL_PLUGIN
              value: postgres12
            - name: SQL_HOST
              value: postiz-postgresql-18-cluster-rw.postiz
            - name: SQL_PORT
              value: "5432"
            - name: SQL_DATABASE
              value: app
            - name: SQL_USER
              value: "postgres"
            - name: SQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postiz-postgresql-18-cluster-superuser
                  key: password
            - name: SQL_TLS
              value: "false"
          volumeMounts:
            - name: shims
              mountPath: /usr/local/sbin/temporal-elasticsearch-tool
              subPath: temporal-elasticsearch-tool
        - name: manage-schema-visibility-store
          image: "temporalio/admin-tools:1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c']
          args:
            - temporal-elasticsearch-tool setup-schema && temporal-elasticsearch-tool create-index && temporal-elasticsearch-tool update-schema --index "$ES_VISIBILITY_INDEX"
          env:
            - name: ES_SCHEME
              value: http
            - name: ES_HOST
              value: elasticsearch-postiz-es-http.postiz
            - name: ES_PORT
              value: "9200"
            - name: ES_SERVER
              value: http://elasticsearch-postiz-es-http.postiz:9200
            - name: ES_USER
              value:
            - name: ES_PWD
              valueFrom:
                secretKeyRef:
                  name: postiz-temporal-visibility-store
                  key: password
            - name: ES_VERSION
              value: v8
            - name: ES_VISIBILITY_INDEX
              value: temporal_visibility_v1
            - name: ES_TLS
              value: "false"
          volumeMounts:
            - name: shims
              mountPath: /usr/local/sbin/temporal-elasticsearch-tool
              subPath: temporal-elasticsearch-tool
      containers:
        - name: done
          image: "temporalio/admin-tools:1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'echo "Store setup completed"']
      volumes:
        - name: shims
          configMap:
            name: "postiz-temporal-shims"
            defaultMode: 0555
