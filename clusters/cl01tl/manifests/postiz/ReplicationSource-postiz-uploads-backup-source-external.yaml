apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: postiz-uploads-backup-source-external
  namespace: postiz
  labels:
    helm.sh/chart: volsync-target-upload-2.1.0
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/part-of: postiz
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: postiz-uploads-backup
spec:
  sourcePVC: postiz-uploads
  trigger:
    schedule: 5 9 * * 4
  restic:
    pruneIntervalDays: 35
    repository: postiz-uploads-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
