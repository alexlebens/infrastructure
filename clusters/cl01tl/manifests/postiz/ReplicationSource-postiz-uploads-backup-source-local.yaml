apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: postiz-uploads-backup-source-local
  namespace: postiz
  labels:
    helm.sh/chart: volsync-target-upload-2.1.0
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/part-of: postiz
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: postiz-uploads-backup-source-local
spec:
  sourcePVC: postiz-uploads
  trigger:
    schedule: 5 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: postiz-uploads-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
