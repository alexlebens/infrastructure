apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-valkey-config
  namespace: postiz
  labels:
    app.kubernetes.io/name: postiz-valkey-config
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/part-of: postiz
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: url
    - secretKey: user
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: user
    - secretKey: password
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: password
    - secretKey: default
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: password
