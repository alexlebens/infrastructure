apiVersion: v1
kind: Pod
metadata:
  name: "postiz-temporal-test-cluster-health"
  labels:
    app.kubernetes.io/component: test
    app.kubernetes.io/name: temporal
    helm.sh/chart: temporal-1.4.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/version: "1.31.1"
    app.kubernetes.io/part-of: temporal
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: default
  containers:
    - name: cluster-health
      image: "temporalio/admin-tools:1.31.1@sha256:0fa94393f6254dea05df1cdacb7a8ee95f6fb51a2ffbde0c6847a73037f788c7"
      imagePullPolicy: IfNotPresent
      command: ["temporal", "operator", "cluster", "health"]
      env:
        - name: TEMPORAL_ADDRESS
          value: postiz-temporal-frontend:7233
  restartPolicy: Never
