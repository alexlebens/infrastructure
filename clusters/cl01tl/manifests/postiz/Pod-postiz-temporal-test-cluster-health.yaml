apiVersion: v1
kind: Pod
metadata:
  name: "postiz-temporal-test-cluster-health"
  labels:
    app.kubernetes.io/component: test
    app.kubernetes.io/name: temporal
    helm.sh/chart: temporal-1.2.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/version: "1.31.0"
    app.kubernetes.io/part-of: temporal
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: default
  containers:
    - name: cluster-health
      image: "temporalio/admin-tools:1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e"
      imagePullPolicy: IfNotPresent
      command: ["temporal", "operator", "cluster", "health"]
      env:
        - name: TEMPORAL_ADDRESS
          value: postiz-temporal-frontend:7233
  restartPolicy: Never
