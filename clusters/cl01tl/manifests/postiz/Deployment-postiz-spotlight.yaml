apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz-spotlight
  labels:
    app.kubernetes.io/controller: spotlight
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: postiz
    helm.sh/chart: postiz-5.0.1
  namespace: postiz
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: spotlight
      app.kubernetes.io/name: postiz
      app.kubernetes.io/instance: postiz
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: spotlight
        app.kubernetes.io/instance: postiz
        app.kubernetes.io/name: postiz
    spec:
      enableServiceLinks: false
      serviceAccountName: postiz
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: ghcr.io/getsentry/spotlight:4.11.4@sha256:f46ec791dd80b95c05dcfb33eea15cdd54ce2e93d0db00dc246748228015eeb3
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 100Mi
