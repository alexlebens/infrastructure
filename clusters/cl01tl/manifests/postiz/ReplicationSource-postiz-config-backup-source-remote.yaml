apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: postiz-config-backup-source-remote
  namespace: postiz
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/part-of: postiz
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: postiz-config-backup
spec:
  sourcePVC: postiz-config
  trigger:
    schedule: 0 10 * * 4
  restic:
    pruneIntervalDays: 7
    repository: postiz-config-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
