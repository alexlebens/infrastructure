apiVersion: batch/v1
kind: Job
metadata:
  name: argo-workflows-crd-install
  namespace: argo-workflows
  labels:
    helm.sh/chart: argo-workflows-1.0.4
    app.kubernetes.io/name: argo-workflows-crd-install
    app.kubernetes.io/instance: argo-workflows
    app.kubernetes.io/component: crds
    app: crds
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: argo-workflows
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        helm.sh/chart: argo-workflows-1.0.4
        app.kubernetes.io/name: argo-workflows-crd-install
        app.kubernetes.io/instance: argo-workflows
        app.kubernetes.io/component: crds
        app: crds
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: argo-workflows
    spec:
      serviceAccountName: argo-workflows-crd-install
      containers:
        - name: apply
          image: "registry.k8s.io/kubectl:v1.35.3"
          env:
          command:
            - kubectl
            - apply
            - --server-side
            - --force-conflicts
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_clusterworkflowtemplates.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_cronworkflows.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workflowartifactgctasks.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workfloweventbindings.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workflows.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workflowtaskresults.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workflowtasksets.yaml"
            - -f
            - "https://raw.githubusercontent.com/argoproj/argo-helm/argo-workflows-1.0.4/charts/argo-workflows/files/crds/full/argoproj.io_workflowtemplates.yaml"
      restartPolicy: Never
  backoffLimit: 3
