apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: talos-etcd-defrag-config
  namespace: talos
  labels:
    app.kubernetes.io/name: talos-etcd-defrag-config
    app.kubernetes.io/instance: talos
    app.kubernetes.io/part-of: talos
spec:
  provider: openbao
  parameters:
    baoAddress: "http://openbao-internal.openbao:8200"
    roleName: talos-defrag
    objects: |
      - objectName: config
        fileName: config
        secretPath: secret/data/cl01tl/talos/talosconfig
        secretKey: config
