apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: talos-etcd-backup-external-config
  namespace: talos
  labels:
    app.kubernetes.io/name: talos-etcd-backup-external-config
    app.kubernetes.io/instance: talos
    app.kubernetes.io/part-of: talos
spec:
  provider: openbao
  parameters:
    baoAddress: "http://openbao-internal.openbao:8200"
    roleName: talos-backup
    objects: |
      - objectName: .s3cfg
        fileName: .s3cfg
        secretPath: secret/data/digital-ocean/home-infra/talos-backups
        secretKey: s3cfg
