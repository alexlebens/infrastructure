apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: outline-data-backup-source-local
  namespace: outline
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: outline
    app.kubernetes.io/part-of: outline
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: outline-data-backup-source-local
spec:
  sourcePVC: outline-data
  trigger:
    schedule: 20 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: outline-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    moverSecurityContext:
      fsGroup: 1001
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
