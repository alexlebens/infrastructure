apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: outline-data-backup-source-local
  namespace: outline
  labels:
    helm.sh/chart: volsync-target-data-1.1.1
    app.kubernetes.io/instance: outline
    app.kubernetes.io/part-of: outline
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: outline-data-backup-source-local
spec:
  sourcePVC: outline-data
  trigger:
    schedule: 50 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: outline-data-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    moverSecurityContext:
      fsGroup: 1001
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
