apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-key
  namespace: ollama
  labels:
    app.kubernetes.io/name: open-webui-key
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/part-of: ollama
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: key
      remoteRef:
        key: /cl01tl/ollama/open-webui/key
        property: key
