apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ollama-web-data-backup-source-remote
  namespace: ollama
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/part-of: ollama
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ollama-web-data-backup
spec:
  sourcePVC: ollama-web-data
  trigger:
    schedule: 15 10 * * 3
  restic:
    pruneIntervalDays: 7
    repository: ollama-web-data-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      runAsGroup: 1337
      runAsUser: 1337
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
