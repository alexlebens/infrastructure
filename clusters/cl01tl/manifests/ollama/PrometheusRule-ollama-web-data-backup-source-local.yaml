apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ollama-web-data-backup-source-local
  namespace: ollama
  labels:
    helm.sh/chart: volsync-target-data-1.1.1
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/part-of: ollama
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ollama-web-data-backup-source-local
spec:
  groups:
    - name: volsync.alerts
      rules:
        - alert: VolSyncBackupPodFailed
          expr: |
            (kube_pod_container_status_last_terminated_exitcode > 0)
            * on(pod, namespace) group_left(owner_name)
            kube_pod_owner{owner_kind="Job", owner_name=~"volsync-.*"}
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "VolSync Backup Pod failed in {{ $labels.namespace }}"
            description: |
              A pod for the VolSync backup of PVC 'ollama-web-data' failed with exit code {{ $value }}.
              Job: {{ $labels.owner_name }}
              Namespace: {{ $labels.namespace }}
