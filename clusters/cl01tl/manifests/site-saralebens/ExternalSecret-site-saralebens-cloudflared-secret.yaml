apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: site-saralebens-cloudflared-secret
  namespace: site-saralebens
  labels:
    helm.sh/chart: cloudflared-3.2.1
    app.kubernetes.io/instance: site-saralebens
    app.kubernetes.io/part-of: site-saralebens
    app.kubernetes.io/version: "3.2.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-saralebens-cloudflared-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: cf-tunnel-token
      remoteRef:
        key: /cloudflare/tunnels/site-saralebens
        property: token
