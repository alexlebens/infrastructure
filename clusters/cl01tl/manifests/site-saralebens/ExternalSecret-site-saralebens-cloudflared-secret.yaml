apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: site-saralebens-cloudflared-secret
  namespace: site-saralebens
  labels:
    helm.sh/chart: cloudflared-2.4.0
    app.kubernetes.io/instance: site-saralebens
    app.kubernetes.io/part-of: site-saralebens
    app.kubernetes.io/version: "2.4.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site-saralebens-cloudflared-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: cf-tunnel-token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cloudflare/tunnels/site-saralebens
        metadataPolicy: None
        property: token
