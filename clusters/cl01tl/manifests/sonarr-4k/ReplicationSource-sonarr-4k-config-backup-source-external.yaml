apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: sonarr-4k-config-backup-source-external
  namespace: sonarr-4k
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: sonarr-4k
    app.kubernetes.io/part-of: sonarr-4k
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: sonarr-4k-config-backup
spec:
  sourcePVC: sonarr-4k-config
  trigger:
    schedule: 35 9 * * 5
  restic:
    pruneIntervalDays: 35
    repository: sonarr-4k-config-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 1000
      runAsUser: 1000
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
