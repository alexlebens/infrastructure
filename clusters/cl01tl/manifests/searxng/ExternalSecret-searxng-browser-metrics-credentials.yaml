apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-browser-metrics-credentials
  namespace: searxng
  labels:
    app.kubernetes.io/name: searxng-browser-metrics-credentials
    app.kubernetes.io/instance: searxng
    app.kubernetes.io/part-of: searxng
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: metrics-password
      remoteRef:
        key: /cl01tl/searxng/metrics
        property: password
    - secretKey: metrics-username
      remoteRef:
        key: /cl01tl/searxng/metrics
        property: username
