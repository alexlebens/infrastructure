kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: houndarr-data
  labels:
    app.kubernetes.io/instance: houndarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: houndarr
    helm.sh/chart: houndarr-5.0.0
  namespace: houndarr
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "1Gi"
  storageClassName: "ceph-block"
