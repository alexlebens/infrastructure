apiVersion: apps/v1
kind: Deployment
metadata:
  name: houndarr
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: houndarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: houndarr
    helm.sh/chart: houndarr-4.6.2
  namespace: houndarr
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: houndarr
      app.kubernetes.io/instance: houndarr
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: houndarr
        app.kubernetes.io/name: houndarr
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: HOUNDARR_SECURE_COOKIES
              value: "true"
            - name: HOUNDARR_TRUSTED_PROXIES
              value: 10.96.0.0/12
          image: ghcr.io/av1155/houndarr:v1.8.0@sha256:6d213dadb625e0cebdd6e28358e2815f9ceccf133bb5469b6bc837cf1a70c9e2
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 60Mi
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: houndarr-data
