apiVersion: apps/v1
kind: Deployment
metadata:
  name: houndarr
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: houndarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: houndarr
    helm.sh/chart: houndarr-5.0.1
  namespace: houndarr
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: houndarr
      app.kubernetes.io/instance: houndarr
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: houndarr
        app.kubernetes.io/name: houndarr
    spec:
      enableServiceLinks: false
      serviceAccountName: houndarr
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: HOUNDARR_SECURE_COOKIES
              value: "true"
            - name: HOUNDARR_TRUSTED_PROXIES
              value: 10.96.0.0/12
          image: ghcr.io/av1155/houndarr:v1.11.0@sha256:9ca1b3206fac52db23da8e58e1dc973743e0626846fc7600530d5ef413453c19
          name: main
          resources:
            requests:
              cpu: 1m
              memory: 60Mi
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: houndarr-data
