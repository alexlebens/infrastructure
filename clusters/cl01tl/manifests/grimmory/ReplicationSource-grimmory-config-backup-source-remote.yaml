apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: grimmory-config-backup-source-remote
  namespace: grimmory
  labels:
    helm.sh/chart: volsync-target-config-2.0.0
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/part-of: grimmory
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grimmory-config-backup
spec:
  sourcePVC: grimmory-config
  trigger:
    schedule: 20 10 * * 1
  restic:
    pruneIntervalDays: 7
    repository: grimmory-config-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
