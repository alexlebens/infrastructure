apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grimmory-mariadb-cluster-backup-secret-external
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory-mariadb-cluster-backup-secret-external
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/part-of: grimmory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: access
      remoteRef:
        key: /digital-ocean/home-infra/mariadb-backups
        property: access
    - secretKey: secret
      remoteRef:
        key: /digital-ocean/home-infra/mariadb-backups
        property: secret
