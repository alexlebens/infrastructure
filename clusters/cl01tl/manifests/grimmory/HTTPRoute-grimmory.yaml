apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grimmory
  labels:
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grimmory
    helm.sh/chart: grimmory-4.6.2
  namespace: grimmory
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - "grimmory.alexlebens.net"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: grimmory
          namespace: grimmory
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
