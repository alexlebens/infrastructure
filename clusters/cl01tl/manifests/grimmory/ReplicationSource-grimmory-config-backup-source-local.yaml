apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: grimmory-config-backup-source-local
  namespace: grimmory
  labels:
    helm.sh/chart: volsync-target-config-1.0.0
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/part-of: grimmory
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grimmory-config-backup
spec:
  sourcePVC: grimmory-config
  trigger:
    schedule: 12 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: grimmory-config-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
