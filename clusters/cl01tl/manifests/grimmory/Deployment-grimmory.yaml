apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grimmory
    helm.sh/chart: grimmory-4.6.2
  namespace: grimmory
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: grimmory
      app.kubernetes.io/instance: grimmory
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: grimmory
        app.kubernetes.io/name: grimmory
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
            - name: USER_ID
              value: "1000"
            - name: GROUP_ID
              value: "1000"
            - name: DATABASE_URL
              value: jdbc:mariadb://grimmory-mariadb-cluster-primary.grimmory:3306/booklore
            - name: DATABASE_USERNAME
              value: grimmory
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: grimmory-database-secret
            - name: GRIMMORY_PORT
              value: "6060"
            - name: SWAGGER_ENABLED
              value: "false"
          image: ghcr.io/grimmory-tools/grimmory:v3.0.1@sha256:e8dbba61c298b75025b2027dfc37d6e20b844bd4be5b13dd9973367c01642d05
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 1Gi
          volumeMounts:
            - mountPath: /bookdrop
              name: books-import
            - mountPath: /app/data
              name: config
            - mountPath: /data
              name: data
            - mountPath: /bookdrop/ingest
              name: ingest
      volumes:
        - emptyDir: {}
          name: books-import
        - name: config
          persistentVolumeClaim:
            claimName: grimmory-config
        - name: data
          persistentVolumeClaim:
            claimName: grimmory-books-nfs-storage
        - name: ingest
          persistentVolumeClaim:
            claimName: grimmory-books-import-nfs-storage
