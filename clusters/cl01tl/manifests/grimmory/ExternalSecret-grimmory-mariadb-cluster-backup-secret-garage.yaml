apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grimmory-mariadb-cluster-backup-secret-garage
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory-mariadb-cluster-backup-secret-garage
    app.kubernetes.io/instance: grimmory
    app.kubernetes.io/part-of: grimmory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: access
      remoteRef:
        key: /garage/home-infra/mariadb-backups
        property: ACCESS_KEY_ID
    - secretKey: secret
      remoteRef:
        key: /garage/home-infra/mariadb-backups
        property: ACCESS_SECRET_KEY
