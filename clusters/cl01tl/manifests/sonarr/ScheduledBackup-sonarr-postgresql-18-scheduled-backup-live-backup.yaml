apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: "sonarr-postgresql-18-scheduled-backup-live-backup"
  namespace: sonarr
  labels:
    app.kubernetes.io/name: "sonarr-postgresql-18-scheduled-backup-live-backup"
    helm.sh/chart: postgres-18-cluster-7.11.2
    app.kubernetes.io/instance: sonarr
    app.kubernetes.io/part-of: sonarr
    app.kubernetes.io/version: "7.11.2"
    app.kubernetes.io/managed-by: Helm
spec:
  immediate: true
  suspend: false
  schedule: "0 50 15 * * *"
  backupOwnerReference: self
  cluster:
    name: sonarr-postgresql-18-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: "sonarr-postgresql-18-backup-garage-local"
