apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-postgresql-18-backup-garage-local-secret
  namespace: sonarr
  labels:
    app.kubernetes.io/name: sonarr-postgresql-18-backup-garage-local-secret
    helm.sh/chart: postgres-18-cluster-7.12.1
    app.kubernetes.io/instance: sonarr
    app.kubernetes.io/part-of: sonarr
    app.kubernetes.io/version: "7.12.1"
    app.kubernetes.io/managed-by: Helm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /garage/home-infra/postgres-backups
        property: ACCESS_SECRET_KEY
