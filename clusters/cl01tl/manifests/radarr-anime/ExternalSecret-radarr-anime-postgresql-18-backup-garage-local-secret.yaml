apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-anime-postgresql-18-backup-garage-local-secret
  namespace: radarr-anime
  labels:
    app.kubernetes.io/name: radarr-anime-postgresql-18-backup-garage-local-secret
    helm.sh/chart: postgres-18-cluster-7.10.0
    app.kubernetes.io/instance: radarr-anime
    app.kubernetes.io/part-of: radarr-anime
    app.kubernetes.io/version: "7.10.0"
    app.kubernetes.io/managed-by: Helm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/postgres-backups
        metadataPolicy: None
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/postgres-backups
        metadataPolicy: None
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/postgres-backups
        metadataPolicy: None
        property: ACCESS_SECRET_KEY
