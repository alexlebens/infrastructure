apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-anime
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: radarr-anime
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: radarr-anime
    helm.sh/chart: radarr-anime-5.0.1
  namespace: radarr-anime
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: radarr-anime
      app.kubernetes.io/instance: radarr-anime
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: radarr-anime
        app.kubernetes.io/name: radarr-anime
    spec:
      enableServiceLinks: false
      serviceAccountName: radarr-anime
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          image: ghcr.io/linuxserver/radarr:6.1.1.10360-ls303@sha256:079e48870584baf2a3e7e43e7ba6d3c834555931851a59c82c51cc792d285caf
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 220Mi
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /mnt/store
              name: media
        - args:
            - radarr
          env:
            - name: URL
              value: http://localhost
            - name: CONFIG
              value: /config/config.xml
            - name: PORT
              value: "9793"
            - name: ENABLE_ADDITIONAL_METRICS
              value: "false"
            - name: ENABLE_UNKNOWN_QUEUE_ITEMS
              value: "false"
          image: ghcr.io/onedr0p/exportarr:v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
          name: metrics
          volumeMounts:
            - mountPath: /config
              name: config
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-anime-config
        - name: media
          persistentVolumeClaim:
            claimName: radarr-anime-nfs-storage
