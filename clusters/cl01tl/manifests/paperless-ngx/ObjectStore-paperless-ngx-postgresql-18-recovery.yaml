apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: "paperless-ngx-postgresql-18-recovery"
  namespace: paperless-ngx
  labels:
    helm.sh/chart: postgres-18-cluster-7.11.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "7.11.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: "paperless-ngx-postgresql-18-recovery"
spec:
  configuration:
    destinationPath: s3://postgres-backups/cl01tl/paperless-ngx/paperless-ngx-postgresql-18-cluster
    endpointURL: http://garage-main.garage:3900
    wal:
      compression: snappy
      maxParallel: 1
    data:
      compression: snappy
      jobs: 1
    s3Credentials:
      accessKeyId:
        name: paperless-ngx-postgresql-18-recovery-secret
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: paperless-ngx-postgresql-18-recovery-secret
        key: ACCESS_SECRET_KEY
      region:
        name: paperless-ngx-postgresql-18-recovery-secret
        key: ACCESS_REGION
