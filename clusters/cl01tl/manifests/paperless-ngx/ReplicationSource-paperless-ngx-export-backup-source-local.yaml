apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: paperless-ngx-export-backup-source-local
  namespace: paperless-ngx
  labels:
    helm.sh/chart: volsync-target-export-2.1.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: paperless-ngx-export-backup-source-local
spec:
  sourcePVC: paperless-ngx-export
  trigger:
    schedule: 35 8 * * *
  restic:
    pruneIntervalDays: 7
    repository: paperless-ngx-export-backup-secret-local
    retain:
      daily: 7
      hourly: 0
      monthly: 0
      weekly: 4
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
