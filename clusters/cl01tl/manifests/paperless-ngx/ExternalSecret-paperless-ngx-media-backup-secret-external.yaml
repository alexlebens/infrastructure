apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-media-backup-secret-external
  namespace: paperless-ngx
  labels:
    helm.sh/chart: volsync-target-media-1.1.1
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "1.1.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: paperless-ngx-media-backup-secret-external
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "s3:{{ .ENDPOINT }}/{{ .BUCKET }}/cl01tl/paperless-ngx/paperless-ngx-media"
  data:
    - secretKey: ENDPOINT
      remoteRef:
        key: /digital-ocean/config
        property: ENDPOINT
    - secretKey: BUCKET
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: BUCKET
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: RESTIC_PASSWORD
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_REGION
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /digital-ocean/home-infra/volsync-backups
        property: AWS_SECRET_ACCESS_KEY
