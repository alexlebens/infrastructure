apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: paperless-ngx-data-backup-source-remote
  namespace: paperless-ngx
  labels:
    helm.sh/chart: volsync-target-data-2.1.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: paperless-ngx-data-backup
spec:
  sourcePVC: paperless-ngx-data
  trigger:
    schedule: 25 10 * * 3
  restic:
    pruneIntervalDays: 7
    repository: paperless-ngx-data-backup-secret-remote
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
