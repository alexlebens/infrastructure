apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: paperless-ngx-postgresql-18-cluster
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx-postgresql-18-cluster
    helm.sh/chart: postgres-18-cluster-7.15.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "7.15.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: paperless-ngx-postgresql-18-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
