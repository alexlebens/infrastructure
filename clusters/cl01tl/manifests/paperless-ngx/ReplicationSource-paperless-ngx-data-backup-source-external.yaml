apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: paperless-ngx-data-backup-source-external
  namespace: paperless-ngx
  labels:
    helm.sh/chart: volsync-target-data-1.1.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "1.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: paperless-ngx-data-backup
spec:
  sourcePVC: paperless-ngx-data
  trigger:
    schedule: 2 10 * * *
  restic:
    pruneIntervalDays: 7
    repository: paperless-ngx-data-backup-secret-external
    retain:
      daily: 7
      hourly: 0
      monthly: 3
      weekly: 4
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
