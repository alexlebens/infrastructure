apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: paperless-ngx-consume-backup-source-external
  namespace: paperless-ngx
  labels:
    helm.sh/chart: volsync-target-consume-2.1.0
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: paperless-ngx-consume-backup
spec:
  sourcePVC: paperless-ngx-consume
  trigger:
    schedule: 40 9 * * 3
  restic:
    pruneIntervalDays: 35
    repository: paperless-ngx-consume-backup-secret-external
    retain:
      daily: 0
      hourly: 0
      monthly: 0
      weekly: 12
      yearly: 0
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi
