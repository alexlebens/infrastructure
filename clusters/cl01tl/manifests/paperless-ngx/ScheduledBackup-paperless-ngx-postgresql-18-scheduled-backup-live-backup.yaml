apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: "paperless-ngx-postgresql-18-scheduled-backup-live-backup"
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: "paperless-ngx-postgresql-18-scheduled-backup-live-backup"
    helm.sh/chart: postgres-18-cluster-7.12.1
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
    app.kubernetes.io/version: "7.12.1"
    app.kubernetes.io/managed-by: Helm
spec:
  immediate: true
  suspend: false
  schedule: "0 15 15 * * *"
  backupOwnerReference: self
  cluster:
    name: paperless-ngx-postgresql-18-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: "paperless-ngx-postgresql-18-backup-garage-local"
