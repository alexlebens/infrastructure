apiVersion: csi.ceph.io/v1
kind: OperatorConfig
metadata:
  name: ceph-csi-operator-config
  namespace:
spec:
  driverSpecDefaults:
    log:
      verbosity: 0
      rotation:
        maxFiles: 7
        maxLogSize: 10Gi
        periodicity: daily
    enableFencing: false
    grpcTimeout: 30
    snapshotPolicy: none
    generateOMapInfo: false
    fsGroupPolicy: File
    attachRequired: true
    deployCsiAddons: true
    cephFsClientType: kernel
    kernelMountOptions: {}
    fuseMountOptions: {}
    nodePlugin:
      kubeletDirPath: /var/lib/kubelet
      tolerations: []
      imagePullPolicy: IfNotPresent
      volumes: []
    controllerPlugin:
      hostNetwork: false
      replicas: 2
      privileged: false
      tolerations: []
      volumes: []
      imagePullPolicy: IfNotPresent
