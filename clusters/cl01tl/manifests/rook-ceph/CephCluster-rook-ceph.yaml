apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: "rook-ceph"
  namespace: "rook-ceph"
spec:
  monitoring:
    enabled: true
  cephVersion:
    image: "quay.io/ceph/ceph:v20.2.1@sha256:0bae386bc859cd9a05b804d1ca16cca8853a64f90809044e2bf43095419dc337"
    allowUnsupported: false
  cephConfig:
    osd:
      bluestore_slow_ops_warn_lifetime: "60"
      bluestore_slow_ops_warn_threshold: "10"
  cleanupPolicy:
    allowUninstallWithVolumes: false
    confirmation: ""
    sanitizeDisks:
      dataSource: zero
      iteration: 1
      method: quick
  continueUpgradeAfterChecksEvenIfNotHealthy: false
  crashCollector:
    disable: false
  csi:
    readAffinity:
      enabled: true
  dashboard:
    enabled: true
    ssl: false
  dataDirHostPath: /var/lib/rook
  disruptionManagement:
    managePodBudgets: true
    osdMaintenanceTimeout: 30
  healthCheck:
    daemonHealth:
      mon:
        disabled: false
        interval: 45s
      osd:
        disabled: false
        interval: 60s
      status:
        disabled: false
        interval: 60s
    livenessProbe:
      mgr:
        disabled: false
      mon:
        disabled: false
      osd:
        disabled: false
  logCollector:
    enabled: true
    maxLogSize: 500M
    periodicity: daily
  mgr:
    allowMultiplePerNode: false
    count: 2
    modules:
      - enabled: true
        name: pg_autoscaler
      - enabled: true
        name: rook
      - enabled: true
        name: volumes
  mon:
    allowMultiplePerNode: false
    count: 3
  network:
    connections:
      compression:
        enabled: true
      encryption:
        enabled: true
      requireMsgr2: true
  placement:
    all:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/rook-osd-node
                  operator: Exists
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/rook-mon-node
                  operator: Exists
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
      tolerations:
        - key: node-role.kubernetes.io/rook-mon-node
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
  priorityClassNames:
    mgr: system-cluster-critical
    mon: system-node-critical
    osd: system-node-critical
  removeOSDsIfOutAndSafeToRemove: false
  resources:
    cleanup:
      limits: {}
      requests:
        cpu: 10m
        memory: 100Mi
    crashcollector:
      limits: {}
      requests:
        cpu: 10m
        memory: 20Mi
    exporter:
      limits: {}
      requests:
        cpu: 10m
        memory: 20Mi
    logcollector:
      limits: {}
      requests:
        cpu: 10m
        memory: 100Mi
    mgr:
      limits: {}
      requests:
        cpu: 100m
        memory: 500Mi
    mgr-sidecar:
      limits: {}
      requests:
        cpu: 100m
        memory: 40Mi
    mon:
      limits: {}
      requests:
        cpu: 100m
        memory: 750Mi
    osd:
      limits: {}
      requests:
        cpu: 100m
        memory: 2Gi
    prepareosd:
      requests:
        cpu: 100m
        memory: 200Mi
  skipUpgradeChecks: false
  storage:
    config:
      osdsPerDevice: "1"
    devicePathFilter: /dev/disk/by-partlabel/r-csi-disk"
    useAllDevices: false
    useAllNodes: true
  upgradeOSDRequiresHealthyPGs: false
  waitTimeoutForHealthyOSDInMinutes: 10
