apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: blog
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blog
    helm.sh/chart: blog-5.0.1
  namespace: blog
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: blog
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: blog
        app.kubernetes.io/name: blog
    spec:
      enableServiceLinks: false
      serviceAccountName: blog
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/blog:3.32.2@sha256:473ab98a1d2bc6bf27b99ec8f66aa98a33fd90dff3c024ea5e6a22b014e72c51
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
