apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: blog
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blog
    helm.sh/chart: blog-5.0.1
  namespace: blog
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: blog
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: blog
        app.kubernetes.io/name: blog
    spec:
      enableServiceLinks: false
      serviceAccountName: blog
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/blog:3.30.0@sha256:41a5b9e024c9a8f984fd77b6aef9b5b0c88ecdc255068a60f1773c334c01e933
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
