apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: blog
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blog
    helm.sh/chart: blog-5.0.1
  namespace: blog
spec:
  revisionHistoryLimit: 3
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: blog
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: blog
        app.kubernetes.io/name: blog
    spec:
      enableServiceLinks: false
      serviceAccountName: blog
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers:
        - image: harbor.alexlebens.net/images/blog:3.25.0@sha256:ff3a1bab22e8c1b994bf73e9461cceab2837166cc96600bd989b35a71e497f1c
          name: main
          resources:
            requests:
              cpu: 10m
              memory: 60Mi
