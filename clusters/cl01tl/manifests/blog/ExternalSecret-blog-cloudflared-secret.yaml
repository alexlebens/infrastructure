apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: blog-cloudflared-secret
  namespace: blog
  labels:
    helm.sh/chart: cloudflared-3.4.1
    app.kubernetes.io/instance: blog
    app.kubernetes.io/part-of: blog
    app.kubernetes.io/version: "3.4.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blog-cloudflared-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: cf-tunnel-token
      remoteRef:
        key: /cloudflare/tunnels/blog
        property: token
