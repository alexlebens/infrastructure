apiVersion: v1
kind: Service
metadata:
  name: blog
  labels:
    app.kubernetes.io/instance: blog
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: blog
    app.kubernetes.io/service: blog
    helm.sh/chart: blog-5.0.1
  namespace: blog
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 4321
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: blog
    app.kubernetes.io/name: blog
