apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: default
    {{- include "custom.labels" . | nindent 4 }}
spec:
  metrics:
    enable: true
    serviceMonitor:
      enable: true
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          limits:
            devic.es/tun: "1"
      tailscaleInitContainer:
        resources:
          limits:
            devic.es/tun: "1"

---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: no-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: no-metrics
    {{- include "custom.labels" . | nindent 4 }}
spec:
  metrics:
    enable: false
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          limits:
            devic.es/tun: "1"
      tailscaleInitContainer:
        resources:
          limits:
            devic.es/tun: "1"
