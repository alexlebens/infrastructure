apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: version-checker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: version-checker
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: version-checker
  endpoints:
    - port: web
      path: /metrics
