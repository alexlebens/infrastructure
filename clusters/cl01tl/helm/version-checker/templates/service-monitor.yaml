apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: version-checker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: version-checker
    {{- include "custom.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: version-checker
  endpoints:
    - port: web
      path: /metrics
