audiobookshelf:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/advplyr/audiobookshelf
            tag: 2.35.1@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 200Mi
        apprise-api:
          image:
            repository: ghcr.io/caronc/apprise
            tag: v1.4.1@sha256:25e0577915c2f06233ae1dce077f05c0fc9ba4f0ea89de5aee18a32b2ee9a75c
          env:
            - name: TZ
              value: America/Chicago
            - name: PGID
              value: 1000
            - name: PUID
              value: 1000
            - name: APPRISE_STORAGE_MODE
              value: memory
            - name: APPRISE_STATEFUL_MODE
              value: disabled
            - name: APPRISE_WORKER_COUNT
              value: 1
            - name: APPRISE_STATELESS_URLS
              valueFrom:
                secretKeyRef:
                  name: audiobookshelf-config-apprise
                  key: ntfy-url
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 80
        apprise:
          port: 8000
          targetPort: 8000
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: audiobookshelf
          app.kubernetes.io/instance: audiobookshelf
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: apprise
          scheme: http
          path: /metrics
          interval: 30s
          scrapeTimeout: 15s
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - audiobookshelf.alexlebens.net
      rules:
        - backendRefs:
            - name: audiobookshelf
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: audiobookshelf-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
    metadata:
      forceRename: audiobookshelf-metadata
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /metadata
              readOnly: false
    books:
      existingClaim: audiobookshelf-books-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Books
              readOnly: false
    audiobooks:
      existingClaim: audiobookshelf-audiobooks-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Audiobooks
              readOnly: false
    podcasts:
      existingClaim: audiobookshelf-podcasts-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Podcasts
              readOnly: false
volsync-target-config:
  pvcTarget: audiobookshelf-config
  local:
    enabled: true
    schedule: 5 8 * * *
  remote:
    enabled: true
    schedule: 5 10 * * 0
  external:
    enabled: true
    schedule: 5 9 * * 0
volsync-target-metadata:
  pvcTarget: audiobookshelf-metadata
  local:
    enabled: true
    schedule: 10 8 * * *
  remote:
    enabled: true
    schedule: 10 10 * * 0
  external:
    enabled: true
    schedule: 10 9 * * 0
