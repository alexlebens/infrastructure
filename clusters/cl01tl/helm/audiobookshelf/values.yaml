audiobookshelf:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/advplyr/audiobookshelf
            tag: 2.33.2@sha256:a44ed89b3e845faa1f7d353f2cc89b2fcd8011737dd14075fa963cf9468da3a5
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 200Mi
        apprise-api:
          image:
            repository: ghcr.io/caronc/apprise
            tag: v1.3.3@sha256:4bfeac268ba87b8e08e308c9aa0182fe99e9501ec464027afc333d1634e65977
          env:
            - name: TZ
              value: America/Chicago
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: APPRISE_STORAGE_MODE
              value: memory
            - name: APPRISE_STATEFUL_MODE
              value: disabled
            - name: APPRISE_WORKER_COUNT
              value: 1
            - name: APPRISE_STATELESS_URLS
              valueFrom:
                secretKeyRef:
                  name: audiobookshelf-config-apprise
                  key: ntfy-url
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 80
        apprise:
          port: 8000
          targetPort: 8000
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: audiobookshelf
          app.kubernetes.io/instance: audiobookshelf
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: apprise
          scheme: http
          path: /metrics
          interval: 30s
          scrapeTimeout: 15s
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - audiobookshelf.alexlebens.net
      rules:
        - backendRefs:
            - name: audiobookshelf
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: audiobookshelf-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
    metadata:
      forceRename: audiobookshelf-metadata
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /metadata
              readOnly: false
    books:
      existingClaim: audiobookshelf-books-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Books
              readOnly: false
    audiobooks:
      existingClaim: audiobookshelf-audiobooks-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Audiobooks
              readOnly: false
    podcasts:
      existingClaim: audiobookshelf-podcasts-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/Podcasts
              readOnly: false
volsync-target-config:
  pvcTarget: audiobookshelf-config
  local:
    enabled: true
    schedule: 2 8 * * *
  remote:
    enabled: true
    schedule: 2 9 * * *
  external:
    enabled: true
    schedule: 2 10 * * *
volsync-target-metadata:
  pvcTarget: audiobookshelf-metadata
  local:
    enabled: true
    schedule: 4 8 * * *
  remote:
    enabled: true
    schedule: 4 9 * * *
  external:
    enabled: true
    schedule: 4 10 * * *
