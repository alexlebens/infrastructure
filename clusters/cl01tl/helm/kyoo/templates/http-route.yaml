apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kyoo
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kyoo
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - kyoo.alexlebens.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-front
          port: 8901
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /video
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-transcoder
          port: 7666
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /auth/
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-auth
          port: 4568
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-auth
          port: 4568
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-api
          port: 3567
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /swagger
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-api
          port: 3567
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /scanner/
      backendRefs:
        - group: ''
          kind: Service
          name: kyoo-scanner
          port: 4389
          weight: 100
