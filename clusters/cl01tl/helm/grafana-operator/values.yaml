grafana-operator:
  image:
    registry: ghcr.io
    repository: grafana/grafana-operator
    # renovate: datasource=docker depName=ghcr.io/grafana/grafana-operator
    tag: v5.23.0@sha256:3abeaccdf54e9e02c2f4b6215be594c8f78b94a866961ada7f92b677bf33c9b4
  replicas: 2
  resources:
    requests:
      cpu: 1m
      memory: 50Mi
  serviceMonitor:
    enabled: true
postgres-18-cluster:
  mode: recovery
  recovery:
    method: objectStore
    objectStore:
      index: 2
  backup:
    objectStore:
      - name: garage-local
        index: 2
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 30 14 * * *"
        backupName: garage-local
valkey-unified-alerting:
  valkey:
    nameOverride: valkey-unified-alerting
valkey-remote-cache:
  valkey:
    nameOverride: valkey-remote-cache
    replica:
      enabled: false
