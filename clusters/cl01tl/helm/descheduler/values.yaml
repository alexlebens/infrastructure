descheduler:
  image:
    repository: registry.k8s.io/descheduler/descheduler
    tag: v0.36.0@sha256:7ca92c0a7b4f1c51d306409da6b832005fcadb224e384795646376726734c6e5
  kind: Deployment
  resources:
    limits:
      cpu: null
      memory: null
    requests:
      cpu: 10m
      memory: 50Mi
  deschedulingInterval: 2m
  replicas: 3
  leaderElection:
    enabled: true
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
    resourceLock: "leases"
    resourceName: "descheduler"
    resourceNamespace: "descheduler"
  deschedulerPolicy:
    profiles:
      - name: default
        pluginConfig:
          - name: DefaultEvictor
            args:
              ignorePvcPods: true
              evictLocalStoragePods: false
              evictDaemonSetPods: false
          - name: RemoveDuplicates
          - name: RemovePodsViolatingNodeAffinity
            args:
              nodeAffinityType:
                - requiredDuringSchedulingIgnoredDuringExecution
          - name: RemovePodsViolatingNodeTaints
          - name: RemovePodsViolatingInterPodAntiAffinity
          - name: RemovePodsViolatingTopologySpreadConstraint
          - name: "HighNodeUtilization"
            args:
              thresholds:
                cpu: 80
                memory: 80
                pods: 90
              evictableNamespaces:
                exclude:
                  - "kube-system"
              evictionModes:
                - "OnlyThresholdingResources"
          - name: LowNodeUtilization
            args:
              thresholds:
                cpu: 30
                memory: 30
                pods: 30
              targetThresholds:
                cpu: 45
                memory: 45
                pods: 45
        plugins:
          balance:
            enabled:
              - RemoveDuplicates
              - RemovePodsViolatingTopologySpreadConstraint
              - LowNodeUtilization
          deschedule:
            enabled:
              - RemovePodsViolatingNodeTaints
              - RemovePodsViolatingNodeAffinity
              - RemovePodsViolatingInterPodAntiAffinity
  rbac:
    create: true
  serviceAccount:
    create: true
  service:
    enabled: true
  serviceMonitor:
    enabled: true
