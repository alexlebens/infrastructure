descheduler:
  kind: Deployment
  resources:
    limits:
      cpu: null
      memory: null
    requests:
      cpu: 10m
      memory: 50Mi
  deschedulingInterval: 5m
  replicas: 3
  leaderElection:
    enabled: true
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
    resourceLock: "leases"
    resourceName: "descheduler"
    resourceNamespace: "descheduler"
  deschedulerPolicy:
    profiles:
      - name: default
        pluginConfig:
          - name: DefaultEvictor
            args:
              ignorePvcPods: true
              evictLocalStoragePods: false
              evictDaemonSetPods: false
          - name: RemoveDuplicates
          - name: RemovePodsViolatingNodeAffinity
            args:
              nodeAffinityType:
              - requiredDuringSchedulingIgnoredDuringExecution
          - name: RemovePodsViolatingNodeTaints
          - name: RemovePodsViolatingInterPodAntiAffinity
          - name: RemovePodsViolatingTopologySpreadConstraint
          - name: "HighNodeUtilization"
            args:
              thresholds:
                cpu : 80
                memory: 80
                pods: 90
              evictableNamespaces:
                exclude:
                  - "kube-system"
              evictionModes:
                - "OnlyThresholdingResources"
          - name: LowNodeUtilization
            args:
              thresholds:
                cpu: 20
                memory: 20
                pods: 20
              targetThresholds:
                cpu: 50
                memory: 50
                pods: 60
        plugins:
          balance:
            enabled:
              - RemoveDuplicates
              - RemovePodsViolatingTopologySpreadConstraint
              - LowNodeUtilization
          deschedule:
            enabled:
              - RemovePodsViolatingNodeTaints
              - RemovePodsViolatingNodeAffinity
              - RemovePodsViolatingInterPodAntiAffinity
  rbac:
    create: true
  serviceAccount:
    create: true
  service:
    enabled: true
  serviceMonitor:
    enabled: true
