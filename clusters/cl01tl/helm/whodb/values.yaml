whodb:
  controllers:
    main:
      type: deployment
      replicas: 1
      containers:
        main:
          image:
            repository: clidey/whodb
            tag: 0.106.0@sha256:f872bfcdf2f1cd6d9e97fa4c5d8dd521636bea1bfc0efe0a27ab6c9c11137010
          env:
            - name: WHODB_OLLAMA_HOST
              value: ollama-server-2.ollama
            - name: WHODB_OLLAMA_PORT
              value: 11434
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - whodb.alexlebens.net
      rules:
        - backendRefs:
            - name: whodb
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
