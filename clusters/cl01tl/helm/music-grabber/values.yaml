music-grabber:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: g33kphr33k/musicgrabber
            tag: 2.6.3@sha256:33ccf823b27387c5080da6df7e1b22f1e6443f878cfbf14fb06a6abcef79991d
          env:
            - name: MUSIC_DIR
              value: /mnt/store/Music Grabber/
            - name: ENABLE_MUSICBRAINZ
              value: true
            - name: ORGANISE_BY_ARTIST
              value: true
            - name: NAVIDROME_URL
              value: http://navidrome-main.navidrome:80
            - name: NAVIDROME_USER
              valueFrom:
                secretKeyRef:
                  name: music-grabber-config-secret
                  key: navidrome-user
            - name: NAVIDROME_PASS
              valueFrom:
                secretKeyRef:
                  name: music-grabber-config-secret
                  key: navidrome-password
            - name: SLSKD_URL
              value: http://slskd.slskd:5030
            - name: SLSKD_USER
              valueFrom:
                secretKeyRef:
                  name: music-grabber-config-secret
                  key: slskd-user
            - name: SLSKD_PASS
              valueFrom:
                secretKeyRef:
                  name: music-grabber-config-secret
                  key: slskd-password
            - name: SLSKD_DOWNLOADS_PATH
              value: /mnt/store/slskd/Downloads
          resources:
            limits:
              cpu: 100m
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - music-grabber.alexlebens.net
      rules:
        - backendRefs:
            - name: music-grabber
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    data:
      forceRename: music-grabber-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /data
              readOnly: false
    music:
      existingClaim: music-grabber-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store/
              readOnly: false
volsync-target-data:
  pvcTarget: music-grabber-data
  local:
    enabled: true
    schedule: 46 8 * * *
  remote:
    enabled: true
    schedule: 46 9 * * *
  external:
    enabled: true
    schedule: 46 10 * * *
