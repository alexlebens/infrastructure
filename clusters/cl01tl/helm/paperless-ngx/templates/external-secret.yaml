apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-key
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: paperless-ngx-key
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: secret-key
      remoteRef:
        key: /cl01tl/paperless-ngx/key
        property: secret-key

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: paperless-ngx-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: admin-user
      remoteRef:
        key: /cl01tl/paperless-ngx/config
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: /cl01tl/paperless-ngx/config
        property: admin-password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-ngx-oidc-authentik
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: paperless-ngx-oidc-authentik
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: PAPERLESS_SOCIALACCOUNT_PROVIDERS
      remoteRef:
        key: /cl01tl/authentik/oidc/paperless-ngx
        property: PAPERLESS_SOCIALACCOUNT_PROVIDERS
