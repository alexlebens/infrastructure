site-saralebens:
  global:
    fullnameOverride: site-saralebens
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/site-saralebens
            tag: 1.3.0@sha256:44fc185d638ad693a2d5d5b81ea2dbbb2d31a1a1389d18220ec26c05971322cb
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
