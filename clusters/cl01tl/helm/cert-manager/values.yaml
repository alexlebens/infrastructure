cert-manager:
  crds:
    enabled: true
    keep: true
  replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  extraArgs:
    - --enable-gateway-api
  resources:
    requests:
      cpu: 1m
      memory: 40Mi
  prometheus:
    servicemonitor:
      enabled: true
      honorLabels: true
  cainjector:
    enabled: true
    replicaCount: 2
