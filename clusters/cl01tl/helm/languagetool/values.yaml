languagetool:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: erikvl87/languagetool
            tag: 6.7@sha256:454acc9b3d232bdf37a0eddb1c8d0e93513ce41b914a8a374e3c44a884122364
          env:
            - name: langtool_languageModel
              value: /ngrams
            - name: Java_Xms
              value: 512m
            - name: Java_Xmx
              value: 1g
          resources:
            requests:
              cpu: 1m
              memory: 800Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8010
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - languagetool.alexlebens.net
      rules:
        - backendRefs:
            - name: languagetool
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    data:
      forceRename: languagetool-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /ngrams
              readOnly: false
volsync-target-data:
  pvcTarget: languagetool-data
  local:
    enabled: true
    schedule: 38 11 * * *
  remote:
    enabled: true
    schedule: 38 12 * * *
  external:
    enabled: true
    schedule: 38 14 * * *
