local-path-provisioner:
  replicaCount: 1
  image:
    repository: rancher/local-path-provisioner
    tag: v0.0.35@sha256:34ff0847cc47ebf69656ba44a3de9324596d0036b66ffd323b21614dd8221530
  helperImage:
    repository: busybox
    tag: 1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
  storageClass:
    create: true
    defaultClass: false
    defaultVolumeType: hostPath
    name: local-path
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
  resources:
    limits:
      cpu: 1m
      memory: 30Mi
  nodePathMap:
    - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
      paths:
        - /var/mnt/local-storage
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/local-storage-node
                operator: Exists
  configmap:
    name: local-path-config
    setup: |-
      #!/bin/sh
      set -eu
      mkdir -m 0777 -p "$VOL_DIR"
    teardown: |-
      #!/bin/sh
      set -eu
      rm -rf "$VOL_DIR"
