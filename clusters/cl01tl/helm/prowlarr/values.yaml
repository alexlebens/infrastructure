prowlarr:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
      containers:
        main:
          image:
            repository: ghcr.io/linuxserver/prowlarr
            tag: 2.3.5.5327-ls141@sha256:35f48abb3e976fcf077fae756866c582e4a90f8b24810ae4067b3558f7cdbbdf
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 9696
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - prowlarr.alexlebens.net
      rules:
        - backendRefs:
            - name: prowlarr
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: prowlarr-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
volsync-target-config:
  pvcTarget: prowlarr-config
  moverSecurityContext:
    runAsUser: 568
    runAsGroup: 568
  local:
    enabled: true
    schedule: 56 8 * * *
  remote:
    enabled: true
    schedule: 56 9 * * *
  external:
    enabled: true
    schedule: 56 10 * * *
