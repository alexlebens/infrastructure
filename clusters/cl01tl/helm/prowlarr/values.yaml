prowlarr:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
      containers:
        main:
          image:
            repository: ghcr.io/linuxserver/prowlarr
            tag: 2.3.5.5327-ls141@sha256:35f48abb3e976fcf077fae756866c582e4a90f8b24810ae4067b3558f7cdbbdf
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
        metrics:
          image:
            repository: ghcr.io/onedr0p/exportarr
            tag: v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
          args: ["prowlarr"]
          env:
            - name: URL
              value: http://localhost
            - name: PORT
              value: 9792
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  name: prowlarr-key-secret
                  key: key
            - name: ENABLE_ADDITIONAL_METRICS
              value: false
            - name: ENABLE_UNKNOWN_QUEUE_ITEMS
              value: false
            - name: PROWLARR__BACKFILL
              value: true
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 9696
        metrics:
          port: 9792
          targetPort: 9792
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: prowlarr
          app.kubernetes.io/instance: prowlarr
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 1m
          scrapeTimeout: 30s
          path: /metrics
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - prowlarr.alexlebens.net
      rules:
        - backendRefs:
            - name: prowlarr
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: prowlarr-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
volsync-target-config:
  pvcTarget: prowlarr-config
  moverSecurityContext:
    runAsUser: 568
    runAsGroup: 568
  local:
    enabled: true
    schedule: 56 8 * * *
  remote:
    enabled: true
    schedule: 56 9 * * *
  external:
    enabled: true
    schedule: 56 10 * * *
