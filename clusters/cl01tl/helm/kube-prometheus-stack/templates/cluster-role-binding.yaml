apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "kube-prometheus-stack.fullname" . }}-httproute-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ template "kube-prometheus-stack.fullname" . }}-httproute-reader
    {{- include "custom.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kube-prometheus-stack.fullname" . }}-httproute-reader
subjects:
  - kind: ServiceAccount
    name: {{ template "kube-prometheus-stack.prometheus.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
