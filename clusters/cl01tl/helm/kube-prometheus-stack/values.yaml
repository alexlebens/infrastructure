kube-prometheus-stack:
  crds:
    enabled: false
  defaultRules:
    create: true
    rules:
      kubeControllerManager: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
  global:
    rbac:
      createAggregateClusterRoles: true
  alertmanager:
    config:
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 24h
        receiver: ntfy
        routes:
          - receiver: ntfy
            group_wait: 10s
            group_interval: 5m
            repeat_interval: 24h
      receivers:
        - name: ntfy
          webhook_configs:
            - url: http://ntfy-alertmanager.kube-prometheus-stack:80
              http_config:
                basic_auth:
                  username: ntfy-alertmanager
                  password_file: /etc/alertmanager/secrets/alertmanager-ntfy-config/ntfy_password
    route:
      main:
        enabled: true
        hostnames:
          - alertmanager.alexlebens.net
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: traefik-gateway
            namespace: traefik
    alertmanagerSpec:
      secrets:
        - alertmanager-ntfy-config
  grafana:
    enabled: false
  kubeApiServer:
    tlsConfig:
      insecureSkipVerify: true
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    service:
      selector:
        k8s-app: kube-controller-manager
    serviceMonitor:
      metricRelabelings:
        - action: labeldrop
          regex: pod
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          separator: ;
          regex: ^(.*)$
          targetLabel: nodename
          replacement: $1
          action: replace
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  prometheusOperator:
    admissionWebhooks:
      annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: HookSucceeded
      patch:
        annotations:
          argocd.argoproj.io/hook: PreSync
          argocd.argoproj.io/hook-delete-policy: HookSucceeded
      mutatingWebhookConfiguration:
        annotations:
          argocd.argoproj.io/hook: PreSync
      validatingWebhookConfiguration:
        annotations:
          argocd.argoproj.io/hook: PreSync
  prometheus:
    route:
      main:
        enabled: true
        hostnames:
          - prometheus.alexlebens.net
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: traefik-gateway
            namespace: traefik
    prometheusSpec:
      scrapeInterval: 30s
      retention: 60d
      retentionSize: 450GiB
      externalUrl: https://prometheus.alexlebens.net
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: synology-iscsi-delete
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 500Gi
prometheus-blackbox-exporter:
  revisionHistoryLimit: 3
  image:
    registry: quay.io
    repository: prometheus/blackbox-exporter
    tag: v0.28.0
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
  replicas: 3
  configExistingSecretName: blackbox-exporter-config
  serviceMonitor:
    selfMonitor:
      enabled: true
    enabled: true
    defaults:
      interval: 30s
      scrapeTimeout: 10s
      module: http_2xx
    targets:
      - name: lidarr
        url: http://lidarr.lidarr:80/
        hostname: lidarr.lidarr
      - name: radarr
        url: http://radarr.radarr:80/
        hostname: radarr.radarr
      - name: radarr-4k
        url: http://radarr-4k.radarr-4k:80/
        hostname: radarr-4k.radarr-4k
      - name: radarr-anime
        url: http://radarr-anime.radarr-anime:80/
        hostname: radarr-anime.radarr-anime
      - name: radarr-standup
        url: http://radarr-standup.radarr-standup:80/
        hostname: radarr-standup.radarr-standup
      - name: sonarr
        url: http://sonarr.sonarr:80/
        hostname: sonarr.sonarr
      - name: sonarr-4k
        url: http://sonarr-4k.sonarr-4k:80/
        hostname: sonarr-4k.sonarr-4k
      - name: sonarr-anime
        url: http://sonarr-anime.sonarr-anime:80/
        hostname: sonarr-anime.sonarr-anime
      - name: authentik
        url: https://auth.alexlebens.dev/
        hostname: auth.alexlebens.dev
      - name: docs
        url: https://docs.alexlebens.dev/
        hostname: docs.alexlebens.dev
      - name: freshrss
        url: https://rss.alexlebens.dev/i/
        hostname: rss.alexlebens.dev
        module: http_401
      - name: gitea-external
        url: https://gitea.alexlebens.dev/
        hostname: gitea.alexlebens.dev
      - name: karakeep
        url: https://karakeep.alexlebens.dev/
        hostname: karakeep.alexlebens.dev
      - name: matrix
        url: https://chat.alexlebens.dev/
        hostname: chat.alexlebens.dev
      - name: outline
        url: https://outline.alexlebens.dev/
        hostname: outline.alexlebens.dev
      - name: postiz
        url: https://postiz.alexlebens.dev/
        hostname: postiz.alexlebens.dev
      - name: rybbit
        url: https://rybbit.alexlebens.dev/
        hostname: rybbit.alexlebens.dev
      - name: vaultwarden
        url: https://passwords.alexlebens.dev/
        hostname: passwords.alexlebens.dev
      - name: www
        url: https://www.alexlebens.dev/
        hostname: www.alexlebens.dev
      - name: saralebens
        url: https://www.saralebens.com/
        hostname: www.saralebens.com
  prometheusRule:
    enabled: true
    rules:
      - alert: EndpointDown
        expr: max by (instance, target) (probe_success) == 0
        for: 60s
        labels:
          severity: critical
        annotations:
          summary: "Endpoint {{ $labels.instance }} is down"
          description: "Failed to probe {{ $labels.instance }} for more than 30 seconds."
      - alert: EndpointHighLatency
        expr: max by (instance, target) (probe_duration_seconds) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Endpoint {{ $labels.instance }} is slow"
          description: "Endpoint {{ $labels.instance }} is taking longer than 5 seconds to respond."
      - alert: SSLCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL Certificate for {{ $labels.instance }} expires soon"
          description: "The SSL certificate for {{ $labels.instance }} will expire in less than 7 days."
ntfy-alertmanager:
  global:
    fullnameOverride: ntfy-alertmanager
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        automountServiceAccountToken: true
      serviceAccount:
        name: ntfy-alertmanager
      containers:
        main:
          image:
            repository: xenrox/ntfy-alertmanager
            tag: 1.0.0@sha256:81788c7905774b7b0b2ed6833b2bc4826a90a42e4b738706edcedd5f489e7a73
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  persistence:
    config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: ntfy-alertmanager-config
      advancedMounts:
        main:
          main:
            - path: /etc/ntfy-alertmanager/config
              readOnly: true
              mountPropagation: None
              subPath: config
valkey:
  valkey:
    dataStorage:
      requestedSize: 10Gi
    replica:
      persistence:
        size: 10Gi
