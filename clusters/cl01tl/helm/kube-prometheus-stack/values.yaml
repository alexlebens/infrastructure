  prometheusRule:
    enabled: true
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 60s
        labels:
          severity: critical
        annotations:
          summary: "Endpoint {{ $labels.instance }} is down"
          description: "Failed to probe {{ $labels.instance }} for more than 30 seconds."
ntfy-alertmanager:
  global:
    fullnameOverride: ntfy-alertmanager
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        automountServiceAccountToken: true
      serviceAccount:
        name: ntfy-alertmanager
      containers:
        main:
          image:
            repository: xenrox/ntfy-alertmanager
            tag: 1.0.0@sha256:81788c7905774b7b0b2ed6833b2bc4826a90a42e4b738706edcedd5f489e7a73
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  persistence:
    config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: ntfy-alertmanager-config
      advancedMounts:
        main:
          main:
            - path: /etc/ntfy-alertmanager/config
              readOnly: true
              mountPropagation: None
              subPath: config
valkey:
  valkey:
    dataStorage:
      requestedSize: 10Gi
    replica:
      persistence:
        size: 10Gi
