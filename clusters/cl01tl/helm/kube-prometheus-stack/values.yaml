kube-prometheus-stack:
  crds:
    enabled: false
  defaultRules:
    create: true
    rules:
      kubeControllerManager: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
  global:
    rbac:
      createAggregateClusterRoles: true
  alertmanager:
    config:
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 24h
        receiver: ntfy
        routes:
          - receiver: ntfy
            group_wait: 10s
            group_interval: 5m
            repeat_interval: 24h
      receivers:
        - name: ntfy
          webhook_configs:
            - url: http://ntfy-alertmanager.kube-prometheus-stack:80
              http_config:
                basic_auth:
                  username: ntfy-alertmanager
                  password_file: /etc/alertmanager/secrets/alertmanager-config-config/ntfy_password
    route:
      main:
        enabled: true
        hostnames:
          - alertmanager.alexlebens.net
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: traefik-gateway
            namespace: traefik
    alertmanagerSpec:
      secrets:
        - alertmanager-ntfy-config
  grafana:
    enabled: false
  kubeApiServer:
    tlsConfig:
      insecureSkipVerify: true
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    service:
      selector:
        k8s-app: kube-controller-manager
    serviceMonitor:
      metricRelabelings:
        - action: labeldrop
          regex: pod
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          separator: ;
          regex: ^(.*)$
          targetLabel: nodename
          replacement: $1
          action: replace
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  prometheusOperator:
    admissionWebhooks:
      annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: HookSucceeded
      patch:
        annotations:
          argocd.argoproj.io/hook: PreSync
          argocd.argoproj.io/hook-delete-policy: HookSucceeded
      mutatingWebhookConfiguration:
        annotations:
          argocd.argoproj.io/hook: PreSync
      validatingWebhookConfiguration:
        annotations:
          argocd.argoproj.io/hook: PreSync
  prometheus:
    route:
      main:
        enabled: true
        hostnames:
          - prometheus.alexlebens.net
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: traefik-gateway
            namespace: traefik
    prometheusSpec:
      scrapeInterval: 30s
      retention: 45d
      retentionSize: 240GiB
      externalUrl: https://prometheus.alexlebens.net
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: synology-iscsi-delete
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 250Gi
ntfy-alertmanager:
  global:
    fullnameOverride: ntfy-alertmanager
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      serviceAccount:
        name: ntfy-alertmanager
      containers:
        main:
          image:
            repository: xenrox/ntfy-alertmanager
            tag: 1.0.0@sha256:81788c7905774b7b0b2ed6833b2bc4826a90a42e4b738706edcedd5f489e7a73
  serviceAccount:
    ntfy-alertmanager:
      enabled: true
      staticToken: true
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  persistence:
    config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: ntfy-alertmanager-config
      advancedMounts:
        main:
          main:
            - path: /etc/ntfy-alertmanager/config
              readOnly: true
              mountPropagation: None
              subPath: config
valkey:
  valkey:
    dataStorage:
      requestedSize: 10Gi
    replica:
      persistence:
        size: 10Gi
