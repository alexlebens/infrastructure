docs:
  global:
    fullnameOverride: docs
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/docs
            tag: 1.11.0@sha256:7cec5a500f73ce29e4adbf02a5e999610139a5807d03f7a60ba6a9026e64f5aa
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8000
