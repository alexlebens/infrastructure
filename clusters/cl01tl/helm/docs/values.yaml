docs:
  global:
    fullnameOverride: docs
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/docs
            tag: 1.18.0@sha256:f5a2de0a5505b7bd8cac08bac6ebee1e30544ec8f1838746074621ff48af2c3f
          resources:
            requests:
              cpu: 1m
              memory: 60Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8000
