jellyfin-testing:
  image:
    repository: ghcr.io/jellyfin/jellyfin
    tag: 12.0-rc1@sha256:d04e537d57a79adcbed98c7ff0a4d95521372af16ba1a4c43b679d90a3ae896e
  httpRoute:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: traefik-gateway
        namespace: traefik
    hostnames:
      - jellyfin-testing.alexlebens.net
  resources:
    limits:
      gpu.intel.com/i915: 1
    requests:
      gpu.intel.com/i915: 1
      cpu: 100m
      memory: 100Mi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - jellyfin
          topologyKey: kubernetes.io/hostname
  jellyfin:
    env:
      - name: TZ
        value: America/Chicago
      - name: JELLYFIN_PublishedServerUrl
        value: https://jellyfin-testing.alexlebens.net
  persistence:
    config:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: ceph-block
    media:
      enabled: true
      existingClaim: jellyfin-testing-nfs-storage
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
