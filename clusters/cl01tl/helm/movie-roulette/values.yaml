movie-roulette:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      revisionHistoryLimit: 3
      containers:
        main:
          image:
            repository: ghcr.io/sahara101/movie-roulette
            tag: v5.2.1
            pullPolicy: IfNotPresent
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: movie-roulette-config-secret
                  key: secret-key
            - name: CORS_ALLOWED_ORIGINS
              value: movie-roulette.alexlebens.net
            - name: DISABLE_SETTINGS
              value: "TRUE"
            - name: AUTH_ENABLED
              value: "TRUE"
            - name: AUTH_SESSION_LIFETIME
              value: "86400"
            - name: JELLYFIN_URL
              value: http://jellyfin.alexlebens.net
            - name: JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: movie-roulette-config-secret
                  key: jellyfin-key
            - name: JELLYFIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: movie-roulette-config-secret
                  key: jellyfin-user
            - name: LOGIN_BACKDROP_ENABLED
              value: "TRUE"
            - name: HOMEPAGE_MODE
              value: "FALSE"
            - name: USE_LINKS
              value: "TRUE"
            - name: USE_FILTER
              value: "TRUE"
            - name: USE_WATCH_BUTTON
              value: "TRUE"
            - name: USE_NEXT_BUTTON
              value: "TRUE"
            - name: USE_GRID_VIEW
              value: "true"
            - name: ENABLE_MOBILE_TRUNCATION
              value: "TRUE"
            - name: SHOW_NOW_WATCHING_CARD
              value: "FALSE"
            - name: USE_HEROUI_THEME
              value: "FALSE"
            - name: ENABLE_MOVIE_LOGOS
              value: "TRUE"
            - name: LOAD_MOVIE_ON_START
              value: "FALSE"
            - name: SEERR_URL
              value: http://seerr.alexlebens.net
            - name: SEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: movie-roulette-config-secret
                  key: seerr-key
            - name: REQUEST_SERVICE_DEFAULT
              value: "seerr"
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4000
          protocol: HTTP
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - movie-roulette.alexlebens.net
      rules:
        - backendRefs:
            - group: ''
              kind: Service
              name: movie-roulette
              port: 80
              weight: 100
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    data:
      forceRename: movie-roulette-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      retain: true
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
volsync-target-data:
  pvcTarget: movie-roulette-data
  local:
    enabled: true
    schedule: 44 11 * * *
  remote:
    enabled: false
  external:
    enabled: true
    schedule: 44 12 * * *
