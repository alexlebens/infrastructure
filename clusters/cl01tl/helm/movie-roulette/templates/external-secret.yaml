apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: movie-roulette-config-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: movie-roulette-config-secret
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: secret-key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cl01tl/movie-roulette/key
        metadataPolicy: None
        property: secret-key
    - secretKey: jellyfin-key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cl01tl/jellyfin/movie-roulette
        metadataPolicy: None
        property: jellyfin-key
    - secretKey: jellyfin-user
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cl01tl/jellyfin/movie-roulette
        metadataPolicy: None
        property: user
    - secretKey: seerr-key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /cl01tl/seerr/key
        metadataPolicy: None
        property: key
