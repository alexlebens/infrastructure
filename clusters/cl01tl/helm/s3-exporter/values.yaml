s3-exporter:
  controllers:
    digital-ocean:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: molu8bits/s3bucket_exporter
            tag: 1.0.2@sha256:75fc839c5f12cdbf20babab534959c96356b4483743e730409132bbda6944505
          env:
            - name: S3_NAME
              value: digital-ocean
            - name: S3_ENDPOINT
              value: https://nyc3.digitaloceanspaces.com
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-do-home-infra-secret
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-do-home-infra-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-do-home-infra-secret
                  key: AWS_REGION
            - name: LOG_LEVEL
              value: info
            - name: S3_FORCE_PATH_STYLE
              value: false
          resources:
            requests:
              cpu: 1m
              memory: 40Mi
    garage-local:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: molu8bits/s3bucket_exporter
            tag: 1.0.2@sha256:75fc839c5f12cdbf20babab534959c96356b4483743e730409132bbda6944505
          env:
            - name: S3_NAME
              value: garage-local
            - name: S3_ENDPOINT
              value: http://garage-main.garage:3900
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-garage-secret
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-garage-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_REGION
              value: us-east-1
            - name: LOG_LEVEL
              value: debug
            - name: S3_FORCE_PATH_STYLE
              value: true
          resources:
            requests:
              cpu: 1m
              memory: 40Mi
    garage-remote:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: molu8bits/s3bucket_exporter
            tag: 1.0.2@sha256:75fc839c5f12cdbf20babab534959c96356b4483743e730409132bbda6944505
          env:
            - name: S3_NAME
              value: garage-remote
            - name: S3_ENDPOINT
              value: https://garage-ps10rp.boreal-beaufort.ts.net:3900
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-garage-secret
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-garage-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_REGION
              value: us-east-1
            - name: LOG_LEVEL
              value: debug
            - name: S3_FORCE_PATH_STYLE
              value: true
          resources:
            requests:
              cpu: 1m
              memory: 40Mi
  service:
    digital-ocean:
      controller: digital-ocean
      ports:
        metrics:
          port: 9655
          targetPort: 9655
    garage-local:
      controller: garage-local
      ports:
        metrics:
          port: 9655
          targetPort: 9655
    garage-remote:
      controller: garage-remote
      ports:
        metrics:
          port: 9655
          targetPort: 9655
  serviceMonitor:
    digital-ocean:
      selector:
        matchLabels:
          app.kubernetes.io/name: s3-exporter
          app.kubernetes.io/instance: s3-exporter
          app.kubernetes.io/service: s3-exporter-digital-ocean
      serviceName: s3-exporter-digital-ocean
      endpoints:
        - port: metrics
          interval: 5m
          scrapeTimeout: 2m
          path: /metrics
    garage-local:
      selector:
        matchLabels:
          app.kubernetes.io/name: s3-exporter
          app.kubernetes.io/instance: s3-exporter
          app.kubernetes.io/service: s3-exporter-garage-local
      serviceName: s3-exporter-garage-local
      endpoints:
        - port: metrics
          interval: 5m
          scrapeTimeout: 2m
          path: /metrics
    garage-remote:
      selector:
        matchLabels:
          app.kubernetes.io/name: s3-exporter
          app.kubernetes.io/instance: s3-exporter
          app.kubernetes.io/service: s3-exporter-garage-remote
      serviceName: s3-exporter-garage-remote
      endpoints:
        - port: metrics
          interval: 5m
          scrapeTimeout: 2m
          path: /metrics
