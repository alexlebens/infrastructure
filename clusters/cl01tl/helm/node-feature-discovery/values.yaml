node-feature-discovery:
  image:
    repository: gcr.io/k8s-staging-nfd/node-feature-discovery
    tag: v0.18.3@sha256:f9ef2ebee55141a1758d3c0a87bb701f5db2adf6856f7218b11bc2bac7b63862
    pullPolicy: IfNotPresent
  featureGates:
    NodeFeatureGroupAPI: true
  master:
    replicaCount: 1
    resources:
      limits:
        memory: null
      requests:
        cpu: 10m
        memory: 20Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
  worker:
    config:
      sources:
        cpu:
          cpuid:
            attributeWhitelist:
              - "AVX512BW"
              - "AVX512CD"
              - "AVX512DQ"
              - "AVX512F"
              - "AVX512VL"
        kernel:
          configOpts:
            - "NO_HZ"
            - "X86"
            - "DMI"
        usb:
          deviceClassWhitelist:
            - "02"
            - "03"
            - "0e"
            - "ef"
            - "fe"
            - "ff"
          deviceLabelFields:
            - "vendor"
            - "device"
            - "class"
        pci:
          deviceClassWhitelist:
            - "0200"
            - "01"
            - "08"
            - "0300"
            - "0302"
          deviceLabelFields:
            - "vendor"
            - "device"
            - "class"
        custom:
          - # Intel integrated GPU
            name: "intel-gpu"
            labels:
              intel.feature.node.kubernetes.io/gpu: 'true'
            matchOn:
              - pciId:
                  class: ["0300"]
                  vendor: ["8086"]
    resources:
      limits:
        memory: null
      requests:
        cpu: 1m
        memory: 20Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
  topologyUpdater:
    enable: false
  gc:
    resources:
      limits:
        memory: null
      requests:
        cpu: 1m
        memory: 20Mi
  prometheus:
    enable: true
