decluttarr:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      revisionHistoryLimit: 3
      containers:
        main:
          image:
            repository: ghcr.io/manimatter/decluttarr
            tag: v2.0.0
            pullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
  persistence:
    config:
      enabled: true
      type: secret
      name: decluttarr-config-secret
      advancedMounts:
        main:
          main:
            - path: /app/config/config.yaml
              readOnly: true
              mountPropagation: None
              subPath: config.yaml
