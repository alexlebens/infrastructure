apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch-tubearchivist
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: elasticsearch-tubearchivist
    {{- include "custom.labels" . | nindent 4 }}
spec:
  # renovate: datasource=docker depName=elasticsearch
  version: 9.3.3
  auth:
    fileRealm:
      - secretName: tubearchivist-elasticsearch-config
  nodeSets:
    - name: default
      count: 2
      config:
        node.store.allow_mmap: false
        path.repo: /usr/share/elasticsearch/data/snapshot
      podTemplate:
        spec:
          volumes:
            - name: {{ include "custom.storageSnapshotNfsName" . }}
              nfs:
                path: /volume2/Storage/TubeArchivist
                server: synologybond.alexlebens.net
          containers:
            - name: elasticsearch
              volumeMounts:
                - name: {{ include "custom.storageSnapshotNfsName" . }}
                  mountPath: /usr/share/elasticsearch/data/snapshot
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
            storageClassName: ceph-block
