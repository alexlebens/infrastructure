isponsorblocktv:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      serviceAccount:
        name: isponsorblocktv
      containers:
        main:
          image:
            repository: ghcr.io/dmunozv04/isponsorblocktv
            tag: v2.8.1@sha256:ac35b5d861f437cd5c71d0ccea7c3ed7ea0938ae08cbb6e256de06a236b106f5
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
  serviceAccount:
    isponsorblocktv:
      enabled: true
      staticToken: true
  persistence:
    config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: isponsorblocktv-config
      advancedMounts:
        main:
          main:
            - path: /app/data/config.json
              readOnly: true
              mountPropagation: None
              subPath: config.json
