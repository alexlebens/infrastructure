kubelet-serving-cert-approver:
  defaultPodOptions:
    priorityClassName: system-cluster-critical
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
                - key: node-role.kubernetes.io/master
                  operator: DoesNotExist
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
            weight: 100
    securityContext:
      fsGroup: 65534
      runAsGroup: 65534
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        automountServiceAccountToken: true
      containers:
        main:
          image:
            repository: ghcr.io/alex1989hu/kubelet-serving-cert-approver
            tag: 0.11.0@sha256:f17017b53983fe93f5a07ef85b2e448b9e4be848d45f05c325c8f2c77e1171c4
          args:
            - serve
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
  service:
    main:
      controller: main
      ports:
        health:
          port: 8080
          targetPort: 8080
        metrics:
          port: 9090
          targetPort: 9090
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: kubelet-serving-cert-approver
          app.kubernetes.io/instance: kubelet-serving-cert-approver
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 15s
          path: /metrics
