apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postiz-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /cl01tl/postiz/config
        property: JWT_SECRET

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-valkey-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postiz-valkey-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: url
    - secretKey: user
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: user
    - secretKey: password
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: password
    - secretKey: default
      remoteRef:
        key: /cl01tl/postiz/valkey
        property: password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-oidc-authentik
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postiz-oidc-authentik
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: client
      remoteRef:
        key: /cl01tl/authentik/oidc/postiz
        property: client
    - secretKey: secret
      remoteRef:
        key: /cl01tl/authentik/oidc/postiz
        property: secret
