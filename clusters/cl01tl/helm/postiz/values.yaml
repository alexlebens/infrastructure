postiz:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/gitroomhq/postiz-app
            tag: v2.21.10@sha256:1d5a5dc6b896747d1483c01dc2562165bd313ad601b32f6cabb7f7dd08a911a9
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-config
                  key: JWT_SECRET
            - name: MAIN_URL
              value: https://postiz.alexlebens.dev
            - name: FRONTEND_URL
              value: https://postiz.alexlebens.dev
            - name: NEXT_PUBLIC_BACKEND_URL
              value: https://postiz.alexlebens.dev/api
            - name: BACKEND_INTERNAL_URL
              value: http://localhost:3000
            - name: TEMPORAL_ADDRESS
              value: postiz-temporal-frontend:7233
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-postgresql-18-cluster-app
                  key: uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-valkey-config
                  key: REDIS_URL
            - name: IS_GENERAL
              value: "true"
            - name: DISABLE_REGISTRATION
              value: "false"
            - name: RUN_CRON
              value: "true"
            - name: STORAGE_PROVIDER
              value: local
            - name: UPLOAD_DIRECTORY
              value: /uploads
            - name: NEXT_PUBLIC_UPLOAD_DIRECTORY
              value: /uploads
            - name: NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME
              value: Authentik
            - name: NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL
              value: https://cdn.jsdelivr.net/gh/selfhst/icons/png/authentik.png
            - name: POSTIZ_GENERIC_OAUTH
              value: "true"
            - name: POSTIZ_OAUTH_URL
              value: https://auth.alexlebens.dev
            - name: POSTIZ_OAUTH_AUTH_URL
              value: https://auth.alexlebens.dev/application/o/authorize/
            - name: POSTIZ_OAUTH_TOKEN_URL
              value: https://auth.alexlebens.dev/application/o/token/
            - name: POSTIZ_OAUTH_USERINFO_URL
              value: https://auth.alexlebens.dev/application/o/userinfo/
            - name: POSTIZ_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: postiz-oidc-authentik
                  key: client
            - name: POSTIZ_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-oidc-authentik
                  key: secret
            - name: POSTIZ_OAUTH_SCOPE
              value: openid profile email
            - name: NEXT_PUBLIC_SENTRY_DSN
              value: http://key@postiz-spotlight.postiz:8969/1
            - name: SENTRY_SPOTLIGHT
              value: http://postiz-spotlight.postiz:8969/stream
          resources:
            requests:
              cpu: 100m
              memory: 1000Mi
    spotlight:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/getsentry/spotlight
            tag: 4.11.7@sha256:101b276ea12f05450757d52969080f593b79417b237a02e67ce7906b25eb456d
          resources:
            requests:
              cpu: 10m
              memory: 1000Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 5000
    spotlight:
      controller: spotlight
      ports:
        http:
          port: 8969
          targetPort: 8969
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - postiz-spotlight.alexlebens.net
      rules:
        - backendRefs:
            - name: postiz-spotlight
              port: 8969
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: postiz-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
    uploads:
      forceRename: postiz-uploads
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /uploads
              readOnly: false
temporal:
  server:
    image:
      repository: temporalio/server
      tag: 1.31.1@sha256:5728db90c9883f5b2a7b8ea0bcdfb84edbc9f6c14479cd3354957aa77d4b8bac
    metrics:
      serviceMonitor:
        enabled: true
    config:
      logLevel: "debug,info"
      persistence:
        datastores:
          default:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal
              connectAddr: postiz-postgresql-18-cluster-rw.postiz:5432
              connectProtocol: "tcp"
              user: postgres
              existingSecret: postiz-postgresql-18-cluster-superuser
              secretKey: password
              tls:
                enabled: false
          visibility:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal_visibility
              connectAddr: postiz-postgresql-18-cluster-rw.postiz:5432
              connectProtocol: "tcp"
              user: postgres
              existingSecret: postiz-postgresql-18-cluster-superuser
              secretKey: password
              tls:
                enabled: false
      namespaces:
        create: true
        namespace:
          - name: default
            retention: 30d
    frontend:
      ingress:
        enabled: false
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
    history:
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 200Mi
    matching:
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 200Mi
    worker:
      metrics:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 50Mi
  admintools:
    image:
      repository: temporalio/admin-tools
      tag: 1.31.1@sha256:0fa94393f6254dea05df1cdacb7a8ee95f6fb51a2ffbde0c6847a73037f788c7
    resources:
      requests:
        cpu: 10m
        memory: 10Mi
  web:
    image:
      repository: temporalio/ui
      tag: 2.51.1@sha256:6d2fbeba176c9f6f93cd3b352742cd21a25b3e2f467b276aacbb9b5b2bfde00f
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
postgres-18-cluster:
  mode: recovery
  cluster:
    enableSuperuserAccess: true
  recovery:
    method: objectStore
    objectStore:
      index: 1
  backup:
    objectStore:
      - name: garage-local
        index: 1
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 20 15 * * *"
        backupName: garage-local
  databases:
    - name: temporal
      ensure: present
      owner: app
    - name: temporal_visibility
      ensure: present
      owner: app
valkey:
  valkey:
    auth:
      enabled: true
      usersExistingSecret: postiz-valkey-config
      aclUsers:
        default:
          permissions: "~* &* +@all"
volsync-target-config:
  pvcTarget: postiz-config
  local:
    enabled: true
    schedule: 0 8 * * *
  remote:
    enabled: true
    schedule: 0 10 * * 4
  external:
    enabled: true
    schedule: 0 9 * * 4
volsync-target-upload:
  pvcTarget: postiz-uploads
  local:
    enabled: true
    schedule: 5 8 * * *
  remote:
    enabled: true
    schedule: 5 10 * * 4
  external:
    enabled: true
    schedule: 5 9 * * 4
