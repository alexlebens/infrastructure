apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: komodo-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: komodo-secret
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: passkey
      remoteRef:
        key: /cl01tl/komodo/key
        property: passkey
    - secretKey: jwt
      remoteRef:
        key: /cl01tl/komodo/key
        property: jwt
    - secretKey: webhook
      remoteRef:
        key: /cl01tl/komodo/key
        property: webhook

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: komodo-oidc-authentik
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: komodo-oidc-authentik
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: client
      remoteRef:
        key: /cl01tl/authentik/oidc/komodo
        property: client
    - secretKey: secret
      remoteRef:
        key: /cl01tl/authentik/oidc/komodo
        property: secret

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: komodo-postgresql-17-fdb-cluster-ferret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: komodo-postgresql-17-fdb-cluster-ferret
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: uri
      remoteRef:
        key: /cl01tl/komodo/ferret
        property: uri
    - secretKey: password
      remoteRef:
        key: /cl01tl/komodo/ferret
        property: password
