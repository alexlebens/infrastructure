blog:
  global:
    fullnameOverride: blog
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/blog
            tag: 3.31.0@sha256:eb5f51787100062dafbbd4e9f29217cfd333653a7b8e2863cf8cab7b41fbca37
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
