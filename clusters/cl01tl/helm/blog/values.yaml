blog:
  global:
    fullnameOverride: blog
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/blog
            tag: 3.24.0@sha256:d98f760f019c53029577860ba090cfcda5fe5c8ae4301039df06a762e17515e4
          resources:
            requests:
              cpu: 10m
              memory: 60Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
