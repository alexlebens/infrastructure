blog:
  global:
    fullnameOverride: blog
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/blog
            tag: 3.32.0@sha256:dd37907c4b8d3a90853ec1d106ff03e05d07836fa6b6b6b7d64ca9b1c0f08cff
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
