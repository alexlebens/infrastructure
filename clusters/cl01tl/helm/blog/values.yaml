blog:
  global:
    fullnameOverride: blog
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/blog
            tag: 3.32.2@sha256:473ab98a1d2bc6bf27b99ec8f66aa98a33fd90dff3c024ea5e6a22b014e72c51
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
