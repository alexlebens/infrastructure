blog:
  global:
    fullnameOverride: blog
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/blog
            tag: 3.30.0@sha256:41a5b9e024c9a8f984fd77b6aef9b5b0c88ecdc255068a60f1773c334c01e933
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
