site-profile:
  global:
    fullnameOverride: site-profile
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/site-profile
            tag: 3.18.2@sha256:8deb9624b2564fabd1f5cc6822306fd198b245858317be2d9ab4ca044ae3ded5
          resources:
            requests:
              cpu: 10m
              memory: 60Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
