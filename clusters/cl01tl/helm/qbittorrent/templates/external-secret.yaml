apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-wireguard-conf
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: qbittorrent-wireguard-conf
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: private-key
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: private-key
    - secretKey: preshared-key
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: preshared-key
    - secretKey: addresses
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: addresses
    - secretKey: input-ports
      remoteRef:
        key: /airvpn/conf/cl01tl
        property: input-ports

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-qbit-manage-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: qbittorrent-qbit-manage-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: ntfy-url
      remoteRef:
        key: /cl01tl/qbittorrent/qbit-manage
        property: ntfy-url
    - secretKey: config.yml
      remoteRef:
        key: /cl01tl/qbittorrent/qbit-manage
        property: config.yml

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qui-oidc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: qui-oidc-secret
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: secret
      remoteRef:
        key: /authentik/oidc/qui
        property: secret
    - secretKey: client
      remoteRef:
        key: /authentik/oidc/qui
        property: client
