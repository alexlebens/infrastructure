apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbit-manage-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: qbit-manage-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    template:
      mergePolicy: Merge
      engineVersion: v2
      data:
        ntfy-url: "{{ `{{ .endpoint }}` }}/qbit-manage"
  data:
    - secretKey: endpoint
      remoteRef:
        key: /cl01tl/ntfy/users/cl01tl
        property: internal-endpoint-credential

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qui-oidc-authentik
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: qui-oidc-authentik
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: secret
      remoteRef:
        key: /cl01tl/authentik/oidc/qui
        property: secret
    - secretKey: client
      remoteRef:
        key: /cl01tl/authentik/oidc/qui
        property: client

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airvpn-wireguard-conf
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: airvpn-wireguard-conf
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: conf
      remoteRef:
        key: /airvpn/config
        property: conf
    - secretKey: private-key
      remoteRef:
        key: /airvpn/config
        property: private-key
    - secretKey: preshared-key
      remoteRef:
        key: /airvpn/config
        property: preshared-key
    - secretKey: addresses
      remoteRef:
        key: /airvpn/config
        property: addresses
    - secretKey: input-ports
      remoteRef:
        key: /airvpn/config
        property: input-ports

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: protonvpn-wireguard-conf
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: protonvpn-wireguard-conf
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: conf
      remoteRef:
        key: /protonvpn/config
        property: conf
    - secretKey: email
      remoteRef:
        key: /protonvpn/config
        property: email
    - secretKey: password
      remoteRef:
        key: /protonvpn/config
        property: password
    - secretKey: private-key
      remoteRef:
        key: /protonvpn/config
        property: private-key
