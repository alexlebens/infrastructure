qbittorrent:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - slskd
                topologyKey: kubernetes.io/hostname
      initContainers:
        init-sysctl:
          image:
            repository: busybox
            tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          securityContext:
            privileged: True
          command:
            - /bin/sh
          args:
            - -ec
            - |
              sysctl -w net.ipv4.ip_forward=1;
              sysctl -w net.ipv6.conf.all.disable_ipv6=1
        gluetun:
          restartPolicy: Always
          image:
            repository: ghcr.io/qdm12/gluetun
            tag: latest@sha256:725d3e51091dde4ca43e3e3f26e2e6d3d0ccc66821e92d505c3da04958f7d472
          lifecycle:
            postStart:
              exec:
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "(ip rule del table 51820; ip -6 rule del table 51820) || true",
                  ]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wireguard-conf
                  key: private-key
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 127.0.0.0/8,192.168.1.0/24,10.244.0.0/16,10.96.0.0/12
            - name: FIREWALL_INPUT_PORTS
              value: 8080,9022
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_UP_COMMAND
              value: '/bin/sh -c "/gluetun/update.sh {{ printf "{{PORT}}" }}"'
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: BLOCK_MALICIOUS
              value: "off"
          securityContext:
            privileged: True
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          probes:
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /gluetun-entrypoint
                    - healthcheck
                failureThreshold: 5
                initialDelaySeconds: 30
                periodSeconds: 30
                successThreshold: 1
                timeoutSeconds: 15
          resources:
            limits:
              devic.es/tun: "1"
            requests:
              devic.es/tun: "1"
      containers:
        qbittorrent:
          image:
            repository: ghcr.io/linuxserver/qbittorrent
            tag: 5.2.2_v2.0.13-ls462@sha256:bca2cf536c00900f0b8fb62ca3dcbed8ee64293165d41c8240d2cc952d4ef048
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: 1000
            - name: PGID
              value: 1000
            - name: UMASK_SET
              value: "002"
            - name: WEBUI_PORT
              value: 8080
          resources:
            requests:
              cpu: 100m
              memory: 1000Mi
        exporter:
          image:
            repository: esanchezm/prometheus-qbittorrent-exporter
            tag: v1.7.0@sha256:460e3cf7e7d7ce3a7c9ed8ab896bd5682fd29a6fb0d6e19701cbbd0f4364bf26
          env:
            - name: QBITTORRENT_HOST
              value: localhost
            - name: QBITTORRENT_PORT
              value: "8080"
            - name: QBITTORRENTAPI_DO_NOT_VERIFY_WEBUI_CERTIFICATE
              value: "true"
            - name: EXPORTER_PORT
              value: "9022"
            - name: EXPORTER_LOG_LEVEL
              value: INFO
    qbit-manage:
      type: deployment
      annotations:
        reloader.stakater.com/auto: "true"
      replicas: 1
      strategy: Recreate
      pod:
        automountServiceAccountToken: true
      initContainers:
        init-copy-config:
          image:
            repository: busybox
            tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - /bin/sh
            - -ec
            - |
              cp /tmp/config.yml /app/config/config.yml
      containers:
        qbit-manage:
          image:
            repository: ghcr.io/stuffanthings/qbit_manage
            tag: v4.8.1@sha256:38afe4cf17e983dd1758f5a7437beebab2679d2c77fc18a790d5e2abef657b8f
            pullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/Chicago
            - name: QBT_SCHEDULE
              value: 0 * * * *
            - name: QBT_STARTUP_DELAY
              value: 360
            - name: QBT_CONFIG_DIR
              value: /app/config/
            - name: QBT_LOGFILE
              value: /app/var/activity.log
            - name: QBT_LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 10m
              memory: 300Mi
        apprise-api:
          image:
            repository: ghcr.io/caronc/apprise
            tag: v1.5.0@sha256:43673bf62faa88148298d52664b37b4860189555db0b251b54d79a3ef3a173cf
          env:
            - name: TZ
              value: America/Chicago
            - name: PGID
              value: 1000
            - name: PUID
              value: 1000
            - name: APPRISE_STORAGE_MODE
              value: memory
            - name: APPRISE_STATEFUL_MODE
              value: disabled
            - name: APPRISE_WORKER_COUNT
              value: 1
            - name: APPRISE_STATELESS_URLS
              valueFrom:
                secretKeyRef:
                  name: qbit-manage-config
                  key: ntfy-url
    qui:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        qui:
          image:
            repository: ghcr.io/autobrr/qui
            tag: v1.20.0@sha256:946e96a158d847a01b5d0055aeadfc1998fff021974d0d5b1e61ccd7fb199450
          env:
            - name: QUI__METRICS_ENABLED
              value: true
            - name: QUI__METRICS_HOST
              value: 0.0.0.0
            - name: QUI__METRICS_PORT
              value: 9074
            - name: QUI__OIDC_ENABLED
              value: true
            - name: QUI__OIDC_ISSUER
              value: https://auth.alexlebens.dev/application/o/qui/
            - name: QUI__OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qui-oidc-authentik
                  key: client
            - name: QUI__OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qui-oidc-authentik
                  key: secret
            - name: QUI__OIDC_REDIRECT_URL
              value: https://qui.alexlebens.net/api/auth/oidc/callback
            - name: QUI__OIDC_DISABLE_BUILT_IN_LOGIN
              value: false
          resources:
            requests:
              cpu: 10m
              memory: 70Mi
  service:
    main:
      controller: main
      forceRename: qbittorrent
      ports:
        http:
          port: 8080
          targetPort: 8080
        health:
          port: 9999
          targetPort: 9999
        metrics:
          port: 9022
          targetPort: 9022
    qbit-manage:
      controller: qbit-manage
      ports:
        apprise:
          port: 80
          targetPort: 8181
    qui:
      controller: qui
      ports:
        http:
          port: 80
          targetPort: 7476
        metrics:
          port: 9074
          targetPort: 9074
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: qbittorrent
          app.kubernetes.io/instance: qbittorrent
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 15s
          path: /metrics
    apprise:
      selector:
        matchLabels:
          app.kubernetes.io/name: qbittorrent-apprise
          app.kubernetes.io/instance: qbittorrent-apprise
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: apprise
          interval: 30s
          scrapeTimeout: 15s
          path: /metrics
    qui:
      selector:
        matchLabels:
          app.kubernetes.io/name: qbittorrent-qui
          app.kubernetes.io/instance: qbittorrent-qui
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 15s
          path: /metrics
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - qbittorrent.alexlebens.net
      rules:
        - backendRefs:
            - name: qbittorrent
              port: 8080
          matches:
            - path:
                type: PathPrefix
                value: /
    qui:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - qui.alexlebens.net
      rules:
        - backendRefs:
            - name: qbittorrent-qui
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    update-script:
      enabled: true
      type: configMap
      name: glutun-update-script
      defaultMode: 0755
      advancedMounts:
        main:
          gluetun:
            - path: /gluetun/update.sh
              subPath: update.sh
    config-data:
      forceRename: qbittorrent-config-data
      storageClass: ceph-filesystem
      accessMode: ReadWriteMany
      size: 1Gi
      advancedMounts:
        main:
          qbittorrent:
            - path: /config/qBittorrent
              readOnly: false
        qbit-manage:
          qbit-manage:
            - path: /qbittorrent/qBittorrent
              readOnly: false
    qbit-manage-config:
      enabled: true
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: qbit-manage-config
      advancedMounts:
        qbit-manage:
          init-copy-config:
            - path: /tmp/config.yml
              readOnly: true
              mountPropagation: None
              subPath: config.yml
          qbit-manage:
            - path: /tmp/config.yml
              readOnly: true
              mountPropagation: None
              subPath: config.yml
    qbit-manage-config-data:
      forceRename: qbittorrent-qbit-manage-config-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        qbit-manage:
          init-copy-config:
            - path: /app/config
              readOnly: false
          qbit-manage:
            - path: /app/config
              readOnly: false
    qbit-manage-config-var:
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 500Mi
      advancedMounts:
        qbit-manage:
          qbit-manage:
            - path: /app/var
              readOnly: false
    qui-config-data:
      forceRename: qbittorrent-qui-config-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        qui:
          qui:
            - path: /config
              readOnly: false
    storage:
      type: persistentVolumeClaim
      existingClaim: qbittorrent-nfs-storage
      advancedMounts:
        main:
          qbittorrent:
            - path: /mnt/store
              readOnly: false
        qbit-manage:
          qbit-manage:
            - path: /mnt/store
              readOnly: false
volsync-target-config:
  pvcTarget: qbittorrent-config-data
  moverSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  local:
    enabled: true
    schedule: 15 8 * * *
    restic:
      copyMethod: Snapshot
      storageClassName: ceph-filesystem
      volumeSnapshotClassName: ceph-filesystem-snapshot
  remote:
    enabled: true
    schedule: 15 10 * * 4
    restic:
      copyMethod: Snapshot
      storageClassName: ceph-filesystem
      volumeSnapshotClassName: ceph-filesystem-snapshot
  external:
    enabled: true
    schedule: 15 9 * * 4
    restic:
      copyMethod: Snapshot
      storageClassName: ceph-filesystem
      volumeSnapshotClassName: ceph-filesystem-snapshot
volsync-target-qbit-manage-config:
  pvcTarget: qbittorrent-qbit-manage-config-data
  local:
    enabled: true
    schedule: 20 8 * * *
  remote:
    enabled: true
    schedule: 20 10 * * 4
  external:
    enabled: true
    schedule: 20 9 * * 4
volsync-target-qui-config:
  pvcTarget: qbittorrent-qui-config-data
  local:
    enabled: true
    schedule: 25 8 * * *
  remote:
    enabled: true
    schedule: 25 10 * * 4
  external:
    enabled: true
    schedule: 25 9 * * 4
