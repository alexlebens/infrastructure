seerr-chart:
  image:
    registry: ghcr.io
    repository: seerr-team/seerr
    tag: v3.1.0
    sha: b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
  config:
    persistence:
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      storageClass: ceph-block
  route:
    main:
      enabled: true
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - seerr.alexlebens.net
  resources:
    requests:
      cpu: 10m
      memory: 500Mi
volsync-target-config:
  pvcTarget: seerr-seerr-chart-config
  local:
    enabled: true
    schedule: 18 11 * * *
  remote:
    enabled: true
    schedule: 18 12 * * *
  external:
    enabled: true
    schedule: 18 13 * * *
