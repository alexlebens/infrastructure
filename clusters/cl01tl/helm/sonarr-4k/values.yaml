sonarr-4k:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      revisionHistoryLimit: 3
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/linuxserver/sonarr
            tag: 4.0.17.2952-ls307@sha256:6854df9de20b8c82e1982604f39473d64dbb4c4584b1013f18f9ade1ee92af13
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: 1000
            - name: PGID
              value: 1000
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
        metrics:
          image:
            repository: ghcr.io/onedr0p/exportarr
            tag: v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
          args: ["sonarr"]
          env:
            - name: URL
              value: http://localhost
            - name: CONFIG
              value: /config/config.xml
            - name: PORT
              value: 9794
            - name: ENABLE_ADDITIONAL_METRICS
              value: false
            - name: ENABLE_UNKNOWN_QUEUE_ITEMS
              value: false
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8989
        metrics:
          port: 9794
          targetPort: 9794
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: sonarr-4k
          app.kubernetes.io/instance: sonarr-4k
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 3m
          scrapeTimeout: 1m
          path: /metrics
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - sonarr-4k.alexlebens.net
      rules:
        - backendRefs:
            - name: ak-outpost-traefik-proxy-auth
              namespace: authentik
              port: 9000
              weight: 100
          filters: []
          matches:
            - path:
                type: PathPrefix
                value: /outpost.goauthentik.io
        - backendRefs:
            - name: sonarr-4k
              port: 80
          filters:
            - type: ExtensionRef
              extensionRef:
                group: traefik.io
                kind: Middleware
                name: oidc-forward-auth
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: sonarr-4k-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 20Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
          metrics:
            - path: /config
              readOnly: true
    media:
      existingClaim: sonarr-4k-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /mnt/store
              readOnly: false
postgres-18-cluster:
  mode: recovery
  cluster:
    initdb:
      postInitSQL:
        - CREATE DATABASE IF NOT EXISTS "sonarr-main" OWNER "app";
        - CREATE DATABASE IF NOT EXISTS "sonarr-log" OWNER "app";
  recovery:
    method: objectStore
    objectStore:
      index: 1
  backup:
    objectStore:
      - name: garage-local
        index: 1
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 55 15 * * *"
        backupName: garage-local
volsync-target-config:
  pvcTarget: sonarr-4k-config
  moverSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  local:
    enabled: true
    schedule: 24 11 * * *
  remote:
    enabled: true
    schedule: 24 12 * * *
  external:
    enabled: true
    schedule: 24 13 * * *
