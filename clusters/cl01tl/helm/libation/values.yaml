libation:
  controllers:
    main:
      type: cronjob
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 0 1 1 *
        backoffLimit: 3
        parallelism: 1
      containers:
        main:
          image:
            repository: rmcrackan/libation
            tag: 13.4.3@sha256:51ba31d839c60599185684615564618dbb669ace677254f56e8419b1ef19c603
          env:
            - name: SLEEP_TIME
              value: "-1"
            - name: LIBATION_BOOKS_DIR
              value: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
    debug:
      type: deployment
      replicas: 0
      strategy: Recreate
      containers:
        main:
          image:
            repository: ubuntu
            tag: resolute-20260421@sha256:f3d28607ddd78734bb7f71f117f3c6706c666b8b76cbff7c9ff6e5718d46ff64
          command:
            - "sleep"
            - "infinity"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
  persistence:
    config:
      forceRename: libation
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 500Mi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
        debug:
          main:
            - path: /config
              readOnly: false
    audiobooks:
      existingClaim: libation-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /data
              readOnly: false
        debug:
          main:
            - path: /data
              readOnly: false
volsync-target-config:
  pvcTarget: libation
  local:
    enabled: true
    schedule: 20 8 * * *
  remote:
    enabled: true
    schedule: 20 10 * * 2
  external:
    enabled: true
    schedule: 32 9 * * 2
