libation:
  controllers:
    main:
      type: cronjob
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 0 1 1 *
        backoffLimit: 3
        parallelism: 1
      containers:
        main:
          image:
            repository: rmcrackan/libation
            tag: 13.5.0@sha256:03b39640d5b6b7cf796edba99a1a2f9949f7a837dab8d986acf6cdc5644ab702
          env:
            - name: SLEEP_TIME
              value: "-1"
            - name: LIBATION_BOOKS_DIR
              value: /data
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
    debug:
      type: deployment
      replicas: 0
      strategy: Recreate
      containers:
        main:
          image:
            repository: ubuntu
            tag: resolute-20260627@sha256:b7f48194d4d8b763a478a621cdc81c27be222ba2206ca3ca6bc42b49685f3d9e
          command:
            - "sleep"
            - "infinity"
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
  persistence:
    config:
      forceRename: libation
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 500Mi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
        debug:
          main:
            - path: /config
              readOnly: false
    audiobooks:
      existingClaim: libation-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /data
              readOnly: false
        debug:
          main:
            - path: /data
              readOnly: false
volsync-target-config:
  pvcTarget: libation
  local:
    enabled: true
    schedule: 20 8 * * *
  remote:
    enabled: true
    schedule: 20 10 * * 2
  external:
    enabled: true
    schedule: 32 9 * * 2
