apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-snapshot-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: openbao-snapshot-secret
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/openbao-backups
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/openbao-backups
        property: ACCESS_REGION
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /garage/home-infra/openbao-backups
        property: ACCESS_SECRET_KEY
    - secretKey: BUCKET
      remoteRef:
        key: /garage/home-infra/openbao-backups
        property: BUCKET

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-unseal-config-1
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: openbao-unseal-config-1
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: ENVIRONMENT
      remoteRef:
        key: /cl01tl/openbao/unseal
        property: ENVIRONMENT
    - secretKey: NODES
      remoteRef:
        key: /cl01tl/openbao/unseal
        property: NODES
    - secretKey: TOKENS
      remoteRef:
        key: /cl01tl/openbao/unseal
        property: TOKENS_1
    - secretKey: NOTIFY_QUEUE_URLS
      remoteRef:
        key: /cl01tl/openbao/unseal
        property: NOTIFY_QUEUE_URLS

