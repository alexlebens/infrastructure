home-assistant:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/home-assistant/home-assistant
            tag: 2026.3.4@sha256:916682086154a7390114a9788782b8efb199852d4f7d47066722c2bc5d1829e6
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 400Mi
        code-server:
          image:
            repository: ghcr.io/linuxserver/code-server
            tag: 4.112.0-ls325@sha256:a17ee95f4e1b43284fe5dfea99e82c8a26f096534215ff36817fa80161eec220
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: 1000
            - name: PGID
              value: 1000
            - name: DEFAULT_WORKSPACE
              value: /config
          envFrom:
            - secretRef:
                name: home-assistant-code-server-password-secret
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8123
          protocol: TCP
    code-server:
      controller: main
      ports:
        http:
          port: 8443
          targetPort: 8443
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: home-assistant
          app.kubernetes.io/instance: home-assistant
          app.kubernetes.io/service: home-assistant-main
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: http
          interval: 3m
          scrapeTimeout: 1m
          path: /api/prometheus
          bearerTokenSecret:
            name: home-assistant-token-secret
            key: bearer-token
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - home-assistant.alexlebens.net
      rules:
        - backendRefs:
            - name: home-assistant-main
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
    code-server:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - home-assistant-code-server.alexlebens.net
      rules:
        - backendRefs:
            - name: home-assistant-code-server
              port: 8443
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: home-assistant-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
          code-server:
            - path: /config/home-assistant
              readOnly: false
volsync-target-config:
  pvcTarget: home-assistant-config
  moverSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  local:
    enabled: true
    schedule: 22 8 * * *
  remote:
    enabled: true
    schedule: 22 9 * * *
  external:
    enabled: true
    schedule: 22 10 * * *
