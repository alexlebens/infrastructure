home-assistant:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/home-assistant/home-assistant
            tag: 2026.6.4@sha256:adb3341e31e03e0048e60d8c1cf952e118a381ae258bb921d3da12a3b27bf0c2
          env:
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 400Mi
        code-server:
          image:
            repository: ghcr.io/linuxserver/code-server
            tag: 4.126.0-ls347@sha256:0500ac664ef53a4a31cf9a144d1c8f1a108eb8c74e8ea9d925defbd61f15e8b0
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: 1000
            - name: PGID
              value: 1000
            - name: DEFAULT_WORKSPACE
              value: /config
          envFrom:
            - secretRef:
                name: home-assistant-code-server-password
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8123
    code-server:
      controller: main
      ports:
        http:
          port: 8443
          targetPort: 8443
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: home-assistant
          app.kubernetes.io/instance: home-assistant
          app.kubernetes.io/service: home-assistant-main
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: http
          interval: 3m
          scrapeTimeout: 1m
          path: /api/prometheus
          bearerTokenSecret:
            name: home-assistant-metric-token
            key: bearer-token
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - home-assistant.alexlebens.net
      rules:
        - backendRefs:
            - name: home-assistant-main
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
    code-server:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - home-assistant-code-server.alexlebens.net
      rules:
        - backendRefs:
            - name: home-assistant-code-server
              port: 8443
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: home-assistant-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
          code-server:
            - path: /config/home-assistant
              readOnly: false
volsync-target-config:
  pvcTarget: home-assistant-config
  moverSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  local:
    enabled: true
    schedule: 25 8 * * *
  remote:
    enabled: true
    schedule: 25 10 * * 1
  external:
    enabled: true
    schedule: 25 9 * * 1
