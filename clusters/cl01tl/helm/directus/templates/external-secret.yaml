apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: directus-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: admin-email
      remoteRef:
        key: /cl01tl/directus/config
        property: admin-email
    - secretKey: admin-password
      remoteRef:
        key: /cl01tl/directus/config
        property: admin-password
    - secretKey: secret
      remoteRef:
        key: /cl01tl/directus/config
        property: secret
    - secretKey: key
      remoteRef:
        key: /cl01tl/directus/config
        property: key

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: directus-oidc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus-oidc-secret
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: /authentik/oidc/directus
        property: client
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: /authentik/oidc/directus
        property: secret

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: directus-metric-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus-metric-token
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: metric-token
      remoteRef:
        key: /cl01tl/directus/metrics
        property: metric-token

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: directus-bucket-garage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus-bucket-garage
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: /garage/home-infra/directus-assets
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: /garage/home-infra/directus-assets
        property: ACCESS_SECRET_KEY
    - secretKey: ACCESS_REGION
      remoteRef:
        key: /garage/home-infra/directus-assets
        property: ACCESS_REGION

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: directus-valkey-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus-valkey-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: default
      remoteRef:
        key: /cl01tl/directus/valkey
        property: password
    - secretKey: user
      remoteRef:
        key: /cl01tl/directus/valkey
        property: user
    - secretKey: password
      remoteRef:
        key: /cl01tl/directus/valkey
        property: password
