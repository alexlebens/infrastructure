shelly-plug:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      initContainers:
        init-fetch-repo:
          securityContext:
            runAsUser: 0
          image:
            repository: alpine/git
            tag: 2.52.0@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
          command:
            - /bin/sh
            - -ec
            - |
              cd /var/www/html
              if [ -d ".git" ]; then
                echo "Git repository found. Pulling latest changes..."
                git pull
              else
                echo "Not a git repository. Initializing ..."
                git init
                git remote add origin https://github.com/geerlingguy/shelly-plug-prometheus.git
                git fetch origin
                git checkout origin/master -ft
              fi
      containers:
        main:
          image:
            repository: php
            tag: 8.5.4-apache@sha256:e55a9f8e4caa09c6a31ec752b307675d847bb8546d975f379128cb2a99842b96
          env:
            - name: SHELLY_HOSTNAME
              value: it05sp.alexlebens.net
            - name: SHELLY_GENERATION
              value: 2
          envFrom:
            - secretRef:
                name: shelly-plug-config-secret
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
  service:
    main:
      controller: main
      ports:
        metrics:
          port: 80
          targetPort: 80
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: shelly-plug
          app.kubernetes.io/instance: shelly-plug
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
          path: /metrics
  persistence:
    script:
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          init-fetch-repo:
            - path: /var/www/html
              readOnly: false
          main:
            - path: /var/www/html
              readOnly: false
