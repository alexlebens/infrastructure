apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-key
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: outline-key
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: secret-key
      remoteRef:
        key: /cl01tl/outline/key
        property: secret-key
    - secretKey: utils-key
      remoteRef:
        key: /cl01tl/outline/key
        property: utils-key

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-oidc-authentik
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: outline-oidc-authentik
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: client
      remoteRef:
        key: /cl01tl/authentik/oidc/outline
        property: client
    - secretKey: secret
      remoteRef:
        key: /cl01tl/authentik/oidc/outline
        property: secret
