apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-key
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: authentik-key
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: key
      remoteRef:
        key: /cl01tl/authentik/key
        property: key
