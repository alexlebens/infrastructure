medialyze:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/frederikemmer/medialyze
            tag: 0.13.1@sha256:a1067c580290dd91e18a9ad8452b44624e37d5a6431939917bc2d766d5ca0532
          env:
            - name: HOST_PORT
              value: 8080
            - name: SCAN_RUNTIME_WORKER_COUNT
              value: 2
            - name: TZ
              value: America/Chicago
            - name: MEDIA_HOST_DIR
              value: /media
          resources:
            requests:
              cpu: 5m
              memory: 400Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - medialyze.alexlebens.net
      rules:
        - backendRefs:
            - name: medialyze
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    data:
      forceRename: medialyze-data
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /config
              readOnly: false
    media:
      existingClaim: medialyze-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /media
              readOnly: true
volsync-target-data:
  pvcTarget: medialyze-data
  local:
    enabled: true
    schedule: 0 8 * * *
  remote:
    enabled: true
    schedule: 0 10 * * 3
  external:
    enabled: true
    schedule: 0 9 * * 3
