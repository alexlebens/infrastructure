stalwart:
  controllers:
    main:
      forceRename: stalwart
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/stalwartlabs/stalwart
            tag: v0.16.2@sha256:dfa1c39d6420ad65073e275e38c4f961079ee7ebfb1a0070b461f2d309719377
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
    metrics:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: quay.io/prometheuscommunity/elasticsearch-exporter
            tag: v1.10.0@sha256:a6a4d4403f670faf6a94b8c7f9adbca3ead91f26dd64e5ccf95fa69025dc6e58
          args:
            - '--es.uri=https://elasticsearch-stalwart-es-http.tubearchivist:9200'
            - '--es.ssl-skip-verify'
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
  service:
    main:
      controller: main
      forceRename: stalwart
      ports:
        http:
          port: 80
          targetPort: 8080
        smtp:
          port: 25
          targetPort: 25
        smtps:
          port: 465
          targetPort: 465
        imap:
          port: 143
          targetPort: 143
        imaps:
          port: 993
          targetPort: 993
    metrics:
      controller: metrics
      ports:
        metrics:
          port: 9114
          targetPort: 9114
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: stalwart-metrics
          app.kubernetes.io/instance: stalwart-metrics
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
          path: /metrics
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - stalwart.alexlebens.net
      rules:
        - backendRefs:
            - name: stalwart
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    config:
      forceRename: stalwart-config
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /opt/stalwart
              readOnly: false
postgres-18-cluster:
  mode: recovery
  recovery:
    method: objectStore
    objectStore:
      index: 1
  backup:
    objectStore:
      - name: garage-local
        index: 1
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 5 16 * * *"
        backupName: garage-local
volsync-target-config:
  pvcTarget: stalwart-config
  local:
    enabled: true
    schedule: 28 11 * * *
  remote:
    enabled: true
    schedule: 28 12 * * *
  external:
    enabled: true
    schedule: 28 13 * * *
