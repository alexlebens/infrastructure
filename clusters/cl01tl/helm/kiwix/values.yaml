kiwix:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/kiwix/kiwix-serve
            tag: 3.8.2@sha256:acdab28186a66b51bfd4202210c6732931ea95cf41c711148a0c9770b9fcc9e1
          args:
            - '*.zim'
          env:
            - name: PORT
              value: 8080
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - kiwix.alexlebens.net
      rules:
        - backendRefs:
            - name: kiwix
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    media:
      existingClaim: kiwix-nfs-storage
      advancedMounts:
        main:
          main:
            - path: /data
              readOnly: true
