gitea:
  global:
    imageRegistry: registry.hub.docker.com
  replicaCount: 3
  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxSurge: "100%"
      maxUnavailable: 1
  image:
    repository: gitea/gitea
    tag: 1.26.2
  service:
    http:
      type: ClusterIP
      port: 3000
      clusterIP: 10.103.160.139
    ssh:
      type: ClusterIP
      port: 22
      clusterIP: 10.103.160.140
  resources:
    requests:
      cpu: 1000m
      memory: 600Mi
  persistence:
    storageClass: ceph-filesystem
    size: 40Gi
    accessModes:
      - ReadWriteMany
  extraVolumes:
    - name: gitea-themes-storage
      persistentVolumeClaim:
        claimName: gitea-themes-storage
    - name: gitea-custom-templates
      configMap:
        name: gitea-custom-templates
  extraInitVolumeMounts:
    - name: gitea-themes-storage
      readOnly: false
      mountPath: /data/gitea/public/assets/css
  extraContainerVolumeMounts:
    - name: gitea-themes-storage
      readOnly: true
      mountPath: /data/gitea/public/assets/css
    - name: gitea-custom-templates
      mountPath: /data/gitea/templates/custom/header.tmpl
      subPath: header.tmpl
      readOnly: true
  initPreScript: |
    wget https://github.com/catppuccin/gitea/releases/latest/download/catppuccin-gitea.tar.gz;
    tar -xvzf catppuccin-gitea.tar.gz -C /data/gitea/public/assets/css;
    rm catppuccin-gitea.tar.gz;
  gitea:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    oauth:
      - name: Authentik
        provider: openidConnect
        existingSecret: gitea-oidc-authentik
        autoDiscoverUrl: https://auth.alexlebens.dev/application/o/gitea/.well-known/openid-configuration
        iconUrl: https://goauthentik.io/img/icon.png
        scopes: "email profile"
    config:
      APP_NAME: Gitea
      server:
        PROTOCOL: http
        DOMAIN: gitea.alexlebens.dev
        ROOT_URL: https://gitea.alexlebens.dev
        LOCAL_ROOT_URL: http://gitea-http.gitea.svc.cluster.local:3000
        START_SSH_SERVER: true
        HTTP_PORT: 3000
        SSH_DOMAIN: gitea.alexlebens.net
        SSH_PORT: 22
        SSH_LISTEN_PORT: 22
        ENABLE_PPROF: true
        LANDING_PAGE: explore
      database:
        DB_TYPE: postgres
        SCHEMA: public
      oauth2_client:
        ENABLE_AUTO_REGISTRATION: true
      cache:
        ENABLED: true
        ADAPTER: redis
        HOST: redis://gitea-valkey.gitea:6379
      queue:
        TYPE: redis
        CONN_STR: redis://gitea-valkey.gitea:6379
      session:
        PROVIDER: redis
        PROVIDER_CONFIG: redis://gitea-valkey.gitea:6379
      indexer:
        ISSUE_INDEXER_ENABLED: true
        ISSUE_INDEXER_TYPE: meilisearch
        REPO_INDEXER_ENABLED: false
      actions:
        ENABLED: true
      service:
        REGISTER_MANUAL_CONFIRM: true
        SHOW_REGISTRATION_BUTTON: false
        ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      explore:
        REQUIRE_SIGNIN_VIEW: true
      webhook:
        ALLOWED_HOST_LIST: private
      ui:
        DEFAULT_THEME: gitea-auto
        THEMES: gitea-light,gitea-dark,gitea-auto,catppuccin-rosewater-auto,catppuccin-flamingo-auto,catppuccin-pink-auto,catppuccin-mauve-auto,catppuccin-red-auto,catppuccin-maroon-auto,catppuccin-peach-auto,catppuccin-yellow-auto,catppuccin-green-auto,catppuccin-teal-auto,catppuccin-sky-auto,catppuccin-sapphire-auto,catppuccin-blue-auto,catppuccin-lavender-auto,catppuccin-latte-rosewater,catppuccin-latte-flamingo,catppuccin-latte-pink,catppuccin-latte-mauve,catppuccin-latte-red,catppuccin-latte-maroon,catppuccin-latte-peach,catppuccin-latte-yellow,catppuccin-latte-green,catppuccin-latte-teal,catppuccin-latte-sky,catppuccin-latte-sapphire,catppuccin-latte-blue,catppuccin-latte-lavender,catppuccin-frappe-rosewater,catppuccin-frappe-flamingo,catppuccin-frappe-pink,catppuccin-frappe-mauve,catppuccin-frappe-red,catppuccin-frappe-maroon,catppuccin-frappe-peach,catppuccin-frappe-yellow,catppuccin-frappe-green,catppuccin-frappe-teal,catppuccin-frappe-sky,catppuccin-frappe-sapphire,catppuccin-frappe-blue,catppuccin-frappe-lavender,catppuccin-macchiato-rosewater,catppuccin-macchiato-flamingo,catppuccin-macchiato-pink,catppuccin-macchiato-mauve,catppuccin-macchiato-red,catppuccin-macchiato-maroon,catppuccin-macchiato-peach,catppuccin-macchiato-yellow,catppuccin-macchiato-green,catppuccin-macchiato-teal,catppuccin-macchiato-sky,catppuccin-macchiato-sapphire,catppuccin-macchiato-blue,catppuccin-macchiato-lavender,catppuccin-mocha-rosewater,catppuccin-mocha-flamingo,catppuccin-mocha-pink,catppuccin-mocha-mauve,catppuccin-mocha-red,catppuccin-mocha-maroon,catppuccin-mocha-peach,catppuccin-mocha-yellow,catppuccin-mocha-green,catppuccin-mocha-teal,catppuccin-mocha-sky,catppuccin-mocha-sapphire,catppuccin-mocha-blue,catppuccin-mocha-lavender
      mirror:
        DEFAULT_INTERVAL: 10m
      repo-archive:
        ENABLED: false
    additionalConfigFromEnvs:
      - name: GITEA__DATABASE__CONNSTR
        valueFrom:
          secretKeyRef:
            name: gitea-database-connection
            key: GITEA__DATABASE__CONNSTR
      - name: GITEA__DATABASE__NAME
        valueFrom:
          secretKeyRef:
            name: gitea-postgresql-18-cluster-app
            key: dbname
      - name: GITEA__DATABASE__USER
        valueFrom:
          secretKeyRef:
            name: gitea-postgresql-18-cluster-app
            key: user
      - name: GITEA__DATABASE__PASSWD
        valueFrom:
          secretKeyRef:
            name: gitea-postgresql-18-cluster-app
            key: password
      - name: GITEA__INDEXER__ISSUE_INDEXER_CONN_STR
        valueFrom:
          secretKeyRef:
            name: gitea-meilisearch-key
            key: ISSUE_INDEXER_CONN_STR
  valkey-cluster:
    enabled: false
  valkey:
    enabled: false
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: false
gitea-actions:
  enabled: true
  statefulset:
    replicas: 6
    timezone: America/Chicago
    resources:
      limits:
        ephemeral-storage: 15Gi
      requests:
        ephemeral-storage: 2Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                    - gitea-actions-act-runner
              topologyKey: "kubernetes.io/hostname"
    extraVolumes:
      - name: workspace-vol
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 20Gi
      - name: docker-vol
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 50Gi
    runner:
      registry: docker.io
      repository: gitea/runner
      # renovate: datasource=docker depName=gitea/runner
      tag: 1.0.8@sha256:5ae0c21f365bd7cdcef7a0bdea0111b696d5dcc1bd049d600cbc989eaef95722
      extraVolumeMounts:
        - name: workspace-vol
          mountPath: /workspace
      config: |
        log:
          level: debug
        cache:
          enabled: true
        runner:
          labels:
            - "ubuntu-latest:docker://harbor.alexlebens.net/proxy-hub.docker/gitea/runner-images:ubuntu-24.04"
            - "ubuntu-latest-slim:docker://harbor.alexlebens.net/proxy-hub.docker/gitea/runner-images:ubuntu-24.04-slim"
            - "ubuntu-js:docker://harbor.alexlebens.net/proxy-ghcr.io/catthehacker/ubuntu:js-24.04"
    dind:
      registry: docker.io
      repository: docker
      # renovate: datasource=docker depName=docker
      tag: 29.5.3-dind@sha256:7d85d0eda291f1a7ab6df4a9d1802b5ad4cf9145a088bd11188c78dcb5c7392b
      extraVolumeMounts:
        - name: docker-vol
          mountPath: /var/lib/docker
    persistence:
      storageClass: ceph-block
      size: 10Gi
  init:
    image:
      registry: docker.io
      repository: busybox
      # renovate: datasource=docker depName=busybox
      tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
  existingSecret: gitea-runner-secret
  existingSecretKey: token
  giteaRootURL: http://gitea-http.gitea:3000
anubis:
  global:
    nameOverride: anubis
    fullnameOverride: anubis
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          image:
            repository: ghcr.io/techarohq/anubis
            tag: v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
          env:
            - name: BIND
              value: :8080
            - name: DIFFICULTY
              value: 4
            - name: ED25519_PRIVATE_KEY_HEX
              valueFrom:
                secretKeyRef:
                  name: anubis-private-key
                  key: ED25519_PRIVATE_KEY_HEX
            - name: METRICS_BIND
              value: :9090
            - name: SERVE_ROBOTS_TXT
              value: true
            - name: TARGET
              value: http://gitea-http.gitea:3000
            - name: OG_PASSTHROUGH
              value: true
            - name: OG_EXPIRY_TIME
              value: 24h
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 8080
        metrics:
          port: 9090
          targetPort: 9090
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: anubis
          app.kubernetes.io/instance: anubis
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 15s
          path: /metrics
meilisearch:
  environment:
    MEILI_NO_ANALYTICS: true
    MEILI_ENV: production
    MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE: true
  auth:
    existingMasterKeySecret: gitea-meilisearch-key
  persistence:
    enabled: true
    storageClass: ceph-block
    size: 5Gi
  resources:
    requests:
      cpu: 10m
      memory: 150Mi
  serviceMonitor:
    enabled: true
cloudflared:
  resources:
    requests:
      cpu: 100m
      memory: 30Mi
postgres-18-cluster:
  mode: recovery
  cluster:
    resources:
      requests:
        memory: 2Gi
        cpu: 100m
    postgresql:
      parameters:
        shared_buffers: 2GB
  recovery:
    method: objectStore
    objectStore:
      index: 1
  backup:
    objectStore:
      - name: garage-local
        index: 1
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 0 7 * * *"
        backupName: garage-local
  poolers:
    - name: rw
      type: rw
      poolMode: transaction
      instances: 3
      parameters:
        max_client_conn: "1000"
        default_pool_size: "10"
        max_prepared_statements: "100"
      monitoring:
        enabled: true
        podMonitor:
          enabled: true
valkey-gitea:
  valkey:
    resources:
      requests:
        cpu: 20m
        memory: 1Gi
    dataStorage:
      requestedSize: 20Gi
    replica:
      persistence:
        size: 20Gi
valkey-renovate:
  valkey:
    nameOverride: valkey-renovate
    replica:
      enabled: false
volsync-target-storage:
  pvcTarget: gitea-shared-storage
  moverSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  local:
    enabled: true
    schedule: 0 0 7 * * *
    restic:
      pruneIntervalDays: 3
      retain:
        hourly: 1
        daily: 1
        weekly: 3
        monthly: 0
        yearly: 0
      copyMethod: Snapshot
      storageClassName: ceph-filesystem
      volumeSnapshotClassName: ceph-filesystem-snapshot
      cacheCapacity: 10Gi
  external:
    enabled: false
  remote:
    enabled: false
