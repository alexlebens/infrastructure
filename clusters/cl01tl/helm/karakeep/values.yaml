karakeep:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: ghcr.io/karakeep-app/karakeep
            tag: 0.32.0@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
          env:
            - name: DATA_DIR
              value: /data
            - name: DB_WAL_MODE
              value: true
            - name: NEXTAUTH_URL
              value: https://karakeep.alexlebens.dev/
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: karakeep-key
                  key: key
            - name: PROMETHEUS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: karakeep-metric-token
                  key: prometheus-token
            - name: ASSET_STORE_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: karakeep-bucket-garage
                  key: ENDPOINT
            - name: ASSET_STORE_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: karakeep-bucket-garage
                  key: ACCESS_REGION
            - name: ASSET_STORE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: karakeep-bucket-garage
                  key: BUCKET
            - name: ASSET_STORE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: karakeep-bucket-garage
                  key: ACCESS_KEY_ID
            - name: ASSET_STORE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-bucket-garage
                  key: ACCESS_SECRET_KEY
            - name: ASSET_STORE_S3_FORCE_PATH_STYLE
              value: true
            - name: MEILI_ADDR
              value: http://karakeep-meilisearch.karakeep:7700
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-meilisearch-key
                  key: MEILI_MASTER_KEY
            - name: BROWSER_WEB_URL
              value: http://karakeep.karakeep:9222
            - name: DISABLE_SIGNUPS
              value: false
            - name: OAUTH_PROVIDER_NAME
              value: "Authentik"
            - name: OAUTH_WELLKNOWN_URL
              value: https://auth.alexlebens.dev/application/o/karakeep/.well-known/openid-configuration
            - name: OAUTH_SCOPE
              value: "openid email profile"
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: karakeep-oidc-authentik
                  key: AUTHENTIK_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: karakeep-oidc-authentik
                  key: AUTHENTIK_CLIENT_SECRET
            - name: OLLAMA_BASE_URL
              value: http://ollama-server-3.ollama:11434
            - name: OLLAMA_KEEP_ALIVE
              value: 5m
            - name: INFERENCE_TEXT_MODEL
              value: gemma4:e4b
            - name: INFERENCE_IMAGE_MODEL
              value: gemma4:e4b
            - name: EMBEDDING_TEXT_MODEL
              value: mxbai-embed-large
            - name: INFERENCE_JOB_TIMEOUT_SEC
              value: 720
          resources:
            requests:
              cpu: 10m
              memory: 500Mi
        chrome:
          image:
            repository: gcr.io/zenika-hub/alpine-chrome
            tag: 124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
          targetPort: 3000
        chrome:
          port: 9222
          targetPort: 9222
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/name: karakeep
          app.kubernetes.io/instance: karakeep
      serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
      endpoints:
        - port: http
          interval: 30s
          scrapeTimeout: 15s
          path: /api/metrics
          authorization:
            credentials:
              key: prometheus-token
              name: karakeep-metric-token
  persistence:
    data:
      forceRename: karakeep
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /data
              readOnly: false
meilisearch:
  environment:
    MEILI_NO_ANALYTICS: true
    MEILI_ENV: production
    MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE: true
  auth:
    existingMasterKeySecret: karakeep-meilisearch-key
  persistence:
    enabled: true
    storageClass: ceph-block
    size: 10Gi
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
  serviceMonitor:
    enabled: true
volsync-target-data:
  pvcTarget: karakeep
  local:
    enabled: true
    schedule: 5 8 * * *
  remote:
    enabled: true
    schedule: 5 10 * * 2
  external:
    enabled: true
    schedule: 5 9 * * 2
rclone-karakeep-assets-remote:
  cronJob:
    suspend: false
    schedule: 30 6 * * 3
  rclone:
    source:
      bucketName: karakeep-assets
    destination:
      bucketName: karakeep-assets
  secret:
    externalSecret:
      source:
        credentials:
          path: /garage/home-infra/karakeep-assets
        config:
          path: /garage/config
      destination:
        credentials:
          path: /garage/home-infra/karakeep-assets
        config:
          path: /garage/config
rclone-karakeep-assets-external:
  nameOverride: karakeep-assets-external-rclone
  cronJob:
    suspend: false
    schedule: 0 6 * * 3
  rclone:
    source:
      bucketName: karakeep-assets
    destination:
      bucketName: karakeep-assets-bcb0bc04dac3e3fd
  secret:
    externalSecret:
      source:
        credentials:
          path: /garage/home-infra/karakeep-assets
        config:
          path: /garage/config
      destination:
        credentials:
          path: /backblaze/home-infra/karakeep-assets
        config:
          path: /backblaze/config
          endpointProperty: ENDPOINT
