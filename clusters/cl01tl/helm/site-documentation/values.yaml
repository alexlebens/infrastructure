site-documentation:
  global:
    fullnameOverride: site-documentation
  controllers:
    main:
      type: deployment
      replicas: 3
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: harbor.alexlebens.net/images/site-documentation
            tag: 0.33.1@sha256:440f85c89c6451fd1bb9863b41b45c3e027baf6d2735670b65afc4b024d3abea
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4321
