vault:
  global:
    serverTelemetry:
      prometheusOperator: true
  injector:
    enabled: false
  server:
    enabled: true
    image:
      repository: hashicorp/vault
      tag: 2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
    updateStrategyType: RollingUpdate
    logLevel: debug
    logFormat: standard
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
    authDelegator:
      enabled: false
    livenessProbe:
      enabled: false
    volumes:
      - name: vault-storage-backup
        persistentVolumeClaim:
          claimName: vault-storage-backup
    volumeMounts:
      - mountPath: /opt/backups/
        name: vault-storage-backup
        readOnly: false
    dataStorage:
      size: 1Gi
      storageClass: ceph-block
    auditStorage:
      enabled: false
      size: 5Gi
      storageClass: ceph-block
    standalone:
      enabled: false
    ha:
      enabled: true
      raft:
        enabled: true
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            telemetry {
              unauthenticated_metrics_access = "true"
            }
          }

          storage "raft" {
            path = "/vault/data"
            retry_join {
              leader_api_addr = "http://vault-0.vault-internal:8200"
            }
            retry_join {
              leader_api_addr = "http://vault-1.vault-internal:8200"
            }
            retry_join {
              leader_api_addr = "http://vault-2.vault-internal:8200"
            }
          }

          service_registration "kubernetes" {}

          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname = true
          }
      disruptionBudget:
        enabled: true
        maxUnavailable: 1
  serverTelemetry:
    serviceMonitor:
      enabled: true
    prometheusRules:
      enabled: true
      rules:
        - alert: vault-HighResponseTime
          annotations:
            message: The response time of Vault is over 500ms on average over the last 5 minutes.
          expr: vault_core_handle_request{quantile="0.5", namespace="mynamespace"} > 500
          for: 5m
          labels:
            severity: warning
        - alert: vault-HighResponseTime
          annotations:
            message: The response time of Vault is over 1s on average over the last 5 minutes.
          expr: vault_core_handle_request{quantile="0.5", namespace="mynamespace"} > 1000
          for: 5m
          labels:
            severity: critical
snapshot:
  global:
    fullnameOverride: vault-snapshot
  controllers:
    snapshot:
      type: cronjob
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 4 * * *
        backoffLimit: 3
        parallelism: 1
      serviceAccount:
        name: vault
      initContainers:
        snapshot:
          image:
            repository: hashicorp/vault
            tag: 2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
          command:
            - /bin/ash
          args:
            - -ec
            - /scripts/snapshot.sh
          envFrom:
            - secretRef:
                name: vault-snapshot-agent-role
          env:
            - name: VAULT_ADDR
              value: http://vault-active.vault.svc.cluster.local:8200
      containers:
        s3-backup-local:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/backup.sh
          envFrom:
            - secretRef:
                name: vault-ntfy-config
          env:
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: vault-backup-local-config
                  key: BUCKET
            - name: TARGET
              value: Local
        s3-backup-remote:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/backup.sh
          envFrom:
            - secretRef:
                name: vault-ntfy-config
          env:
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: vault-backup-remote-config
                  key: BUCKET
            - name: TARGET
              value: Remote
        s3-backup-external:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/backup.sh
          envFrom:
            - secretRef:
                name: vault-ntfy-config
          env:
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: vault-backup-external-config
                  key: BUCKET
            - name: TARGET
              value: External
  persistence:
    snapshot-script:
      enabled: true
      type: configMap
      name: vault-snapshot-script
      defaultMode: 0755
      advancedMounts:
        snapshot:
          snapshot:
            - path: /scripts/snapshot.sh
              subPath: snapshot.sh
    backup-script:
      enabled: true
      type: configMap
      name: vault-backup-script
      defaultMode: 0755
      advancedMounts:
        snapshot:
          s3-backup-local:
            - path: /scripts/backup.sh
              subPath: backup.sh
          s3-backup-remote:
            - path: /scripts/backup.sh
              subPath: backup.sh
          s3-backup-external:
            - path: /scripts/backup.sh
              subPath: backup.sh
    backup-local-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: vault-backup-local-config
      advancedMounts:
        snapshot:
          s3-backup-local:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    backup-remote-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: vault-backup-remote-config
      advancedMounts:
        snapshot:
          s3-backup-remote:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    backup-external-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: vault-backup-external-config
      advancedMounts:
        snapshot:
          s3-backup-external:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    backup:
      existingClaim: vault-storage-backup
      advancedMounts:
        snapshot:
          snapshot:
            - path: /opt/backup
              readOnly: false
          s3-backup-local:
            - path: /opt/backup
              readOnly: false
          s3-backup-remote:
            - path: /opt/backup
              readOnly: false
          s3-backup-external:
            - path: /opt/backup
              readOnly: false
