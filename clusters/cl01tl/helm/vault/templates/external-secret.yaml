apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-token
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: token
      remoteRef:
        key: /cl01tl/vault/token
        property: root

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-snapshot-agent-role
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-snapshot-agent-role
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: VAULT_APPROLE_ROLE_ID
      remoteRef:
        key: /cl01tl/vault/role/snapshot
        property: role-id
    - secretKey: VAULT_APPROLE_SECRET_ID
      remoteRef:
        key: /cl01tl/vault/role/snapshot
        property: secret-id

