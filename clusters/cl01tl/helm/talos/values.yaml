etcd-backup:
  controllers:
    local:
      type: cronjob
      pod:
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 2 * * *
        backoffLimit: 3
        parallelism: 1
      serviceAccount:
        name: talos-backup
      containers:
        backup:
          image:
            repository: ghcr.io/siderolabs/talos-backup
            tag: v0.1.0-beta.3-7-ge8e193c@sha256:d6f98bf2817bb0bd46be49e41251e24d713945a6af6e893529cc17d524187953
          command:
            - /talos-backup
          workingDir: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-local-config
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-local-config
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-local-config
                  key: AWS_REGION
            - name: CUSTOM_S3_ENDPOINT
              value: http://garage-main.garage:3900
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-local-config
                  key: BUCKET_NAME
            - name: S3_PREFIX
              value: "cl01tl/etcd"
            - name: CLUSTER_NAME
              value: "cl01tl"
            - name: AGE_X25519_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-local-config
                  key: AGE_X25519_PUBLIC_KEY
            - name: USE_PATH_STYLE
              value: "false"
        s3-prune:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/prune.sh
          envFrom:
            - secretRef:
                name: talos-etcd-backup-local-config
            - secretRef:
                name: talos-ntfy-config
          env:
            - name: TARGET
              value: Local
            - name: DATE_RANGE_SECONDS
              value: "2419200"
    remote:
      type: cronjob
      pod:
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 3 * * *
        backoffLimit: 3
        parallelism: 1
      serviceAccount:
        name: talos-backup
      containers:
        backup:
          image:
            repository: ghcr.io/siderolabs/talos-backup
            tag: v0.1.0-beta.3-7-ge8e193c@sha256:d6f98bf2817bb0bd46be49e41251e24d713945a6af6e893529cc17d524187953
          command:
            - /talos-backup
          workingDir: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-remote-config
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-remote-config
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-remote-config
                  key: AWS_REGION
            - name: CUSTOM_S3_ENDPOINT
              value: https://garage-ps10rp.boreal-beaufort.ts.net:3900
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-remote-config
                  key: BUCKET_NAME
            - name: S3_PREFIX
              value: "cl01tl/etcd"
            - name: CLUSTER_NAME
              value: "cl01tl"
            - name: AGE_X25519_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-remote-config
                  key: AGE_X25519_PUBLIC_KEY
            - name: USE_PATH_STYLE
              value: "false"
        s3-prune:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/prune.sh
          envFrom:
            - secretRef:
                name: talos-etcd-backup-remote-config
            - secretRef:
                name: talos-ntfy-config
          env:
            - name: TARGET
              value: Remote
            - name: DATE_RANGE_SECONDS
              value: "2419200"
    external:
      type: cronjob
      pod:
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 4 * * *
        backoffLimit: 3
        parallelism: 1
      serviceAccount:
        name: talos-backup
      containers:
        backup:
          image:
            repository: ghcr.io/siderolabs/talos-backup
            tag: v0.1.0-beta.3-7-ge8e193c@sha256:d6f98bf2817bb0bd46be49e41251e24d713945a6af6e893529cc17d524187953
          command:
            - /talos-backup
          workingDir: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-external-config
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-external-config
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-external-config
                  key: AWS_REGION
            - name: CUSTOM_S3_ENDPOINT
              value: https://nyc3.digitaloceanspaces.com
            - name: BUCKET
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-external-config
                  key: BUCKET_NAME
            - name: S3_PREFIX
              value: "cl01tl/etcd"
            - name: CLUSTER_NAME
              value: "cl01tl"
            - name: AGE_X25519_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: talos-etcd-backup-external-config
                  key: AGE_X25519_PUBLIC_KEY
            - name: USE_PATH_STYLE
              value: "false"
        s3-prune:
          image:
            repository: d3fk/s3cmd
            tag: latest@sha256:d66cc5677b30b31a7981f9fde0af064a9072e8b8a57d5e9b4cc02f44f02acbf2
          command:
            - /bin/sh
          args:
            - -ec
            - /scripts/prune.sh
          envFrom:
            - secretRef:
                name: talos-etcd-backup-external-config
            - secretRef:
                name: talos-ntfy-config
          env:
            - name: TARGET
              value: External
            - name: DATE_RANGE_SECONDS
              value: "1209600"
  persistence:
    secret:
      enabled: true
      type: secret
      name: talos-backup-secrets
      advancedMounts:
        local:
          backup:
            - path: /var/run/secrets/talos.dev
              readOnly: true
              mountPropagation: None
        remote:
          backup:
            - path: /var/run/secrets/talos.dev
              readOnly: true
              mountPropagation: None
        external:
          backup:
            - path: /var/run/secrets/talos.dev
              readOnly: true
              mountPropagation: None
    prune-script:
      enabled: true
      type: configMap
      name: talos-prune-script
      defaultMode: 0755
      advancedMounts:
        local:
          s3-prune:
            - path: /scripts/prune.sh
              subPath: prune.sh
        remote:
          s3-prune:
            - path: /scripts/prune.sh
              subPath: prune.sh
        external:
          s3-prune:
            - path: /scripts/prune.sh
              subPath: prune.sh
    etcd-backup-local-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: talos-etcd-backup-local-config
      advancedMounts:
        local:
          s3-prune:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    etcd-backup-remote-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: talos-etcd-backup-remote-config
      advancedMounts:
        remote:
          s3-prune:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    etcd-backup-external-config:
      type: custom
      volumeSpec:
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: talos-etcd-backup-external-config
      advancedMounts:
        external:
          s3-prune:
            - path: /root/.s3cfg
              readOnly: true
              mountPropagation: None
              subPath: .s3cfg
    tmp:
      type: emptyDir
      medium: Memory
      advancedMounts:
        local:
          backup:
            - path: /tmp
              readOnly: false
        remote:
          backup:
            - path: /tmp
              readOnly: false
        external:
          backup:
            - path: /tmp
              readOnly: false
    talos:
      type: emptyDir
      medium: Memory
      advancedMounts:
        local:
          backup:
            - path: /.talos
              readOnly: false
        remote:
          backup:
            - path: /.talos
              readOnly: false
        external:
          backup:
            - path: /.talos
              readOnly: false
etcd-defrag:
  global:
    fullnameOverride: etcd-defrag
  controllers:
    defrag-1:
      type: cronjob
      pod:
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
      cronjob:
        suspend: false
        timeZone: America/Chicago
        schedule: 0 0 * * 0
        backoffLimit: 3
        parallelism: 1
      serviceAccount:
        name: talos-defrag
      containers:
        main:
          image:
            repository: ghcr.io/siderolabs/talosctl
            tag: v1.13.0@sha256:cf5be4c584572787eda0f5818404d2380f041b1022ce85454b25d4e01334fba6
          args:
            - etcd
            - defrag
            - -n
            - "10.232.1.11"
          env:
            - name: TALOSCONFIG
              value: /tmp/.talos/config
    defrag-2:
      type: cronjob
