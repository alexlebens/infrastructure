excalidraw:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: excalidraw/excalidraw
            tag: latest@sha256:b6cd04431d88f2756a7c3095cf7970884e8fd6b2800c9445b5a60a5c715bbf0c
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 80
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - excalidraw.alexlebens.net
      rules:
        - backendRefs:
            - name: excalidraw
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
