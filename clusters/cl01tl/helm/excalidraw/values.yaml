excalidraw:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      containers:
        main:
          image:
            repository: excalidraw/excalidraw
            tag: latest@sha256:20ffa04668e19616bb0c1b3632849e5cd96e0bc7a1336b73d9d072667f2c2854
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 80
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - excalidraw.alexlebens.net
      rules:
        - backendRefs:
            - name: excalidraw
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
