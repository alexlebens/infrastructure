eck-operator:
  managedNamespaces:
    - postiz
    - stalwart
    - tubearchivist
  installCRDs: true
  replicaCount: 2
  resources:
    limits:
      cpu: null
      memory: null
    requests:
      cpu: 2m
      memory: 50Mi
  telemetry:
    disabled: true
  config:
    logVerbosity: "0"
    metrics:
      port: "9000"
  podMonitor:
    enabled: true
