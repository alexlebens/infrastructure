cloudnative-pg:
  replicaCount: 2
  resources:
    requests:
      cpu: 5m
      memory: 100Mi
  monitoring:
    podMonitorEnabled: true
plugin-barman-cloud:
  replicaCount: 1
  crds:
    create: true
  resources:
    requests:
      cpu: 1m
      memory: 30Mi
rclone-postgres-backups-remote:
  nameOverride: postgres-backups-remote-rclone
  cronJob:
    suspend: false
    schedule: 30 6 * * 1
  rclone:
    source:
      bucketName: postgres-backups
    destination:
      bucketName: postgres-backups
  prune:
    enabled: true
    ageToPrune: 45d
    include: "/cl01tl/*/*/*/base/**"
    exclude: "**/walls/**"
  ntfy:
    externalSecret:
      urlPath: /cl01tl/ntfy/config
      urlProperty: internal-endpoint
      topicPath: /cl01tl/ntfy/topics
      topicProperty: rclone
      tokenPath: /cl01tl/ntfy/users/cl01tl
      tokenProperty: token
  secret:
    externalSecret:
      source:
        credentials:
          path: /garage/home-infra/postgres-backups
        config:
          path: /garage/config
      destination:
        credentials:
          path: /garage/home-infra/postgres-backups
        config:
          path: /garage/config
rclone-postgres-backups-external:
  nameOverride: postgres-backups-external-rclone
  cronJob:
    suspend: false
    schedule: 0 6 * * 1
  rclone:
    source:
      bucketName: postgres-backups
    destination:
      bucketName: postgres-backups-775957147abfbc73
  prune:
    enabled: true
    ageToPrune: 14d
    include: "/cl01tl/*/*/*/base/**"
    exclude: "**/walls/**"
  ntfy:
    externalSecret:
      urlPath: /cl01tl/ntfy/config
      urlProperty: internal-endpoint
      topicPath: /cl01tl/ntfy/topics
      topicProperty: rclone
      tokenPath: /cl01tl/ntfy/users/cl01tl
      tokenProperty: token
  secret:
    externalSecret:
      source:
        credentials:
          path: /garage/home-infra/postgres-backups
        config:
          path: /garage/config
      destination:
        credentials:
          path: /backblaze/home-infra/postgres-backups
          keyIdProperty: AWS_ACCESS_KEY_ID
          secretKeyProperty: AWS_SECRET_ACCESS_KEY
          regionProperty: AWS_REGION
        config:
          path: /backblaze/config
          endpointProperty: ENDPOINT
