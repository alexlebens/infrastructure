apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: frigate-secrets
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: rtsp-password
      remoteRef:
        key: /cl01tl/frigate/config
        property: rtsp-password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: it06cm-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: it06cm-config
    {{- include "custom.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: user
      remoteRef:
        key: /it06cm/auth
        property: user
    - secretKey: password
      remoteRef:
        key: /it06cm/auth
        property: password
