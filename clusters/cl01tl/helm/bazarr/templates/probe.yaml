{{- range $prober := list "ps08rp" "ps09rp" }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: blackbox-{{ $prober }}-{{ $.Release.Namespace }}-http-401
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: blackbox-{{ $prober }}-{{ $.Release.Namespace }}-http-401
    {{- include "custom.labels" $ | nindent 4 }}
spec:
  prober:
    url: {{ $prober }}.alexlebens.net:9115
  module: http_401
  targets:
    staticConfig:
      static:
        - https://{{ index $.Values.bazarr.route.main.hostnames 0 }}
{{- end }}
