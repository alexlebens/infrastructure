foldergram:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/foldergram/foldergram
            tag: 1.2.0@sha256:325e7fcd257cbecaf29a8623cebcbf6f7935fe90454160adf0a43e0a0fcddb91
          env:
            - name: IMAGE_DETAIL_SOURCE
              value: original
            - name: DERIVATIVE_MODE
              value: lazy
            - name: DATA_ROOT
              value: ./data
            - name: GALLERY_ROOT
              value: /gallery
            - name: CSRF_TRUSTED_ORIGINS
              value: https://foldergram.alexlebens.net, https://art.alexlebens.dev
            # - name: PUBLIC_DEMO_MODE
            #   value: 1
          resources:
            requests:
              cpu: 10m
              memory: 1Gi
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
          targetPort: 4141
  route:
    main:
      kind: HTTPRoute
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
      hostnames:
        - foldergram.alexlebens.net
      rules:
        - backendRefs:
            - name: foldergram
              port: 80
          matches:
            - path:
                type: PathPrefix
                value: /
  persistence:
    db:
      forceRename: foldergram-db
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          main:
            - path: /app/data/db
              readOnly: false
    data:
      forceRename: foldergram-data
      storageClass: synology-iscsi-delete
      accessMode: ReadWriteOnce
      size: 500Gi
      advancedMounts:
        main:
          main:
            - path: /app/data
              readOnly: false
    pictures-mia:
      existingClaim: foldergram-pictures-collection-mia-nfs-storage
      advancedMounts:
        main:
          main:
            - path: '/gallery/Minneapolis Institute of Art'
              readOnly: true
volsync-target-db:
  pvcTarget: foldergram-db
  local:
    enabled: true
    schedule: 0 8 * * *
  remote:
    enabled: true
    schedule: 0 10 * * 1
  external:
    enabled: true
    schedule: 0 9 * * 1
