apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-directus-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-directus-secret
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/directus-assets
        metadataPolicy: None
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_REGION
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/directus-assets
        metadataPolicy: None
        property: ACCESS_REGION
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/home-infra/directus-assets
        metadataPolicy: None
        property: ACCESS_SECRET_KEY
    - secretKey: SRC_ENDPOINT
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/config/local
        metadataPolicy: None
        property: ENDPOINT
    - secretKey: DEST_ENDPOINT
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /garage/config/remote
        metadataPolicy: None
        property: ENDPOINT

