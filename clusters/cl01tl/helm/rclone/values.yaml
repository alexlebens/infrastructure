rclone:
  controllers:
    directus-assets:
      type: cronjob
      cronjob:
        suspend: false
        concurrencyPolicy: Forbid
        timeZone: US/Central
        schedule: "0 0 6 * *"
        startingDeadlineSeconds: 90
        successfulJobsHistory: 1
        failedJobsHistory: 1
        backoffLimit: 3
        parallelism: 1
      containers:
        main:
          image:
            repository: rclone/rclone
            tag: 1.73.2
            pullPolicy: IfNotPresent
          args:
            - sync
            - src:directus-assets
            - dest:directus-assets
            - --s3-no-check-bucket
            - --verbose
          env:
            - name: RCLONE_S3_PROVIDER
              value: Other
            - name: RCLONE_CONFIG_SRC_TYPE
              value: s3
            - name: RCLONE_CONFIG_SRC_PROVIDER
              value: Other
            - name: RCLONE_CONFIG_SRC_ENV_AUTH
              value: false
            - name: RCLONE_CONFIG_SRC_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_KEY_ID
            - name: RCLONE_CONFIG_SRC_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_SECRET_KEY
            - name: RCLONE_CONFIG_SRC_REGION
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_REGION
            - name: RCLONE_CONFIG_SRC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: SRC_ENDPOINT
            - name: RCLONE_CONFIG_SRC_S3_FORCE_PATH_STYLE
              value: true
            - name: RCLONE_CONFIG_DEST_TYPE
              value: s3
            - name: RCLONE_CONFIG_DEST_PROVIDER
              value: Other
            - name: RCLONE_CONFIG_DEST_ENV_AUTH
              value: false
            - name: RCLONE_CONFIG_DEST_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_KEY_ID
            - name: RCLONE_CONFIG_DEST_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_SECRET_KEY
            - name: RCLONE_CONFIG_DEST_REGION
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: ACCESS_REGION
            - name: RCLONE_CONFIG_DEST_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: garage-directus-secret
                  key: DEST_ENDPOINT
            - name: RCLONE_CONFIG_SRC_S3_FORCE_PATH_STYLE
              value: true
