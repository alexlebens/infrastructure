cloudflared-synapse:
  name: synapse
cloudflared-hookshot:
  name: hookshot
postgres-18-cluster:
  mode: recovery
  recovery:
    method: objectStore
    objectStore:
      index: 1
  backup:
    objectStore:
      - name: garage-local
        index: 1
        destinationBucket: postgres-backups
        externalSecretCredentialPath: /garage/home-infra/postgres-backups
        isWALArchiver: true
    scheduledBackups:
      - name: live-backup
        suspend: false
        immediate: true
        schedule: "0 0 15 * * *"
        backupName: garage-local
  databases:
    - name: mautrix-discord
      ensure: present
      owner: app
    - name: mautrix-whatsapp
      ensure: present
      owner: app
valkey-matrix-synapse:
  valkey:
    auth:
      enabled: true
      usersExistingSecret: matrix-synapse-valkey-secret
      aclUsers:
        default:
          permissions: "~* &* +@all"
    # No option to configure metrics when auth is enabled
    # https://github.com/valkey-io/valkey-helm/issues/135
    metrics:
      enabled: false
valkey-hookshot:
  valkey:
    nameOverride: valkey-hookshot
volsync-target-synapse:
  pvcTarget: matrix-synapse
  local:
    enabled: true
    schedule: 36 8 * * *
  remote:
    enabled: true
    schedule: 36 9 * * *
  external:
    enabled: true
    schedule: 36 10 * * *
volsync-target-hookshot:
  pvcTarget: matrix-hookshot
  local:
    enabled: true
    schedule: 38 8 * * *
  remote:
    enabled: true
    schedule: 38 9 * * *
  external:
    enabled: true
    schedule: 38 10 * * *
volsync-target-discord:
  pvcTarget: mautrix-discord
  moverSecurityContext:
    runAsUser: 1337
    runAsGroup: 1337
  local:
    enabled: true
    schedule: 40 8 * * *
  remote:
    enabled: true
    schedule: 40 9 * * *
  external:
    enabled: true
    schedule: 40 10 * * *
volsync-target-whatsapp:
  pvcTarget: mautrix-whatsapp
  moverSecurityContext:
    runAsUser: 1337
    runAsGroup: 1337
  local:
    enabled: true
    schedule: 42 8 * * *
  remote:
    enabled: true
    schedule: 42 9 * * *
  external:
    enabled: true
    schedule: 42 10 * * *
