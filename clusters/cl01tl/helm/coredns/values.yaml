coredns:
  image:
    repository: coredns/coredns
    tag: 1.14.4@sha256:3e98f280fd601b37411c5fb7075fd9f337833c480f1644970b727ae0af067782
  replicaCount: 3
  resources:
    limits:
      cpu: null
      memory: null
    requests:
      cpu: 50m
      memory: 40Mi
  prometheus:
    service:
      enabled: true
    monitor:
      enabled: true
      namespace: kube-system
  service:
    clusterIP: 10.96.0.10
    clusterIPs:
      - 10.96.0.10
    name: kube-dns
  serviceAccount:
    create: true
    name: coredns
  priorityClassName: system-cluster-critical
  servers:
    - zones:
        - zone: .
          scheme: dns://
          use_tcp: true
      port: 53
      plugins:
        - name: errors
        - name: health
          configBlock: |-
            lameduck 5s
        - name: ready
        - name: kubernetes
          parameters: cluster.local in-addr.arpa ip6.arpa
          configBlock: |-
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        - name: prometheus
          parameters: :9153
        - name: forward
          parameters: . /etc/resolv.conf
        - name: cache
          parameters: 30
        - name: loop
        - name: reload
        - name: loadbalance
    - zones:
        - zone: alexlebens.net
          scheme: dns://
          use_tcp: true
      port: 53
      plugins:
        - name: errors
        - name: cache
          parameters: 30
        - name: prometheus
          parameters: :9153
        - name: forward
          parameters: . 10.111.232.172
    - zones:
        - zone: ts.net
          scheme: dns://
          use_tcp: true
      port: 53
      plugins:
        - name: errors
        - name: cache
          parameters: 30
        - name: prometheus
          parameters: :9153
        - name: forward
          parameters: . 10.97.20.219
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node.cloudprovider.kubernetes.io/uninitialized
      operator: Exists
      effect: NoSchedule
  deployment:
    name: coredns
