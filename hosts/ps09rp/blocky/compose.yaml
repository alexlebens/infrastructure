---
services:
    tailscale-blocky:
        image: ghcr.io/tailscale/tailscale:v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
        container_name: tailscale-blocky
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=blocky-ps09rp
        network_mode: service:blocky
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
        devices:
            - /dev/net/tun:/dev/net/tun

    blocky:
        image: ghcr.io/0xerr0r/blocky:v0.32.1@sha256:19d856a00569f24b6e295d95feec87d2c07c92f4ee60c3bf2324f1e4b5348e97
        container_name: blocky
        environment:
            - TZ=America/Chicago
        ports:
            - 0.0.0.0:53:53/tcp
            - 0.0.0.0:53:53/udp
        restart: always
        volumes:
            - ./config.yml:/app/config.yml

volumes:
    tailscale:
