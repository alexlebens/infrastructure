---
services:
    node-exporter:
        image: quay.io/prometheus/node-exporter:v1.10.2@sha256:337ff1d356b68d39cef853e8c6345de11ce7556bb34cda8bd205bcf2ed30b565
        container_name: node-exporter
        command:
            - '--path.rootfs=/rootfs'
        ports:
          - 0.0.0.0:9100:9100
        pid: host
        restart: always
        volumes:
            - /:/rootfs:ro
