---
services:
    tailscale-komodo-periphery:
        image: ghcr.io/tailscale/tailscale:v1.98.3@sha256:854b77123b9536adae2e97f5a5fdb1790ed03438b911ab7f07780155e0af6ce2
        container_name: tailscale-komodo-periphery
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=komodo-periphery-ps10rp
        env_file:
            - .ts-env
        network_mode: service:komodo-periphery
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
        devices:
            - /dev/net/tun:/dev/net/tun

    komodo-periphery:
        image: ghcr.io/moghtech/komodo-periphery:2.2.0@sha256:7fb1a4807d125ce036a17d37c940b4001402afcaf342a2c720c98d096b1b54da
        container_name: komodo-periphery
        init: true
        env_file:
            - .komodo-env
        environment:
            - TZ=America/Chicago
        restart: always
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - /proc:/proc
            - /mnt/data/komodo:/etc/komodo
            - keys:/config/keys

volumes:
    tailscale:
    keys:
