---
services:
    tailscale-blocky:
        image: ghcr.io/tailscale/tailscale:v1.98.3@sha256:854b77123b9536adae2e97f5a5fdb1790ed03438b911ab7f07780155e0af6ce2
        container_name: tailscale-blocky
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=blocky-ps10rp
        network_mode: service:blocky
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
        devices:
            - /dev/net/tun:/dev/net/tun

    blocky:
        image: ghcr.io/0xerr0r/blocky:v0.30.0@sha256:d9f15eddffedded40797406349012cbd5966ef99c286b13321e7a76efddb9bdc
        container_name: blocky
        environment:
            - TZ=America/Chicago
        ports:
            - 0.0.0.0:53:53/tcp
            - 0.0.0.0:53:53/udp
        restart: always
        volumes:
            - ./config.yml:/app/config.yml

volumes:
    tailscale:
