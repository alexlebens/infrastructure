---
services:
    tailscale-node-exporter:
        image: ghcr.io/tailscale/tailscale:v1.94.2@sha256:95e528798bebe75f39b10e74e7051cf51188ee615934f232ba7ad06a3390ffa1
        container_name: tailscale-node-exporter
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=node-exporter-ps10rp
            - TS_SERVE_CONFIG=/config/serve.json
        network_mode: service:node-exporter
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
            - ${PWD}/serve.json:/config/serve.json
        devices:
            - /dev/net/tun:/dev/net/tun

    node-exporter:
        image: quay.io/prometheus/node-exporter:v1.11.1@sha256:0f422f62c15f154af8d8572b23d623aebfb10cec73a5c654d18f911f3f9df241
        container_name: node-exporter
        command:
            - '--path.rootfs=/rootfs'
        pid: host
        restart: always
        volumes:
            - /:/rootfs:ro

volumes:
    tailscale:
