---
services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
    container_name: tailscale-subnet
    cap_add:
      - net_admin
      - sys_module
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_METRICS=true
      - TS_HOSTNAME=subnet-router-local-ps10rp
      - TS_ROUTES=192.168.5.0/24
      - TS_EXTRA_ARGS=--stateful-filtering=false --snat-subnet-routes=false
    network_mode: host
    privileged: true
    restart: always
    volumes:
      - tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun

volumes:
  tailscale:
