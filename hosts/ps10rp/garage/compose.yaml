services:
    tailscale-garage:
        image: ghcr.io/tailscale/tailscale:v1.94.2@sha256:95e528798bebe75f39b10e74e7051cf51188ee615934f232ba7ad06a3390ffa1
        container_name: tailscale-garage
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=garage-ps10rp
            - TS_SERVE_CONFIG=/config/serve.json
        restart: always
        networks:
            internal: null
        volumes:
            - tailscale:/var/lib/tailscale
            - ${PWD}/serve.json:/config/serve.json:ro
        devices:
            - /dev/net/tun:/dev/net/tun

    tailscale-garage-ui:
        image: ghcr.io/tailscale/tailscale:v1.94.2@sha256:95e528798bebe75f39b10e74e7051cf51188ee615934f232ba7ad06a3390ffa1
        container_name: tailscale-garage-ui
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=garage-ui-ps10rp
            - TS_SERVE_CONFIG=/config/serve.json
        restart: always
        network_mode: service:garage-ui
        volumes:
            - tailscale-ui:/var/lib/tailscale
            - ${PWD}/serve-ui.json:/config/serve.json:ro
        devices:
            - /dev/net/tun:/dev/net/tun

    garage:
        image: dxflrs/garage:v2.2.0@sha256:45a61ce3f7c9c24fc23d9ed2b09b27ed560ab87b34605d175d5c588f539c24e4
        container_name: garage
        env_file:
            - .env
        environment:
            RUST_LOG: trace
        restart: always
        networks:
            internal: null
        volumes:
            - ${PWD}/garage.toml:/etc/garage.toml:ro
            - meta:/var/lib/garage/meta
            - data:/var/lib/garage/data

    garage-ui:
        image: khairul169/garage-webui:1.1.0@sha256:17c793551873155065bf9a022dabcde874de808a1f26e648d4b82e168806439c
        container_name: garage-ui
        env_file:
            - .env
        environment:
            API_BASE_URL: "http://garage:3903"
            S3_ENDPOINT_URL: "http://garage:3900"
        labels:
            traefik.enable: true
            traefik.docker.network: internal
            traefik.http.routers.garage-webui.entrypoints: web-secure
            traefik.http.routers.garage-webui.rule: Host(`garage-ui.lebens-home.net`)
            traefik.http.routers.garage-webui.service: garage-webui
            traefik.http.services.garage-webui.loadbalancer.server.port: 3009
        restart: always
        networks:
            internal: null
        volumes:
            - ${PWD}/garage.toml:/etc/garage.toml:ro

networks:
    internal:
        name: internal
        external: true

volumes:
    tailscale:
    tailscale-ui:
    meta:
    data:
