---
services:
    cloudflare-ddns:
        image: favonia/cloudflare-ddns:1.16.2@sha256:bc53b40b13c8b2a84e9b93c21f65fcd7d574b741014fb93912eb9efd93015aa2
        container_name: cloudflare-ddns
        cap_drop:
            - all
        read_only: true
        security_opt:
            - no-new-privileges:true
        env_file:
            - .env
        environment:
            - DOMAINS=lebens-home.net
            - PROXIED=true
        restart: always
