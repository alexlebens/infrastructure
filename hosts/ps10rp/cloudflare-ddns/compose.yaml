---
services:
    cloudflare-ddns:
        image: favonia/cloudflare-ddns:1.16.0@sha256:8e0f869aed97beeed4e172a01e97090673cb9b04e7e1d62fcb6cfc656f9761ad
        container_name: cloudflare-ddns
        cap_drop:
            - all
        read_only: true
        security_opt:
            - no-new-privileges:true
        env_file:
            - .env
        environment:
            - DOMAINS=lebens-home.net
            - PROXIED=true
        restart: always
