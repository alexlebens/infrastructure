---
services:
    cloudflare-ddns:
        image: favonia/cloudflare-ddns:1.16.1@sha256:d9eb06b9ddb1ef121334095645e2b55ac208ea1ef1f363a201a255aa8a9798cc
        container_name: cloudflare-ddns
        cap_drop:
            - all
        read_only: true
        security_opt:
            - no-new-privileges:true
        env_file:
            - .env
        environment:
            - DOMAINS=lebens-home.net
            - PROXIED=true
        restart: always
