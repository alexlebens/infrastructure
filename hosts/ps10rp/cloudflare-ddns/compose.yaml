---
services:
    cloudflare-ddns:
        image: favonia/cloudflare-ddns:1.15.1@sha256:a4e2089b3531eec8c9328c7a9a586f80e8d67dcd94856e0b596b7896e1de3f62
        container_name: cloudflare-ddns
        cap_drop:
            - all
        read_only: true
        security_opt:
            - no-new-privileges:true
        env_file:
            - .env
        environment:
            - DOMAINS=lebens-home.net
            - PROXIED=true
        restart: always
