---
services:
    node-exporter:
        image: quay.io/prometheus/node-exporter:v1.11.0@sha256:2f0cc335ef9ea15d6c96e1c0d693d8b57c0b794d0244b22313a6c162bd1cb1b8
        container_name: node-exporter
        command:
            - '--path.rootfs=/rootfs'
        ports:
          - 0.0.0.0:9100:9100
        pid: host
        restart: always
        volumes:
            - /:/rootfs:ro
