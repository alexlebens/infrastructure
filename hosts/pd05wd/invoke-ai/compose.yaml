services:
    tailscale-invoke-ai:
        image: ghcr.io/tailscale/tailscale:v1.96.5
        container_name: tailscale-invoke-ai
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=invoke-ai-pd05wd
            - TS_SERVE_CONFIG=/config/serve.json
        env_file:
            - .ts-env
        network_mode: service:invoke-ai
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
            - ./serve.json:/config/serve.json
        devices:
            - /dev/net/tun:/dev/net/tun

    invoke-ai:
        image: ghcr.io/invoke-ai/invokeai:main-cuda
        container_name: stable-diffusion
        environment:
            - INVOKEAI_ROOT=~/invokeai
            - INVOKEAI_DEVICE=cuda
        restart: always
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: ["gpu"]
                          count: all
        volumes:
            - ./invokeai:/invokeai

volumes:
    tailscale:
