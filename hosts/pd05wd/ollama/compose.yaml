---
services:
    tailscale-ollama:
        image: ghcr.io/tailscale/tailscale:v1.96.5@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
        container_name: tailscale-ollama
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=ollama-pd05wd
        env_file:
            - .ts-env
        network_mode: service:ollama
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
        devices:
            - /dev/net/tun:/dev/net/tun

    ollama:
        image: ollama/ollama:0.23.2@sha256:d00473cb58f0082c07cd6ed0d326a8a86f443ab69c51f8fc2b1a41687d45c661
        container_name: ollama
        environment:
            - OLLAMA_KEEP_ALIVE=24h
        restart: always
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: ["gpu"]
                          count: all
        volumes:
            - ollama:/root/.ollama

volumes:
    tailscale:
    ollama:
