---
services:
    tailscale-ollama:
        image: ghcr.io/tailscale/tailscale:v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
        container_name: tailscale-ollama
        cap_add:
            - net_admin
            - sys_module
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_ENABLE_METRICS=true
            - TS_HOSTNAME=ollama-pd05wd
        env_file:
            - .ts-env
        network_mode: service:ollama
        restart: always
        volumes:
            - tailscale:/var/lib/tailscale
        devices:
            - /dev/net/tun:/dev/net/tun

    ollama:
        image: ollama/ollama:0.30.6@sha256:fbaaecc6c632a73c2b4ca25ef52dbee0b68d07783fcb850f916404c004040f90
        container_name: ollama
        environment:
            - OLLAMA_KEEP_ALIVE=24h
        restart: always
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: ["gpu"]
                          count: all
        volumes:
            - ollama:/root/.ollama

volumes:
    tailscale:
    ollama:
